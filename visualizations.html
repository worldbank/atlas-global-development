			<script type="application/json" data-sveltekit-fetched data-url="/atlas-global-development/data/all_visualizations.json">{"status":200,"statusText":"","headers":{},"body":"{\n  \"10\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"high_inequality_trend\",\n        \"title\": \"The number of economies with high inequality has almost halved in the past three decades\",\n        \"subtitle\": \"Economies with high inequality have a Gini index greater than 40; those with low inequality have a Gini index less than 30\",\n        \"visSize\": \"small\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/key-inequality-indicators\\\" target=\\\"_blank\\\">Key Inequality Indicators, Poverty and Inequality Platform\u003C/a> (version March 2026).\",\n        \"high\": \"High inequality\",\n        \"moderate\": \"Moderate inequality\",\n        \"low\": \"Low inequality\",\n        \"y_axis_title\": \"Number of economies\",\n        \"visdescription\": \"The figure reports the number of economies with a Gini index over 40 for 1995–2024. The number of economies with high inequality has fallen from 72 in 1995 to 43 in 2024. The number of economies with low inequality, defined as those with Gini index under 30, has increased from 22 in 1995 to 33 in 2024. \",\n        \"data_download\": \"10.data.high_inequality_trend.csv\",\n        \"data\": \"11Lw3knTCwFMNRc_bb5E3N52V3M9GhizD9HE1NpJ4g8k\",\n        \"keyFact\": \"43\",\n        \"keyFactLabel\": \"economies have high inequality today, compared to 72 in 1995.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"\",\n            \"text\": \"The number of economies with  \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(190,98,208);\\\">high inequality\u003C/span> (Gini index > 40) has decreased substantially since the 1990s. In 1995, 72 economies had high inequality; by 2024, this had fallen to 43—nearly half the number in 1995.\",\n            \"translationPrefix\": \"goal_10.content.#3.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"\",\n            \"text\": \"At the same time, the number of economies with \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(78,162,172);\\\">low inequality\u003C/span> (Gini index \u003C 30) increased from 22 in 1995 to 33 in 2024, underlining the progress in reducing inequality.\",\n            \"translationPrefix\": \"goal_10.content.#3.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_10.content.#3\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"high_inequality_map\",\n        \"title\": \"Economies with high inequality are concentrated in Latin America and Sub-Saharan Africa\",\n        \"subtitle\": \"The map shows the Gini index of each economy using the most recent household survey data\",\n        \"high\": \"High (Gini > 40)\",\n        \"moderate\": \"Moderate (Gini 30–40)\",\n        \"low\": \"Low (Gini \u003C 30)\",\n        \"nodata\": \"No data\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/key-inequality-indicators\\\" target=\\\"_blank\\\">Key Inequality Indicators, Poverty and Inequality Platform\u003C/a> (version March 2026).  \",\n        \"visdescription\": \"The map shows the levels of inequality across the world.  Today, economies with high inequality (Gini index > 40) are concentrated in Latin America & the Caribbean and Sub-Saharan Africa.\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"10.data.high_inequality_countries.csv\",\n        \"data\": \"1EcXKhasvLrhy7IM4mVV2c2DNisBhojrllHZcQv6znrA\",\n        \"translationPrefix\": \"goal_10.content.#6\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"shared_prosperity_scatter\",\n        \"title\": \"In three out of four economies, income growth of the poorest 40 percent was faster than the population’s average between 2016 and 2021\",\n        \"subtitle\": \"Progress is equitable when the income of the poorest 40 percent grows faster than the average income\",\n        \"source\": \"\u003Ca href=\\\"https://www.worldbank.org/en/topic/poverty/brief/global-database-of-shared-prosperity\\\" target=\\\"_blank\\\">Global Database on Shared Prosperity\u003C/a> (October 2024). \",\n        \"fasterlabel\": \"Faster growth for the poorest 40 percent\",\n        \"slowerlabel\": \"Slower growth for the poorest 40 percent\",\n        \"xaxistitle\": \"Income growth of the poorest 40 percent (%)\",\n        \"yaxistitle\": \"Growth of national average income (%)\",\n        \"visdescription\": \"The figure compares the growth rates of average national income and average income of the poorest 40 percent of the population. In three out of four economies, income growth  for the poorest 40 percent was better than the average income.\",\n        \"data_download\": \"10.data.shared_prosperity.csv\",\n        \"data\": \"1Xc3ceq3jZck-SqU6nNrKFRgpsu0oirNFDNi4zv2xiJ0\",\n        \"keyFact\": \"3 in 4\",\n        \"keyFactLabel\": \"economies experienced faster income growth of the poorest 40 percent compared to average income growth.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"all_countries\",\n            \"text\": \"Each dot in the chart corresponds to the income growth of a particular economy, colored by region. The 45-degree line, also known as the [emphasis: line of equality], reflects equal growth rates in the incomes of the poorest 40 percent and the entire population. Data points located to the right of this line indicate that income among the poorest 40 percent increased more rapidly than the national average income.\",\n            \"translationPrefix\": \"goal_10.content.#12.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"bol_jam\",\n            \"text\": \"Between 2016 and 2021, the income of the poorest 40 percent in [emphasis: Bolivia ]increased by more than four percent, whereas the average income grew by less than one percent. In contrast, the poorest 40 percent in [emphasis: Jamaica ]experienced a decline in their income while the average income rose by over two percent. Although both nations saw overall economic growth, income gains in [emphasis: Bolivia ]were more evenly distributed, benefiting lower-income groups, while [emphasis: Jamaica ]observed a relative decrease in prosperity among the poorer segments of its population.\",\n            \"translationPrefix\": \"goal_10.content.#12.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"lcn\",\n            \"text\": \"However, although measuring income growth within the poorest 40 percent offers a practical means to assess shared prosperity, it does not capture all aspects of inequality and presents certain limitations. For example, although we can compare income growth of the poorest 40 percent across \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(12,124,104);\\\">Latin American & the Caribbean \u003C/span>economies, it is hard to see which economy has improved the most given their starting positions.\",\n            \"translationPrefix\": \"goal_10.content.#12.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"mex_per\",\n            \"text\": \"For example, income growth among Brazil’s poorest 40 percent is lower than Mexico’s, but the average Brazilian is still richer than the average Mexican. The growth of the poorest 40 percent measure does not capture this difference.\",\n            \"translationPrefix\": \"goal_10.content.#12.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_10.content.#12\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"prosperity_gap_scroller\",\n        \"title\": \"The Prosperity Gap tracks both income level and its distribution\",\n        \"subtitle\": \"Prosperity Gaps for all individuals  in Peru and Colombia, grouped into percentiles\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/\\\" target=\\\"_blank\\\">Poverty and Inequality Platform\u003C/a> (version March 2026). \",\n        \"income_title\": \"Income ($/day)\",\n        \"prosperity_gap_title\": \"Prosperity Gap\",\n        \"average_prosperity_gap\": \"Prosperity Gap\",\n        \"x_axis_title\": \"← Poorer | Richer →\",\n        \"prosperity_standard\": \"Prosperity standard\",\n        \"visdescription\": \"This chart shows the Prosperity Gap for each percentile of the income distributions in Peru and Colombia. \",\n        \"data_download\": \"10.data.prosperity_gap.csv\",\n        \"data\": \"1vTsQfDAnOv96GgSkuLpe8W32uiwYPmGw2JpAyuQKQmI\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"prosperity_gap_intro\",\n            \"text\": \"Suppose that there are 100 people in each economy ranked from poorest on the left to richest on the right. The height of each bar represents the income of each individual in 2026.\",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"prosperity_gap_threshold\",\n            \"text\": \"The Prosperity Gap measures the income multiple necessary to reach the global prosperity standard of $28 per day. The smaller the level of income, the larger the increase necessary to close the gap.\",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"percentiles20\",\n            \"text\": \"For example, the income of the 10th poorest person in Peru is close to $4 and in Colombia, it is close to $3.50.\",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"percentiles20\",\n            \"text\": \"The Peruvian with a $4 income needs to increase their income [emphasis: seven times] to reach the prosperity standard, whereas the Colombian with a $3.50 income needs to increase their income [emphasis: eight times]. \",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"all_gaps\",\n            \"text\": \"Each brick represents the person's level of income. The number of bricks represents how many times their income needs to increase. Individuals with lower incomes require a substantially greater increase in income to reach the prosperity standard. \",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"colombia_10_20\",\n            \"text\": \"For example, the [emphasis: 10th poorest ]Colombian would need to increase their income [emphasis: eight times] while the [emphasis: 20th poorest] would need to increase it just over [emphasis: five times] (both are highlighted in the chart).\",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"poorest_col_vs_per\",\n            \"text\": \"It is important to note that individuals with lower income in Colombia face greater challenges in achieving the prosperity standard compared to similar individuals in Peru. The Prosperity Gaps of the poorest 10 people are much higher in Colombia than in Peru.\",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#6\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"prosperity_gap_averages\",\n            \"text\": \"A nation’s Prosperity Gap is the average gap of all individuals in that nation. The Prosperity Gap is higher in Colombia (4.5) than in Peru (3.5), reflecting the larger gaps among the poor in Colombia.\",\n            \"translationPrefix\": \"goal_10.content.#22.scenes.#7\"\n          }\n        ],\n        \"translationPrefix\": \"goal_10.content.#22\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"prosperity_gaps\",\n        \"title\": \"From national gaps to regional and global gaps\",\n        \"subtitle\": \"A group’s Prosperity Gap is the average gap of all its members\",\n        \"source\": \"Authors’ calculation using \u003Ca href=\\\"https://pip.worldbank.org/\\\" target=\\\"_blank\\\">Poverty and Inequality Platform\u003C/a> (version March 2026). \",\n        \"million_people\": \"million people\",\n        \"y_axis_title\": \"Prosperity Gap\",\n        \"visdescription\": \"This chart shows national Prosperity Gaps aggregated to regional and global Prosperity Gaps. \",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"10.data.prosperity_gaps.zip\",\n        \"data\": \"1dMwhGsyOLcQQI7y3WNmSHxSO09ftZGYRUOc5128tY_s\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"col_mex\",\n            \"text\": \"In 2026, the Prosperity Gap for Colombia was 4.5 and for Peru, 3.5.\",\n            \"translationPrefix\": \"goal_10.content.#27.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country_gaps\",\n            \"text\": \"Each square represents an economy’s Prosperity Gap in 2026, colored by region and reflecting the population size.\",\n            \"translationPrefix\": \"goal_10.content.#27.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country_gaps\",\n            \"text\": \"There is a large difference in prosperity between economies. In some, such as the United States, Japan, and Estonia, incomes are almost high enough to meet the prosperity standard, but in others, such as South Sudan and Mozambique, incomes would have to grow roughly 25 times to reach that level.\",\n            \"translationPrefix\": \"goal_10.content.#27.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"region_gaps\",\n            \"text\": \"The regional Prosperity Gaps reflect the average gap of all individuals living in the region. This is equivalent to taking the average Prosperity Gap across economies while accounting for the size of their population.\",\n            \"translationPrefix\": \"goal_10.content.#27.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"region_gaps\",\n            \"text\": \"Today, most people in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(170,0,0);\\\">Europe & Central Asia\u003C/span> and \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">North America\u003C/span> have reached the prosperity standard of $28 per day. On average, people in \u003Cspan data-color-id=\\\"LCN\\\" class=\\\"LCN\\\">Latin America & the Caribbean\u003C/span> need to increase their incomes about [emphasis: three times] to reach that same level of prosperity. In \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(78,194,192);\\\">South Asia\u003C/span> and the \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">Middle East, North Africa, Afghanistan & Pakistan\u003C/span>, incomes need to be about [emphasis: five times] higher, and in \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span>, almost [emphasis: 11 times] higher.\",\n            \"translationPrefix\": \"goal_10.content.#27.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"global_gap\",\n            \"text\": \"The \u003Cspan data-color-id=\\\"WLD\\\" class=\\\"WLD\\\">Global Prosperity Gap\u003C/span> combines the Prosperity Gaps of every person in the world. Today, individual incomes worldwide would need to rise nearly [emphasis: five times] on average for everyone to reach the prosperity standard of $28 per day.\",\n            \"translationPrefix\": \"goal_10.content.#27.scenes.#5\"\n          }\n        ],\n        \"translationPrefix\": \"goal_10.content.#27\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"prosperity_gap_trends\",\n        \"title\": \"Significant global progress hides regional variations\",\n        \"prosperity_gap\": \"Prosperity Gap\",\n        \"subtitle\": \"While the global Prosperity Gap has decreased over the last four decades, regional and national differences are substantial\",\n        \"source\": \"Authors’ calculation using \u003Ca href=\\\"https://pip.worldbank.org/\\\" target=\\\"_blank\\\">Poverty and Inequality Platform\u003C/a> (version March 2026). \",\n        \"visdescription\": \"This chart reports the trend in Prosperity Gap from 1981 to 2026. It reports the trends for the world, regions, and select countries.\",\n        \"data_download\": \"10.data.prosperity_gap_timeseries.csv\",\n        \"data\": \"1ZZvJlpIh4hGGvvrdjPxmvzLt9o9HbYPc0RXeK6Jkq8k\",\n        \"keyFact\": \"4 decades\",\n        \"keyFactLabel\": \"behind the rest of the world, Sub-Saharan Africa continues to face a significant gap in prosperity.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"world\",\n            \"text\": \"The Global Prosperity Gap has more than halved from over [emphasis: 13 ]in [emphasis: 1981 ]to  less than [emphasis: five ]in [emphasis: 2026]. This substantial progress reflects the poorer nations and people catching up to the richer nations and people.\",\n            \"translationPrefix\": \"goal_10.content.#32.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"regions_eas\",\n            \"text\": \"All regions have made significant progress since 1981, with \u003Cspan data-color-id=\\\"EAS\\\" class=\\\"EAS\\\">East Asia and Pacific\u003C/span> standing out, having the largest (21) to the third lowest gap (2.5).\",\n            \"translationPrefix\": \"goal_10.content.#32.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"regions_ssf\",\n            \"text\": \"But  the most recent decade has seen stagnation in the Prosperity Gaps in two regions: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">Middle East, North Africa, Afghanistan & Pakistan\u003C/span> and \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span>, with the latter’s Prosperity Gap today close to the global gap in the 1980s. By this metric, the region is around 40 years behind global progress.\",\n            \"translationPrefix\": \"goal_10.content.#32.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"countries_percol\",\n            \"text\": \"Colombia’s and Peru’s Prosperity Gaps have experienced similar developments in recent decades, including periods of increasing gaps, most notably during the COVID-19 pandemic.\",\n            \"translationPrefix\": \"goal_10.content.#32.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"countries_eth\",\n            \"text\": \"In Ethiopia, the level today is half what it was in the 1980s, although this hides faster progress in the 1990s and early 2000s, and a stagnation in recent decades.\",\n            \"translationPrefix\": \"goal_10.content.#32.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"countries_moz\",\n            \"text\": \"Worryingly, in some \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan African \u003C/span>economies, such as Mozambique, improvements in the Prosperity Gap have stalled over the last two decades, and recently worsened.\",\n            \"translationPrefix\": \"goal_10.content.#32.scenes.#5\"\n          }\n        ],\n        \"translationPrefix\": \"goal_10.content.#32\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"income_prosperity_gap\",\n        \"title\": \"Raise everyone’s income by 10 percent\",\n        \"simulation\": \"percent_for_everyone\",\n        \"subtitle\": \"\",\n        \"textParagraph\": \"A 10 percent increase in everyone’s income will [emphasis: increase ]the average income by $2 from $20 to $22. As a result, the Prosperity Gap [emphasis: decreases] by 10 percent from 4.5 to 4.0.\",\n        \"source\": \"Authors’ calculation, \u003Ca href=\\\"https://pip.worldbank.org/key-inequality-indicators\\\" target=\\\"_blank\\\">Poverty and Inequality Platform\u003C/a> (version March 2026). \",\n        \"income\": \"Income\",\n        \"prosperity_gap\": \"Prosperity Gap\",\n        \"average_income\": \"Average income:\",\n        \"average_income_units\": \"/day\",\n        \"average_prosperity_gap\": \"Prosperity Gap:\",\n        \"reality\": \"Initial level of income and Prosperity Gap\",\n        \"visdescription\": \"This chart reports the changes in average income and Prosperity Gap for a scenario where everyone’s income is raised by 10 percent.\",\n        \"data_download\": \"10.data.prosperity_gap.csv\",\n        \"data\": \"1vTsQfDAnOv96GgSkuLpe8W32uiwYPmGw2JpAyuQKQmI\",\n        \"translationPrefix\": \"goal_10.content.#36\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"income_prosperity_gap\",\n        \"title\": \"Raise everyone’s income by $10\",\n        \"simulation\": \"dollar_for_everyone\",\n        \"subtitle\": \"\",\n        \"textParagraph\": \"If everyone earns an extra $10, the average income increases from $20 to $30, and the Prosperity Gap falls from 4.5 to just over 1. One-third of this change in the Prosperity Gap is driven by an increase in average income; the rest is driven by the reduction in inequality.\",\n        \"source\": \"Authors’ calculation, \u003Ca href=\\\"https://pip.worldbank.org/key-inequality-indicators\\\" target=\\\"_blank\\\">Poverty and Inequality Platform\u003C/a> (version March 2026). \",\n        \"income\": \"Income\",\n        \"prosperity_gap\": \"Prosperity Gap\",\n        \"average_income\": \"Average income:\",\n        \"average_income_units\": \"/day\",\n        \"average_prosperity_gap\": \"Prosperity Gap\",\n        \"reality\": \"Initial level of income and Prosperity Gap\",\n        \"visdescription\": \"This chart reports the changes in average income and Prosperity Gap for a scenario where everyone’s income is raised by $10.\",\n        \"data_download\": \"10.data.prosperity_gap.csv\",\n        \"data\": \"1vTsQfDAnOv96GgSkuLpe8W32uiwYPmGw2JpAyuQKQmI\",\n        \"translationPrefix\": \"goal_10.content.#39\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"prosperity_gap_playground\",\n        \"title\": \"Choose an economy to see the changes in their Prosperity Gap\",\n        \"subtitle\": \"\",\n        \"absolute_change\": \"Change in absolute income ($/day)\",\n        \"relative_change\": \"Change in relative income (percent)\",\n        \"prosperity_gap\": \"Prosperity Gap\",\n        \"income\": \"Income\",\n        \"average_income\": \"Average income:\",\n        \"average_income_units\": \"/day\",\n        \"average_prosperity_gap\": \"Prosperity Gap:\",\n        \"source\": \"Authors’ calculation, \u003Ca href=\\\"https://pip.worldbank.org/key-inequality-indicators\\\" target=\\\"_blank\\\">Poverty and Inequality Platform\u003C/a> (version March 2026). \",\n        \"visdescription\": \"This visualization reports the changes in the Prosperity Gap due to income increase, in percent or $, for an economy of choice. \",\n        \"data_download\": \"10.data.prosperity_gap_interactive.csv\",\n        \"data\": \"1L99hy4R6DNW1aCn6GZym-ijXMU7Woim8vhWEaUowtHU\",\n        \"translationPrefix\": \"goal_10.content.#42\"\n      }\n    ]\n  },\n  \"11\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"urban_rural_pop_scroller\",\n        \"title\": \"The world is urbanizing, but growth is concentrated in some regions\",\n        \"subtitle\": \"Urban and rural population, by region (millions)\",\n        \"source\": \"World Bank staff estimates based on the \u003Ca href=\\\"http://population.un.org/wup\\\" target=\\\"_blank\\\">United Nations Population Division's World Urbanization Prospects\u003C/a>, National definitions. Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/SP.RUR.TOTL\\\" target=\\\"_blank\\\">SP.RUR.TOTL\u003C/a>, \u003Ca href=\\\"https://data.worldbank.org/indicator/SP.URB.TOTL\\\" target=\\\"_blank\\\">SP.URB.TOTL\u003C/a>).\",\n        \"visdescription\": \"\",\n        \"label_urban\": \"Urban\",\n        \"label_rural\": \"Rural\",\n        \"data_download\": \"11.data.urban_rural_pop.csv\",\n        \"data\": \"1zAXd0QAWWd2VBTMKeh9ACIOO8uR_l5p_OMPvkXbzyRA\",\n        \"keyFact\": \"Nearly 60%\",\n        \"keyFactLabel\": \"of the world’s population lives in urban areas today.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"Although urbanization is a global phenomenon, it has not unfolded evenly across regions. The stacked view of urban and rural populations shows how the world's total population has grown over time.\",\n            \"translationPrefix\": \"goal_11.content.#2.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"Unstacking these two groups reveals how each has changed individually. Over the past 25 years, [emphasis: Europe] [emphasis: and Central Asia] have seen little overall population growth, with some growth in urban populations and a modest decline in rural populations.\",\n            \"translationPrefix\": \"goal_11.content.#2.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"3\",\n            \"text\": \"In [emphasis: North America, Latin America, and the Caribbean], rural populations have plateaued while cities have expanded steadily.\",\n            \"translationPrefix\": \"goal_11.content.#2.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"4\",\n            \"text\": \"In [emphasis: East Asia & the Pacific], urbanization has been particularly dramatic, with urban populations growing rapidly as rural populations declined. The urban population overtook the rural population in 2008, a shift driven not only by migration or population growth, but also by the reclassification of rural areas and expansion of city boundaries, which absorbed once-rural areas into urban zones.\",\n            \"translationPrefix\": \"goal_11.content.#2.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"5\",\n            \"text\": \"Meanwhile, in [emphasis: Sub-Saharan Africa], [emphasis: the Middle East, North Africa, Afghanistan, Pakistan], and [emphasis: South Asia], both rural and urban populations have grown. In Sub-Saharan Africa, the Middle East, North Africa, Afghanistan and Pakistan, urban populations have expanded at a much faster pace than their rural counterparts.\",\n            \"translationPrefix\": \"goal_11.content.#2.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_11.content.#2\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"city_map\",\n        \"title\": \"The number of cities worldwide is projected to nearly double between 2000 and 2050\",\n        \"subtitle\": \"Number of cities by population size\",\n        \"source\": \"United Nations, Department of Economic and Social Affairs, Population Division (2025). \u003Ca href=\\\"https://population.un.org/wup/\\\" target=\\\"_blank\\\">World Urbanization Prospects\u003C/a>.\",\n        \"visdescription\": \"\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">Describe what the visualization shows\u003C/span>\",\n        \"visSize\": \"fullScreen\",\n        \"theme\": \"light\",\n        \"y_title\": \"City grow\",\n        \"y_units\": \"%\",\n        \"search_placeholder\": \"Search your city\",\n        \"data_download\": \"11.data.city_map.zip\",\n        \"data\": \"1kDgVr0xlnjNtyhYzv-toU807gtvLTIUw7lPRDWfZJLk\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"In 2000, there were just over 9,000 cities in the world. \",\n            \"translationPrefix\": \"goal_11.content.#6.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"By 2025, the world had over 12,000 cities. \u003Cspan style=\\\"background-color: rgb(135,177,71);\\\">Small\u003C/span> and \u003Cspan style=\\\"background-color: rgb(236,182,58);\\\">very small\u003C/span> cities ( 250,000–1 million residents) drove some of this growth, expanding from roughly 8,700 to 11,600. Meanwhile, \u003Cspan data-color-id=\\\"cat6\\\" class=\\\"cat6\\\">megacities\u003C/span>, those exceeding 10 million people, also grew significantly, from 20 in 2000 to 33 in 2025.\",\n            \"translationPrefix\": \"goal_11.content.#6.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"3\",\n            \"text\": \"But this growth in megacities is expected to slow down over the next 25 years, with projections suggesting that there will only be four more \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(8,16,121);\\\">megacities\u003C/span> by 2050, bringing the total to 37.\",\n            \"translationPrefix\": \"goal_11.content.#6.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"4\",\n            \"text\": \"Instead, urban growth will be driven by an increase in the number of \u003Cspan style=\\\"background-color: rgb(135,177,71);\\\">small\u003C/span> and \u003Cspan style=\\\"background-color: rgb(236,182,58);\\\">very small\u003C/span> cities, nearing 15,000 by 2050.\",\n            \"translationPrefix\": \"goal_11.content.#6.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_11.content.#6\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"urban_gdp_scatterplot\",\n        \"visSize\": \"small\",\n        \"title\": \"Urbanization is associated with economic growth\",\n        \"subtitle\": \"\",\n        \"source\": \"World Bank staff estimates based on the \u003Ca href=\\\"http://population.un.org/wup\\\" target=\\\"_blank\\\">United Nations Population Division's World Urbanization Prospects\u003C/a>, National definitions. Country official statistics, National Statistical Organizations and/or Central Banks; National Accounts data files, Organisation for Economic Co-operation and Development (OECD). Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/SP.URB.TOTL\\\" target=\\\"_blank\\\">SP.URB.TOTL\u003C/a>, \u003Ca href=\\\"https://data.worldbank.org/indicator/NY.GDP.PCAP.CD\\\" target=\\\"_blank\\\">NY.GDP.PCAP.CD\u003C/a>).\",\n        \"visdescription\": \"\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">Describe what the visualization shows\u003C/span>\",\n        \"textParagraph\": \"Countries and economies with higher urbanization rates also have higher gross domestic product (GDP) per capita.\",\n        \"theme\": \"light\",\n        \"data_download\": \"11.data.urban_gdp_scatterplot.csv\",\n        \"data\": \"1gpwt8NyG-x93ZIsEpexbEKVhlEEO0ujLFjG-qxwP34c\",\n        \"x_title\": \"GDP per capita\",\n        \"x_units\": \"current US$\",\n        \"y_title\": \"Urban population, 2024\",\n        \"y_units\": \"% of total population\",\n        \"translationPrefix\": \"goal_11.content.#9\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"skill_violin\",\n        \"title\": \"Urban areas offer jobs of a variety of skills\",\n        \"subtitle\": \"Specialization of jobs by skill level across rural and urban areas, 2008 - 2025\",\n        \"source\": \"International Labour Organization. (2025). ILOSTAT Rural and Urban Labour Markets (RURBAN), \u003Ca href=\\\"https://rshiny.ilo.org/dataexplorer49/?lang=en&segment=indicator&id=EMP_TEMP_SEX_OCU_GEO_NB_A&channel=ilostat\\\" target=\\\"_blank\\\">EMP_TEMP_SEX_OCU_GEO_NB_A\u003C/a>.\",\n        \"visdescription\": \"\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">Describe what the visualization shows\u003C/span>\",\n        \"theme\": \"light\",\n        \"search_placeholer\": \"Search a country or economy\",\n        \"dotRadius\": \"2\",\n        \"showTopLegend\": \"true\",\n        \"data_download\": \"11.data.skill_beeswarm.zip\",\n        \"data\": \"1tsBAUnpUMZHckRhAGHU7dE6ugGo_PZ7aVZunWbSHi8g\",\n        \"label_OCU_SKILL_L1\": \"Low skill\",\n        \"label_OCU_SKILL_L2\": \"Medium skill\",\n        \"label_OCU_SKILL_L3-4\": \"High skill\",\n        \"label_urban\": \"Urban\",\n        \"label_rural\": \"Rural\",\n        \"label_below\": \"less specialized\",\n        \"label_above\": \"more specialized\",\n        \"label_avg\": \"Average\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"Each [emphasis: dot represents a country or an economy]. If a job is more specialized than employment overall, the indicator is above 1 for that country. When the value is closer to 1, the job is distributed much like other jobs. Values below 1 suggest that jobs are relatively less specialized. This is reported for \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">urban\u003C/span> and \u003Cspan data-color-id=\\\"rural\\\" class=\\\"rural\\\">rural areas\u003C/span> and for three skill levels in each country. \",\n            \"translationPrefix\": \"goal_11.content.#16.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"Let’s take [emphasis: Indonesia] as an example, where the specialization value for low-skill jobs in \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">rural areas is 1.07\u003C/span> and in \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">urban areas is 0.95\u003C/span>. This means low-skill jobs, compared to all jobs, are 7 percent more common in rural areas and 5 percent less common in urban areas.\",\n            \"translationPrefix\": \"goal_11.content.#16.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"Similarly, medium-skill jobs are only \u003Cspan data-color-id=\\\"rural\\\" class=\\\"rural\\\">5 percent more common\u003C/span> in \u003Cspan style=\\\"color: rgb(4,1,16);\\\">rural areas\u003C/span> and \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">5 percent less common\u003C/span> in urban areas.\",\n            \"translationPrefix\": \"goal_11.content.#16.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"High-skill jobs have the starkest contrast: they are \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">30 percent more common\u003C/span> in urban areas and \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">40 percent less common\u003C/span> in rural areas.\",\n            \"translationPrefix\": \"goal_11.content.#16.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"More generally, low- and medium-skill jobs are roughly in proportion to overall employment in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(84,174,137);\\\">rural areas\u003C/span> (with specialization rates around 1.08) and urban areas (with specialization rates around 0.94). By contrast, high-skill jobs are strongly represented in \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">urban areas\u003C/span>, where specialization rates are far higher (around 1.3) than in rural areas (around 0.6). This highlights the role of cities as hubs for high-skill work.\",\n            \"translationPrefix\": \"goal_11.content.#16.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_11.content.#16\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"skill_violin_groups\",\n        \"title\": \"Urban areas offer a variety of occupations\",\n        \"subtitle\": \"Specialization of jobs by occupation across rural and urban areas, 2009 - 2025\",\n        \"source\": \"International Labour Organization. (2025). ILOSTAT Rural and Urban Labour Markets (RURBAN), \u003Ca href=\\\"https://rshiny.ilo.org/dataexplorer49/?lang=en&segment=indicator&id=EMP_TEMP_SEX_OCU_GEO_NB_A&channel=ilostat\\\" target=\\\"_blank\\\">EMP_TEMP_SEX_OCU_GEO_NB_A\u003C/a>.\",\n        \"visSize\": \"default\",\n        \"visdescription\": \"\",\n        \"textParagraph\": \"Apart from agriculture, forestry, and fishing, all other occupations are more specialized in urban areas. This highlights how cities offer a far wider and more diverse set of work opportunities for workers.[reference: task2002][footnote: If a particular skill-level job is more specialized in urban areas than employment overall, the indicator is above 1 for that country or economy. When the value is closer to 1, the jobs in this skill-level are distributed much like other jobs. Values below 1 suggest that jobs in this skill level are relatively less specialized in cities.]\",\n        \"theme\": \"light\",\n        \"search_placeholer\": \"Search a country or economy\",\n        \"showTopLegend\": \"true\",\n        \"data_download\": \"11.data.skill_violin.csv\",\n        \"data\": \"1eZ7j5uDWSnYHpwB2QDMvI1w70zmV46E34LGx7Pxrw5g\",\n        \"dotRadius\": \"1\",\n        \"showBottomLegend\": \"true\",\n        \"label_OCU_ISCO08_0\": \"Armed forces occupations\",\n        \"label_OCU_ISCO08_1\": \"Managers\",\n        \"label_OCU_ISCO08_2\": \"Professionals\",\n        \"label_OCU_ISCO08_3\": \"Technicians and associates\",\n        \"label_OCU_ISCO08_4\": \"Clerical support workers\",\n        \"label_OCU_ISCO08_5\": \"Service and sales workers\",\n        \"label_OCU_ISCO08_6\": \"Skilled agricultural, forestry ​​and fishery workers\",\n        \"label_OCU_ISCO08_7\": \"Craft and related trades\",\n        \"label_OCU_ISCO08_8\": \"Plant and machine operators, assemblers\",\n        \"label_OCU_ISCO08_9\": \"Elementary occupations\",\n        \"label_urban\": \"Urban\",\n        \"label_rural\": \"Rural\",\n        \"label_services\": \"Services\",\n        \"label_agriculture\": \"Agriculture\",\n        \"label_industry\": \"Industry\",\n        \"label_below\": \"less specialized\",\n        \"label_above\": \"more specialized\",\n        \"translationPrefix\": \"goal_11.content.#21\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"pay_beeswarm\",\n        \"title\": \"In most countries, hourly earnings are higher in urban than rural areas\",\n        \"subtitle\": \"Share of hourly earnings of urban population above rural population[footnote: A score above 0 means urban pay is higher, below 0means rural pay is higher.]\",\n        \"visSize\": \"small\",\n        \"source\": \"International Labour Organization. (2025). SDG Labour Market Indicators (ILOSDG), \u003Ca href=\\\"https://rshiny.ilo.org/dataexplorer49/?lang=en&segment=indicator&id=EAR_4HRL_SEX_GEO_CUR_NB_A&channel=ilostat\\\" target=\\\"_blank\\\">EAR_4HRL_SEX_GEO_CUR_NB_A\u003C/a>.\",\n        \"visdescription\": \"\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">Describe what the visualization shows\u003C/span>\",\n        \"textParagraph\": \"In 66 of the 79 countries for which we have data (80 percent), average hourly wages are higher in urban areas than in rural areas. For example, in \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Angola\u003C/span> and \u003Cspan data-color-id=\\\"LCN\\\" class=\\\"LCN\\\">Peru\u003C/span>, average hourly wages in urban areas are 40 percent higher than rural areas.[reference: paydata]\",\n        \"theme\": \"light\",\n        \"data_download\": \"11.data.pay_beeswarm.csv\",\n        \"data\": \"1dkRx6AbILx1nI4m1sJ2EaQp45E3ajOxnxSmjfs7sjJk\",\n        \"x_title\": \"\",\n        \"x_units\": \"\",\n        \"label_urban\": \"More pay in [emphasis: urban] jobs\",\n        \"label_rural\": \"More pay in [emphasis: rural] jobs\",\n        \"translationPrefix\": \"goal_11.content.#26\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"buildup_area_overtime\",\n        \"title\": \"Built-up area in Addis Ababa has more than tripled in the last five decades\",\n        \"subtitle\": \"Built-up area (km²) and population of Addis Ababa, 1975–2025\",\n        \"visSize\": \"small\",\n        \"source\": \"Pesaresi et al. (2024). \u003Ca href=\\\"https://www.tandfonline.com/doi/full/10.1080/17538947.2024.2390454\\\" target=\\\"_blank\\\">Advances on the Global Human Settlement Layer by joint assessment of Earth Observation and population survey data. International Journal of Digital Earth\u003C/a>, 17(1).\",\n        \"textParagraph\": \"In 1975, Addis Ababa had nearly 39 square kilometers of built-up area. By 2025, it had grown to 128 square kilometers.[reference: ghsl]\",\n        \"visdescription\": \"\",\n        \"lable_legend\": \"Built-up surface per 100-meter cell\",\n        \"label_pop\": \"Total population\",\n        \"label_build_up\": \"Total built-up area\",\n        \"unit_build_up\": \"km²\",\n        \"data_download\": \"11.data.buildup_area_overtime.zip\",\n        \"data\": \"1_Z20p5irWqpsKg_7xZ7PKMrEZHstUYxe6fMlU6GhkAM\",\n        \"translationPrefix\": \"goal_11.content.#31\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"slum_regions\",\n        \"title\": \"The decline in slum population has slowed in recent years\",\n        \"subtitle\": \"\",\n        \"visSize\": \"small\",\n        \"source\": \"\u003Ca href=\\\"https://data.unhabitat.org/\\\" target=\\\"_blank\\\">Urban Indicators Database\u003C/a>, UN Human Settlements Programme (UN-Habitat). Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/EN.POP.SLUM.UR.ZS\\\" target=\\\"_blank\\\">EN.POP.SLUM.UR.ZS\u003C/a>).\",\n        \"visdescription\": \"\",\n        \"data_download\": \"11.data.slum_regions.csv\",\n        \"data\": \"1cpnu2-yQ39-r0GCLWe9UJ_adonGq4EjuXQS6r62qPaI\",\n        \"x_title\": \"\",\n        \"x_unit\": \"\",\n        \"y_title\": \"Population living in slums (% of urban population), 2000–22\",\n        \"y_unit\": \"\",\n        \"translationPrefix\": \"goal_11.content.#38\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"slum_waffle\",\n        \"title\": \"Globally, the number of people living in slums increased by 25% in just four years\",\n        \"subtitle\": \"Total number of people living in slums\",\n        \"visSize\": \"small\",\n        \"source\": \"\u003Ca href=\\\"https://data.unhabitat.org/\\\" target=\\\"_blank\\\">Urban Indicators Database\u003C/a>, UN Human Settlements Programme (UN-Habitat). Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/EN.POP.SLUM.UR.ZS\\\" target=\\\"_blank\\\">EN.POP.SLUM.UR.ZS\u003C/a>).\",\n        \"visdescription\": \"\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">Describe what the visualization shows\u003C/span>\",\n        \"square_represents\": \"Every square represents 1 million people living in slums\",\n        \"theme\": \"light\",\n        \"data_download\": \"11.data.slum_waffle.csv\",\n        \"data\": \"1EtgWA9Bb_PnYwNGkGNkL2fgBJXmfQ70oHJbVYHluZYo\",\n        \"keyFact\": \"Over 1 billion\",\n        \"keyFactLabel\": \"People live in slums today.\",\n        \"translationPrefix\": \"goal_11.content.#40\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"buildup_area_income\",\n        \"title\": \"Built-up area will expand by more than 50 percent over the next 25 years\",\n        \"subtitle\": \"\",\n        \"visSize\": \"small\",\n        \"source\": \"Pesaresi et al. 2024. \u003Ca href=\\\"https://www.tandfonline.com/doi/full/10.1080/17538947.2024.2390454\\\" target=\\\"_blank\\\">\\\"Advances on the Global Human Settlement Layer by Joint Assessment of Earth Observation and Population Survey Data.\\\" \u003C/a>, International Journal of Digital Earth 17(1).\",\n        \"visdescription\": \"\",\n        \"data_download\": \"11.data.buildup_area_income.csv\",\n        \"data\": \"1uzT7By-2G_YWiwvWBUavileK4Ug7ozPUImz7SgS4UHM\",\n        \"x_title\": \"\",\n        \"x_unit\": \"\",\n        \"y_title\": \"Total built-up area (km2)\",\n        \"y_unit\": \"\",\n        \"projection_label\": \"\",\n        \"keyFact\": \"Over 50%\",\n        \"keyFactLabel\": \"increase in urban built-up area is expected in the next 25 years.\",\n        \"translationPrefix\": \"goal_11.content.#44\"\n      }\n    ]\n  },\n  \"13\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg13_effects_of_climate_change_scroller\",\n        \"title\": \"Exposure to floods\",\n        \"subtitle\": \"Area and share of population exposed to floods with inundation depth over 50 cm[footnote:  An area is defined as being exposed to floods if there is an annual probability of more than 1 percent to experience flooding with inundation depth exceeding 50 centimeters.]\",\n        \"source\": \"\u003Ca href=\\\"https://planetarycomputer.microsoft.com/dataset/deltares-floods\\\" target=\\\"_blank\\\">Deltares\u003C/a>, \u003Ca href=\\\"https://www.fathom.global/product/global-flood-map/\\\" target=\\\"_blank\\\">Fathom\u003C/a>, Hill et al. [reference: WB2]\",\n        \"visdescription\": \"Share of population exposed to floods and location of areas exposed to flood risk\",\n        \"textParagraph\": \"\",\n        \"weatherEventToggleText\": \"Exposed areas\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"20260130_hazard_data_prepared.csv\",\n        \"data\": \"1b0tjeAlBqbSgpOKmVE4xMafDRNvsUWG7_C_jDMsorFI\",\n        \"legend_title\": \"Population exposed\",\n        \"legend_units\": \"%\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"floods__sat__wld\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">Floods\u003C/span>] can severely damage infrastructure and homes, disrupt the economy, and destroy crops and livestock. Impacts become particularly severe when inundation depth exceeds 50 centimeters.[reference: Rentschler] Areas shown in [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">blue\u003C/span>] indicate exposure above this level.\",\n            \"translationPrefix\": \"goal_13.content.#10.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"floods__sat__bbox1\",\n            \"text\": \"The [emphasis: location of the population exposed to ] [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">floods\u003C/span>] is closely tied to the location of rivers, land elevation and coastal proximity. For example, in The Netherlands more than a third of the population is exposed to [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">floods\u003C/span>] due to its many rivers and the low elevation.\",\n            \"translationPrefix\": \"goal_13.content.#10.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"floods__vec__wld\",\n            \"text\": \"Globally, [emphasis: 775 million people are exposed to] [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">floods.\u003C/span>] Half of them live in three populous countries: China, India and Bangladesh. In Bangladesh, one third of the population is exposed to [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">floods\u003C/span>].\",\n            \"translationPrefix\": \"goal_13.content.#10.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_13.content.#10\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg13_effects_of_climate_change_scroller\",\n        \"title\": \"Exposure to agricultural drought\",\n        \"subtitle\": \"Areas and share of population exposed to agricultural drought events.[footnote:  An area is defined as being exposed to agricultural drought if at least once in the last 39 years more than 30 percent of cropland or pasture is lost due to drought.]\",\n        \"source\": \"\u003Ca href=\\\"https://www.fao.org/giews/earthobservation/asis/index_1.jsp?lang=en\\\" target=\\\"_blank\\\">Food and Agriculture Organization of the United Nations\u003C/a>, Hill et al. [reference: WB2]\",\n        \"visdescription\": \"Share of population exposed to agricultural drought and location of areas exposed to agricultural drought.\",\n        \"textParagraph\": \"\",\n        \"weatherEventToggleText\": \"Exposed areas\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"20260130_hazard_data_prepared.csv\",\n        \"data\": \"1b0tjeAlBqbSgpOKmVE4xMafDRNvsUWG7_C_jDMsorFI\",\n        \"legend_title\": \"Population exposed\",\n        \"legend_units\": \"%\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"drought__sat__wld\",\n            \"text\": \"As [emphasis: \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">agricultural drought\u003C/span>] is mainly a challenge for the rural population, only rural areas are considered here. Locations exposed to [emphasis: \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">agricultural drought\u003C/span>] are based on the Agricultural Stress Index (ASI) developed by FAO.[reference: FAO2] [reference: VanHoolst] An [emphasis: \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">area\u003C/span>] is considered to be exposed to [emphasis: \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">agricultural drought\u003C/span>] if more than 30 percent of the cropland or pasture experienced severe drought[footnote:  Severe drought is defined when the FAO Agricultural Stress Index (ASI) exceeds 30.] in at least one of the past 39 years. When this threshold is exceeded, agricultural production losses are expected.\",\n            \"translationPrefix\": \"goal_13.content.#12.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"drought__sat__bbox1\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Agricultural drought\u003C/span>] is most prevalent in arid and semi-arid regions. In Eswatini, Lesotho, Namibia, and Zimbabwe more than half the population is exposed to drought.\",\n            \"translationPrefix\": \"goal_13.content.#12.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"drought__vec__wld\",\n            \"text\": \"Almost 1.4 billion people are exposed to [emphasis: \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">agricultural drought\u003C/span>][reference: WB2] and droughts can halt or reverse progress in poverty reduction and food security. Beyond agriculture, prolonged droughts also contribute to environmental degradation, forced migration, and heightened social tensions.\",\n            \"translationPrefix\": \"goal_13.content.#12.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_13.content.#12\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg13_effects_of_climate_change_scroller\",\n        \"title\": \"Exposure to cyclones\",\n        \"subtitle\": \"Area and share of population exposed to cyclones of category 2 or higher.[footnote:  The strength of a cyclone is assessed on a scale from 1 to 5 using the Saffir-Simpson Hurricane Wind Scale.]\",\n        \"source\": \"STORM [reference: Bloemendaal1], Hill et al. [reference: WB2]\",\n        \"visdescription\": \"Share of population exposed to cyclones and location of areas exposed to cyclones \",\n        \"textParagraph\": \"\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"weatherEventToggleText\": \"Exposed areas\",\n        \"data_download\": \"20260130_hazard_data_prepared.csv\",\n        \"data\": \"1b0tjeAlBqbSgpOKmVE4xMafDRNvsUWG7_C_jDMsorFI\",\n        \"legend_title\": \"Population exposed\",\n        \"legend_units\": \"%\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"cyclones__sat__wld\",\n            \"text\": \"Tropical [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">cyclones\u003C/span>] of category 2 or higher[footnote:  The Saffir Simpson scale is used to classify tropical cyclones into five categories (1–5) based solely on their maximum sustained wind speed. Cyclones with wind speeds over 154 km/h are classified as Category 2 and above and considered to cause extensive damage.] are associated with extensive damage to buildings and infrastructure.\",\n            \"translationPrefix\": \"goal_13.content.#15.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"cyclones__vec__bbox1\",\n            \"text\": \"The tropical [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">cyclone\u003C/span>] Melissa made landfall in Jamaica on October 28,  2025. It was the third most intense [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">cyclone\u003C/span>] in the Atlantic Ocean ever recorded, classified as a category 5 strength cyclone with wind speeds up to 300 km/h.[reference: WMO4] The damage to infrastructure and houses was enormous, but due to early warning systems, the number of casualties was limited at 50.[reference: NOAA1][emphasis: ]\",\n            \"translationPrefix\": \"goal_13.content.#15.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"cyclones__vec__wld\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">Cyclones\u003C/span>] occur over warm tropical oceans exposing people in their proximity. In fact, in many Small Island Developing States (SIDS), the entire population is exposed. Thirty-six small island developing states in the Caribbean and Pacific Ocean have 100 percent of their population exposed to tropical [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">cyclones\u003C/span>].[footnote:  These are the following small island developing states: Aruba, Anguilla, American Samoa, Antigua and Barbuda, Bonaire, Sint Eustatius and Saba, Bahamas, Saint Barthélemy, Bermuda, Barbados, Cuba, Curaçao, Cayman Islands, Dominica, Dominican Republic, Grenada, Guam, Haiti, Jamaica, Saint Kitts and Nevis, Saint Lucia, Saint Martin (French part), Northern Mariana Islands, Montserrat, Mauritius, Niue, Puerto Rico, Sint Maarten (Dutch part), Turks and Caicos Islands, Tonga, Taiwan, Saint Vincent and the Grenadines, British Virgin Islands, United States Virgin Islands, Vanuatu, Wallis and Futuna, Samoa. In Fiji more than 99 percent of the population is exposed.] \",\n            \"translationPrefix\": \"goal_13.content.#15.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_13.content.#15\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg13_effects_of_climate_change_scroller\",\n        \"title\": \"Exposure to heatwaves\",\n        \"subtitle\": \"Areas and share of population exposed to a heatwave.[footnote:   A heatwave is defined as having 5-day average maximum Wet-Bulb Globe Temperature exceeding 33 degrees  ]\",\n        \"source\": \"\u003Ca href=\\\"https://climateknowledgeportal.worldbank.org/\\\" target=\\\"_blank\\\">World Bank Climate Change Portal\u003C/a>, Hill et al. [reference: WB2]\",\n        \"visdescription\": \"Share of population exposed to heatwaves and location of areas exposed to heatwaves[emphasis: ]\",\n        \"textParagraph\": \"\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"20260130_hazard_data_prepared.csv\",\n        \"data\": \"1b0tjeAlBqbSgpOKmVE4xMafDRNvsUWG7_C_jDMsorFI\",\n        \"weatherEventToggleText\": \"Exposed areas\",\n        \"legend_title\": \"Population exposed\",\n        \"legend_units\": \"%\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"heatwave__sat__wld\",\n            \"text\": \"The impact heat has on the human body also depends on other factors such as humidity and wind. Instead of using a simple temperature measure, we rely on a measure called the Wet-Bulb Globe Temperature (WBGT), as it better captures the effect of temperature on the human body. If the WBGT exceeds 33 degrees Celsius, it becomes difficult for healthy humans to maintain a normal body temperature, which leads to increased mortality and hospitalizations. The capacity to do physical work is also halved.[reference: WB2] \",\n            \"translationPrefix\": \"goal_13.content.#17.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"heatwave__sat__bbox\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(170,0,0);\\\">Heatwaves\u003C/span>] are mostly prevalent in the tropics. More than three quarters of the global population exposed to heatwaves live in four populous countries in Asia: India, China, Pakistan, Bangladesh. \",\n            \"translationPrefix\": \"goal_13.content.#17.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"heatwave__vec__wld\",\n            \"text\": \"Globally, 40 percent of the population is exposed to [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(170,0,0);\\\">heatwaves\u003C/span>]. The share of people exposed to [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(170,0,0);\\\">heatwaves\u003C/span>] is especially high in countries around the Equator in Africa, South-East Asia and the Arabian peninsula.\",\n            \"translationPrefix\": \"goal_13.content.#17.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_13.content.#17\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"sdg13_effects_of_climate_change\",\n        \"title\": \"57 percent of global population exposed to climate-related hazards\",\n        \"subtitle\": \"Share of population exposed to at least one climate-related hazard\",\n        \"source\": \"Hill et al. [reference: WB2]\",\n        \"visdescription\": \"Share of population exposed to at least one climate hazard\",\n        \"textParagraph\": \"The exposure to the climate hazards floods, agricultural droughts, cyclones and heatwaves depends on the geographical location of a country. In 44 countries the entire population is exposed to at least one climate hazard.\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"20260130_hazard_data_prepared.csv\",\n        \"data\": \"1b0tjeAlBqbSgpOKmVE4xMafDRNvsUWG7_C_jDMsorFI\",\n        \"overlay\": \"total_population\",\n        \"layer_toggle_label_on\": \"Total\",\n        \"layer_toggle_label_off\": \"Share\",\n        \"scale_title\": \"Percentage of population exposed to climate-related hazards\",\n        \"scale_title_pop\": \"Total number of people exposed to climate-hazard\",\n        \"button_total\": \"Total population\",\n        \"button_share\": \"Share of population\",\n        \"scale_title_sha\": \"Percentage of population exposed to climate effects\",\n        \"keyFact\": \"4.5 billion\",\n        \"keyFactLabel\": \"people are exposed to climate-related hazards\",\n        \"legend_title\": \"Percentage of population exposed to climate effects\",\n        \"legend_units\": \"%\",\n        \"translationPrefix\": \"goal_13.content.#19\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg13_icon_matrix\",\n        \"title\": \"Vulnerability to climate hazards\",\n        \"subtitle\": \"Number of people vulnerable by dimension, 2024\",\n        \"source\": \"Source of the data\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"default\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"climate_vulnerability.zip\",\n        \"data\": \"1jnqFJhuylAsTw4s3XqgNSyLhIP4xF_nono5w93QKnSQ\",\n        \"keyFact\": \"2.8 billion\",\n        \"keyFactLabel\": \"people are highly vulnerable to shocks\",\n        \"label__x_axis\": \"Each group is 1000 squares\",\n        \"label__legend\": \"1 square equals $x people\",\n        \"label__vul_atleastone\": \"Vulnerable in at least 1 way\",\n        \"label__vul_inc\": \"Income vulnerability\",\n        \"label__vul_educ\": \"Education vulnerability\",\n        \"label__vul_fin\": \"Financial inclusion vulnerability\",\n        \"label__vul_sp\": \"Social protection vulnerability\",\n        \"label__vul_elec\": \"Electricity vulnerability\",\n        \"label__vul_water\": \"Water vulnerability\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"multi__grid__vuln__wld\",\n            \"text\": \"There are 1,000 squares in each column and each individual square represents 8 million people. More than a third of the[emphasis:  ][emphasis: \u003Cspan data-color-id=\\\"WLD\\\" class=\\\"WLD\\\">global population\u003C/span>], or 2.8 billion people, are vulnerable in at least one dimension. Almost half of them are vulnerable along two or more dimensions. Lack of social protection is the most common source of vulnerability, with 20 percent of the global population facing it. Lack of access to financial services, lack of education, and living in extreme poverty are the next leading causes of vulnerability. \",\n            \"translationPrefix\": \"goal_13.content.#25.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"multi__grid__vuln__nac\",\n            \"text\": \"The level of vulnerability ranges from 1.2 to 93 percent across regions. In [emphasis: \u003Cspan data-color-id=\\\"NAC\\\" class=\\\"NAC\\\">North America\u003C/span>], only 1.7 percent of the population are identified as being vulnerable. These are people living in extreme poverty or lacking basic education.\",\n            \"translationPrefix\": \"goal_13.content.#25.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"multi__grid__vuln__ssf\",\n            \"text\": \"In [emphasis: \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa,\u003C/span>] a staggering 94 percent of the population is vulnerable. Lack of social protection impacts 3 out of 4 people in the region and lack of access to electricity or extreme poverty affects half the population. \",\n            \"translationPrefix\": \"goal_13.content.#25.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"multi__explore\",\n            \"text\": \"Select a country or region to see the share of population that is vulnerable and which dimensions of vulnerability are driving it.\",\n            \"translationPrefix\": \"goal_13.content.#25.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_13.content.#25\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg13_icon_matrix\",\n        \"title\": \"Population at risk depends on both vulnerability and exposure\",\n        \"subtitle\": \"Comparing countries with similar levels of exposure or vulnerability\",\n        \"source\": \"Source of the data\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"default\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"climate_vulnerability.zip\",\n        \"data\": \"1jnqFJhuylAsTw4s3XqgNSyLhIP4xF_nono5w93QKnSQ\",\n        \"keyFact\": \"1.5 billion\",\n        \"keyFactLabel\": \"people are at high risk (exposed and highly vulnerable) to climate-related hazards\",\n        \"label__x_axis\": \"Each group is 1000 squares\",\n        \"label__legend\": \"1 square equals $x people\",\n        \"label__highly_vulnerable\": \"Vulnerable in at least 1 way\",\n        \"label__at_risk\": \"At risk\",\n        \"label__not_vulnerable\": \"Not vulnerable\",\n        \"label__exposed\": \"Exposed to climate risks\",\n        \"label__not_exposed\": \"Not exposed\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"mono__grid__vul__bfa_ken\",\n            \"text\": \"[emphasis: Burkina Faso ]and [emphasis: Kenya ]have similar levels of [emphasis: vulnerability]: in both countries around 9 in 10 people  are identified as vulnerable in at least one dimension.\",\n            \"translationPrefix\": \"goal_13.content.#30.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"mono__diff__vul_exp__bfa_ken\",\n            \"text\": \"But the [emphasis: exposure ]to climate hazards is three times higher in Burkina Faso. Combining the number of people vulnerable with those exposed, only 1 in 4 people in Kenya are at risk from climate hazards, compared with 3 in 4 people in Burkina Faso. \",\n            \"translationPrefix\": \"goal_13.content.#30.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"mono__grid__exp__phl_vnm\",\n            \"text\": \"In the East Asia and Pacific, the populations of the [emphasis: Philippines ]and [emphasis: Vietnam] are similarly [emphasis: exposed ]to climate hazards. In both countries almost 9 out of 10 people are exposed. \",\n            \"translationPrefix\": \"goal_13.content.#30.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"mono__diff__exp_vul__phl_vnm\",\n            \"text\": \"However, despite similar [emphasis: exposure ]profiles, slightly more than half the people are at risk in the Philippines, while the same is true for around 20 percent of the Vietnamese population. This is due to the differing levels of vulnerability. In the Philippines, 3 out of 5 people are vulnerable, while the same is true for only 1 in 5 people in Vietnam.\",\n            \"translationPrefix\": \"goal_13.content.#30.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_13.content.#30\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg13_regional_exposure_vuln\",\n        \"title\": \"The number of people at high risk from climate-related hazards has almost halved since 2010\",\n        \"subtitle\": \"Population shares defined as being at high-risk from climate-related hazards in 2010 and 2023\",\n        \"source\": \"Source of the data\",\n        \"visdescription\": \"The visualization shows the change in the share of global and regional populations defined as being at high risk of climate-related hazards between 2010 and 2023. The map shows that all regions have experienced a decrease in the share at high risk, due to decreasing vulnerability.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"climate_vulnerability.zip\",\n        \"data\": \"1jnqFJhuylAsTw4s3XqgNSyLhIP4xF_nono5w93QKnSQ\",\n        \"label__total_population\": \"Total population\",\n        \"label__population_exposed\": \"Population exposed\",\n        \"label__population_exposed_at_risk\": \"Population exposed and at risk\",\n        \"label__legend_units\": \"Millions\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"map_2010\",\n            \"text\": \"On this map, the size of the grey circles is proportional to the size of the population of the seven World Bank regions. The blue circle shows the size of the population exposed to climate-related hazards. And the red circle shows the size of the population both exposed and vulnerable to climate-related hazards.\",\n            \"translationPrefix\": \"goal_13.content.#36.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"map_2024\",\n            \"text\": \"By 2024, both total populations and the number of people exposed to climate hazards increased in several regions. However, the [emphasis: share of people at high risk] still declined in most regions because the number of highly vulnerable people significantly reduced. In East Asia and the Pacific, the highly vulnerable population dropped sharply from 1.3 billion in 2010 to 350 million in 2024. South Asia saw a similar trend, with the number declining from 946 million to 378 million over the same period. In contrast, Sub-Saharan Africa experienced an increase: the number of highly vulnerable people rose from 290 million in 2010 to more than 450 million in 2024.\",\n            \"translationPrefix\": \"goal_13.content.#36.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_13.content.#36\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"sdg13_regional_exposure_bars\",\n        \"title\": \"The number of people at high risk from climate-related hazards has almost halved since 2010\",\n        \"subtitle\": \"Population shares defined as being at high-risk from climate-related hazards in 2010 and 2023\",\n        \"x_title\": \"Population\",\n        \"x_units\": \"Million\",\n        \"source\": \"Source of the data\",\n        \"visdescription\": \"The visualization shows the change in the share of global and regional populations defined as being at high risk of climate-related hazards between 2010 and 2023. The map shows that all regions have experienced a decrease in the share at high risk, due to decreasing vulnerability.\",\n        \"textParagraph\": \"In many regions in 2010, most of those exposed to climate hazards were also highly vulnerable. As a result, large shares of the populations were at high risk from climate hazards. By 2024, both total populations and the number of people exposed to climate hazards increased in several regions. However, the [emphasis: share of people at high risk] still declined in most regions because the number of highly vulnerable people significantly reduced. In East Asia and the Pacific, the highly vulnerable population dropped sharply from 1.3 billion in 2010 to 350 million in 2024. South Asia saw a similar trend, with the number declining from 946 million to 378 million over the same period. In contrast, Sub-Saharan Africa experienced an increase: the number of highly vulnerable people rose from 290 million in 2010 to more than 450 million in 2024.\",\n        \"visSize\": \"small\",\n        \"data_download\": \"climate_vulnerability.zip\",\n        \"data\": \"1jnqFJhuylAsTw4s3XqgNSyLhIP4xF_nono5w93QKnSQ\",\n        \"label__total_population\": \"Total population\",\n        \"label__population_exposed\": \"Population exposed\",\n        \"label__population_exposed_at_risk\": \"Population exposed and at risk\",\n        \"label__legend_units\": \"Millions\",\n        \"translationPrefix\": \"goal_13.content.#37\"\n      }\n    ]\n  },\n  \"14\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"plastic_production\",\n        \"title\": \"Plastic use projected to triple by 2060\",\n        \"subtitle\": \"Baseline scenario (no policy change)\",\n        \"y_axis_title\": \"Plastics use \",\n        \"y_axis_units\": \"million tonnes\",\n        \"source\": \"OECD (2022), \u003Ca href=\\\"https://doi.org/10.1787/aa1edf33-en\\\" target=\\\"_blank\\\">Global Plastics Outlook: Policy Scenarios to 2060\u003C/a>, OECD Publishing, Paris, \u003Ca href=\\\"https://doi.org/10.1787/aa1edf33-en\\\" target=\\\"_blank\\\">doi.org/10.1787/aa1edf33-en\u003C/a>.\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"14.data.plastic_production.csv\",\n        \"data\": \"1gAhYCLl9lgWJ91oHviSXld3bwOf-eALwXML0KNHDaMQ\",\n        \"translationPrefix\": \"goal_14.content.#5\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"plastic_waste\",\n        \"title\": \"Mismanaged plastic quantity set to grow\",\n        \"subtitle\": \"Plastic waste (million tonnes), by waste management type\",\n        \"y_axis_title\": \"Plastic waste\",\n        \"y_axis_units\": \"million tonnes\",\n        \"recycled\": \"Recycled\",\n        \"incinerated\": \"Incinerated\",\n        \"landfilled\": \"L
