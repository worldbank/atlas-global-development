ry in one year\",\n        \"since\": \"since\",\n        \"starting\": \"for countries with similar\",\n        \"in_label\": \"in\",\n        \"improvement\": \"↑ Improvement\",\n        \"fallback\": \"No progress speed data for this goal. Switch goal to see progress speed.\",\n        \"slowcountry\": \"slow progress\",\n        \"typicalcountry\": \"typical progress\",\n        \"fastcountry\": \"fastest progress\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"intro\",\n            \"text\": \"In the Atlas, each square represents a data point for a particular country, year, and development indicator. You can change the selected indicator in the dropdown in the top left of the screen. ↖️\",\n            \"translationPrefix\": \"goal_dashboard.content.#11.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"indicator\",\n            \"text\": \"This shows the [emphasis: latest available values] for the [emphasis: {selectedDashboardIndicator}] across countries, with larger squares signifying higher values. \",\n            \"translationPrefix\": \"goal_dashboard.content.#11.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"progress_top\",\n            \"text\": \"Current outcomes do not reveal how much progress has been made. In this illustrative chart, a dark triangle represents the latest observed value, while a transparent triangle represents the level the country would have reached under the typical pace of progress between 2015 and the last year with data. When the dark triangle lies ahead of the transparent one, the country’s progress is faster than typical.\",\n            \"translationPrefix\": \"goal_dashboard.content.#11.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"progress_comparison\",\n            \"text\": \"Let’s look at a [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(180,175,154);\\\">slow-\u003C/span>], a [emphasis: \u003Cspan style=\\\"background-color: rgb(255,221,146);\\\">typical-\u003C/span>], and a [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,161,196);\\\">fast-\u003C/span>][emphasis:  progressing country]. For the country with [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,161,196);\\\">fast\u003C/span>] progress, the dark triangle is ahead of the transparent triangle, so the country is outperforming the typical pattern. For the [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(180,175,154);\\\">slow\u003C/span>] country, outcomes are worse than they would have been under the typical pace of progress. \",\n            \"translationPrefix\": \"goal_dashboard.content.#11.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"progress_all\",\n            \"text\": \"Now, let’s [emphasis: compare the speed of progress of all countries]. The countries on the left made the slowest progress, often reversing outcomes, while those on  the right made the fastest progress.\",\n            \"translationPrefix\": \"goal_dashboard.content.#11.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"explore\",\n            \"text\": \"Some countries that were far apart 10 years ago have similar outcomes today because they have progressed at different speeds. See how this carries through in other Atlas of Global Development Indicators by changing the selected indicator in the dropdown in the top left of the screen. ↖️. You can bring up details by hovering over the countries or highlight individual countries in the dropdown in the top right of the screen\u003Cspan style=\\\"color: rgb(68,71,70); background-color: rgb(255,255,255);\\\">.\u003C/span>\u003Cspan id=\\\"explore-scene\\\" />\",\n            \"translationPrefix\": \"goal_dashboard.content.#11.scenes.#5\"\n          }\n        ],\n        \"translationPrefix\": \"goal_dashboard.content.#11\"\n      }\n    ]\n  },\n  \"id4d\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Types of credentials\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-types-of-credentials.png\",\n        \"translationPrefix\": \"goal_id4d.content.#4\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Adults with ID by region\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-adults-with-id-regions.png\",\n        \"translationPrefix\": \"goal_id4d.content.#7\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Foundational coverage\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-foundational-id-coverage.png\",\n        \"translationPrefix\": \"goal_id4d.content.#8\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Population with and without ID\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id-populations-marimekko.png\",\n        \"translationPrefix\": \"goal_id4d.content.#9\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Indicators of lacking ID\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-indicators-lack-of-id.png\",\n        \"translationPrefix\": \"goal_id4d.content.#11\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Gender gap\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-gender-gap.png\",\n        \"translationPrefix\": \"goal_id4d.content.#13\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Barriers of lacking ID\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-barriers.png\",\n        \"translationPrefix\": \"goal_id4d.content.#16\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Barriers experienced\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-barriers-experienced.png\",\n        \"translationPrefix\": \"goal_id4d.content.#18\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Digital ID issued\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/eid-issued.png\",\n        \"translationPrefix\": \"goal_id4d.content.#23\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Digital ID ownership\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-digital-id-ownership.png\",\n        \"translationPrefix\": \"goal_id4d.content.#25\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Digital ID usage\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/id4d-digital-id-usage.png\",\n        \"translationPrefix\": \"goal_id4d.content.#26\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Digital ID ownership and usage\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"filename\": \"id4d/eid-ownership-use.png\",\n        \"translationPrefix\": \"goal_id4d.content.#28\"\n      }\n    ]\n  },\n  \"progress\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"poverty_progress_comparison\",\n        \"title\": \"Which country made the most progress?\",\n        \"subtitle\": \"Poverty rate (%)\",\n        \"country_left\": \"CIV\",\n        \"country_right\": \"GEO\",\n        \"percentage_points\": \"pp\",\n        \"target\": \"2030 target\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank Poverty and Inequality Platform\u003C/a>, \u003Ca href=\\\"https://www.worldbank.org/en/publication/macro-poverty-outlook\\\" target=\\\"_blank\\\">World Bank Macro and Poverty Outlook April 2026\u003C/a>.\",\n        \"visdescription\": \"Compares progress in poverty reduction in Côte d’Ivoire and Georgia from 2015 to 2025 using different common metrics of progress.\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">\u003C/span>\",\n        \"data_download\": \"progress.data.poverty_slopecharts.csv\",\n        \"data\": \"1U7w6yGILXAxwpQ15FWtQmbxjDdhyAFjhfSyLwyUpyN8\",\n        \"indicator_360\": \"WB_WDI_SI_POV_DDAY\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"simple\",\n            \"text\": \"Between 2015 and 2025, both countries made impressive reductions in poverty, with Côte d’Ivoire reducing poverty from 26.3 percent to 16.1 percent and Georgia from 10.6 percent to 3.5 percent. \",\n            \"translationPrefix\": \"goal_progress.content.#7.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"percentage_points\",\n            \"text\": \"If we compare this in [emphasis: percentage points], Côte d’Ivoire has made the most progress, with 10.2 percent of its population escaping poverty over the 10-year period, compared to around 7.1 percent of Georgia’s population.\",\n            \"translationPrefix\": \"goal_progress.content.#7.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"percentages\",\n            \"text\": \"Yet Georgia could hardly have matched Côte d’Ivoire’s feat, as only 10.6 percent of the population was in poverty at the start of the period. If we look instead at the decline in [emphasis: percent] (reflecting the share of the poor population that has escaped poverty), then Georgia made the most progress, as 67 percent of its poor population escaped poverty, compared to 39 percent in Côte d’Ivoire.\",\n            \"translationPrefix\": \"goal_progress.content.#7.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_progress.content.#7\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"poverty_rate_change_scroller\",\n        \"title\": \"The relationship between changes in poverty and levels of poverty\",\n        \"subtitle\": \"\u003Cspan style=\\\"background-color: rgb(229,36,59);\\\">\u003C/span>\",\n        \"best_half\": \"50% best changes\",\n        \"worst_half\": \"50% worst changes\",\n        \"faster_progress\": \"Faster than typical progress\",\n        \"slower_progress\": \"Slower than typical progress\",\n        \"axis_title_y_left\": \"Change in poverty rate\",\n        \"axis_units_y_left\": \"5 year, annualized\",\n        \"axis_title_x_left\": \"Baseline poverty rate\",\n        \"axis_units_x_left\": \"%\",\n        \"axis_title_y_right\": \"Poverty rate\",\n        \"axis_units_y_right\": \"%\",\n        \"axis_title_x_right\": \"Years since full poverty\",\n        \"in_2015\": \"in 2015\",\n        \"percentage_points\": \"pp\",\n        \"years\": \"years\",\n        \"country_1\": \"CIV\",\n        \"country_2\": \"GEO\",\n        \"country_standstill\": \"SLE\",\n        \"country_regress\": \"MWI\",\n        \"visSize\": \"fullScreen\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank Poverty and Inequality Platform\u003C/a>, \u003Ca href=\\\"https://www.worldbank.org/en/publication/macro-poverty-outlook\\\" target=\\\"_blank\\\">World Bank Macro and Poverty Outlook April 2026\u003C/a>, \u003Ca href=\\\"https://doi.org/10.1596/1813-9450-11350\\\" target=\\\"_blank\\\">Mahler et al. (2026)\u003C/a>, and \u003Ca href=\\\"https://hdl.handle.net/10986/43363\\\" target=\\\"_blank\\\">Mahler et al. (2025)\u003C/a>.\",\n        \"visdescription\": \"Shows the typical changes in poverty rates as a function of initial changes in poverty rates, and how this predicts typical trajectories of poverty rates.\",\n        \"data_download\": \"progress.data.poverty_rate_change.zip\",\n        \"data\": \"1z6pnQuuVZ65e1v_6fa1PcrpktWHD7qdpVa8ekuV6Ku8\",\n        \"indicator_360\": \"WB_WDI_SI_POV_DDAY\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"all\",\n            \"text\": \"First, we use all poverty data around the world since 1950 to plot changes in poverty rates over five years as a function of the poverty rate at the start of the five-year period (baseline poverty rate).\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"median\",\n            \"text\": \"Next, we estimate the typical change in poverty as a function of the level of poverty. That is, we divide the observed changes so that at every baseline poverty rate, approximately \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(177,67,199);\\\">half are above the line\u003C/span> and \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,113,188);\\\">half are below it\u003C/span>.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"median_explanation1\",\n            \"text\": \"Changes in poverty are typically smallest (in absolute terms) for very low and very high poverty rates and largest for poverty rates around 50 percent.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"median_explanation2\",\n            \"text\": \"A country with a 50 percent poverty rate typically decreases poverty by 0.73 percentage points the following year…\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"median_explanation3\",\n            \"text\": \"…while a country with a 5 percent poverty rate typically decreases poverty by 0.22 percentage points the following year.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country1_15\",\n            \"text\": \"From this, we can trace out a typical trajectory from any starting point. If we look at Côte d’Ivoire’s 2015 poverty rate of 26.3 percent, the typical change is -0.65.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country1_16\",\n            \"text\": \"So, if Côte d’Ivoire had followed the typical pattern, in 2016, its poverty rate would have been 25.6 percent.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#6\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country1_25\",\n            \"text\": \"Following this method iteratively, we can trace the typical path a country with Côte d’Ivoire’s starting point would have followed over 10 years.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#7\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country1_actual\",\n            \"text\": \"Next, we compare that with Côte d’Ivoire’s actual trend from 2015 to 2025.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#8\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country1_end\",\n            \"text\": \"The progress Côte d’Ivoire achieved between 2015 and 2025 would have typically taken until 2033. In other words, Côte d’Ivoire achieved in 10 years what would typically take 17 years. We denote this a speed of 1.7, reflecting that Côte d’Ivoire developed nearly twice as fast as the typical experience.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#9\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country2\",\n            \"text\": \"If we do the same for Georgia, we can see that its progress over 10 years was equivalent to what typically takes 25 years, giving us a speed of 2.5 suggesting that Georgia made faster progress than Côte d’Ivoire.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#10\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"start_s_curve\",\n            \"text\": \"Let us now take a look at the pathway for a country that starts entrenched in extreme poverty.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#11\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"s_curve\",\n            \"text\": \"At the typical speed of progress, ending poverty would take two and a half centuries.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#12\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"s_curve_countries\",\n            \"text\": \"Let us now compare how far countries moved on this trajectory from 2015 and 2025.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#13\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"s_curve_annotation1\",\n            \"text\": \"The black circle denotes Côte d'Ivoire’s position in 2015.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#14\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"s_curve_annotation2\",\n            \"text\": \"Over the next 10 years, Côte d'Ivoire reduced poverty by 10.2 percentage points, moving almost twice as fast as the typical rate of countries at a similar level of development.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#15\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"s_curve_country2\",\n            \"text\": \"Over the same 10 years, Georgia reduced its poverty rate by 7 percentage points, a reduction typically seen over a period of 25 years. So Georgia moved at a speed of three.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#16\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country_no_progress\",\n            \"text\": \"Sierra Leone, by contrast, made no progress and it moved at a speed of zero.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#17\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"country_regression\",\n            \"text\": \"In Malawi, progress reversed, and it moved at a speed of minus one, undoing about one year of typical progress every year.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#18\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"all_countries\",\n            \"text\": \"If we add all countries, we can see that those that made large positive headways on the path had a high speed of progress, and vice versa.\",\n            \"translationPrefix\": \"goal_progress.content.#10.scenes.#19\"\n          }\n        ],\n        \"translationPrefix\": \"goal_progress.content.#10\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"projection_country\",\n        \"title\": \"Possible poverty targets for Côte d'Ivoire\",\n        \"country_rate\": \"Côte d'Ivoire's poverty rate (%)\",\n        \"rate1\": \"Typical speed\",\n        \"rate2\": \"Continuing its own speed from 2015–25 (2x typical speed)\",\n        \"rate4\": \"Accelerated speed (4x typical speed)\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank Poverty and Inequality Platform\u003C/a>, \u003Ca href=\\\"https://www.worldbank.org/en/publication/macro-poverty-outlook\\\" target=\\\"_blank\\\">World Bank Macro and Poverty Outlook October 2025\u003C/a>, \u003Ca href=\\\"https://doi.org/10.1596/1813-9450-11350\\\" target=\\\"_blank\\\">Mahler et al. (2026)\u003C/a>, and \u003Ca href=\\\"https://hdl.handle.net/10986/43363\\\" target=\\\"_blank\\\">Mahler et al. (2025)\u003C/a>.\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">\u003C/span>\",\n        \"visdescription\": \"The visualization shows poverty rates Côte d'Ivoire could target by 2050. \",\n        \"visSize\": \"default\",\n        \"data_download\": \"progress.data.poverty_projection_country.zip\",\n        \"data\": \"1RQA8Xku_eDlTuTjllU9Se84_m6VzJ6o_QisB5AXdks8\",\n        \"indicator_360\": \"WB_WDI_SI_POV_DDAY\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"past_decade\",\n            \"text\": \"In 2025, Côte d’Ivoire’s poverty rate was 15.9 percent.\",\n            \"translationPrefix\": \"goal_progress.content.#15.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"speed_double\",\n            \"text\": \"At the typical speed of progress, poverty will be driven down to 6.8 percent in 2050. This is one possible 2050 target for Côte d’Ivoire.\",\n            \"translationPrefix\": \"goal_progress.content.#15.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"speed_typical\",\n            \"text\": \"But Côte d’Ivoire moved twice as fast as the typical speed in the past decade. If it continues at this speed, it would reach a poverty rate of 2.6 percent by 2050.\",\n            \"translationPrefix\": \"goal_progress.content.#15.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"speed_4x\",\n            \"text\": \"It could also choose an even more ambitious target, such as moving at four times the typical speed. This would reflect some of the fastest movers we have seen. Under such a scenario, it should target a 0.5 percent poverty rate by 2050.\",\n            \"translationPrefix\": \"goal_progress.content.#15.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_progress.content.#15\"\n      }\n    ]\n  }\n}"}</script>
