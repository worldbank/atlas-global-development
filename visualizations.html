color-id=\\\"cat4\\\" class=\\\"cat4\\\">water free from contamination\u003C/span>, or water \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">accessible on premises\u003C/span>, or \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">water available when needed\u003C/span> and years left to reach universal access (% of people using improved water sources)\",\n        \"access\": \"Accessibility\",\n        \"availability\": \"Availability\",\n        \"quality\": \"Quality\",\n        \"x_axis_title\": \"Year\",\n        \"x_axis_title_typical\": \"Years left to reach universal access\",\n        \"pp\": \"pp\",\n        \"years\": \"years\",\n        \"source\": \"WHO/UNICEF Joint Monitoring Programme (JMP) for Water Supply, Sanitation and Hygiene, \u003Ca href=\\\"https://washdata.org/data/downloads#WLD\\\" target=\\\"_blank\\\">JMP Global Database\u003C/a>; World Bank staff calculations. \",\n        \"note\": \"For details on the progress speed, refer to the Explainer and Explore Data sections. \",\n        \"visdescription\": \"Three line charts showing the share of population meeting each component of safely managed drinking water—quality, accessibility, and availability—from 2000 to 2024. Each line represents one component, and the slope indicates how quickly it is changing. In the final two scenes, the charts compare progress in Tanzania with the typical trajectory. \",\n        \"visSize\": \"default\",\n        \"data_download\": \"06.data.drinking_water_progress.zip\",\n        \"data\": \"1VT3PtyjplyFtkVFZqeKIO4lbsaLMPb2CIeWi_HcbZkc\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"tanzania_start\",\n            \"text\": \"In 2000, while nearly 15 percent of people in Tanzania had access to \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">uncontaminated water\u003C/span>, only 1 percent had access to \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">water on premises\u003C/span>.\",\n            \"translationPrefix\": \"goal_06.content.#21.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"tanzania_progress\",\n            \"text\": \"Over the next two decades, \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">accessibility\u003C/span> improved dramatically but \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">water quality\u003C/span> lagged. Infrastructure expanded rapidly and by 2024, almost half the population had water on premises. Yet only about one-third had access to uncontaminated water.\",\n            \"translationPrefix\": \"goal_06.content.#21.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2_Id\",\n            \"text\": \"Is this pattern unique to Tanzania? Let’s take a look at the average path of progress across countries from 2000 to 2024. Using historical country-level data, we estimate a “typical” trajectory of improvement for each component of safely managed drinking water (see [progress-paper] for the methodology).\",\n            \"translationPrefix\": \"goal_06.content.#21.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene3_Id\",\n            \"text\": \"The contrast is striking. On the typical path, increasing water \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">accessibility\u003C/span> from 40 percent to 75 percent of the population would take 33 years.\",\n            \"translationPrefix\": \"goal_06.content.#21.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene4_Id\",\n            \"text\": \"Achieving the same scale of progress in \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">water quality\u003C/span> would take 101 years, or three times longer.\",\n            \"translationPrefix\": \"goal_06.content.#21.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#21\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"ecoli_table\",\n        \"title\": \"Levels of fecal contamination risk\",\n        \"subtitle\": \"\u003Ci>E.coli\u003C/i> colony-forming units (CFU)/100mL\",\n        \"visSize\": \"default\",\n        \"source\": \"WHO and UNICEF. 2020.\u003Ca href=\\\"https://washdata.org/reports/jmp-2020-water-quality-testing-household-surveys\\\" target=\\\"_blank\\\"> Integrating Water Quality Testing into Household Surveys: Thematic Report on Drinking Water.\u003C/a> New York: World Health Organization and the United Nations Children’s Fund.\",\n        \"note\": \"CFU measures the number of viable \u003Ci>E. coli\u003C/i> bacteria in a water sample, expressed as CFU per 100 mL.\",\n        \"visdescription\": \"Table showing \u003Ci>E. coli\u003C/i> risk levels based on the number of CFU per 100 mL of water. Risk levels are classified as low (fewer than 1 CFU per 100 mL), moderate (1 to 10), high (11 to 100), and very high (more than 100).\",\n        \"data_download\": \"E-coli Table.csv\",\n        \"data\": \"13g6UiprsJF83hmkagPcHQdzRRqzym7cWY99bg91vU8Q\",\n        \"riskLevelHeaderLabel\": \"\u003Ci>E. Coli \u003C/i> risk level\",\n        \"countHeaderLabel\": \"Count in 100mL water\",\n        \"lowRiskLabel\": \"Low risk\",\n        \"mediumRiskLabel\": \"Medium risk\",\n        \"highRiskLabel\": \"High risk\",\n        \"veryHighRiskLabel\": \"Very high risk\",\n        \"translationPrefix\": \"goal_06.content.#32\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"e_coli\",\n        \"title\": \"\u003Ci>E. coli\u003C/i> contamination at point of use is worse than at point of water collection\",\n        \"subtitle\": \"30 countries with the largest shares of population using drinking water sources with high or very high fecal contamination risk (% of population)\",\n        \"source\": \"\u003Ca href=\\\"https://washdata.org/reports/jmp-2025-wash-households\\\" target=\\\"_blank\\\">Progress on household drinking water,sanitation and hygiene 2000–2024: special focus on inequalities.\u003C/a> Geneva: World Health Organization (WHO) and the United Nations Children’s Fund (UNICEF), 2025.\",\n        \"visdescription\": \"Dumbbell chart comparing E. coli contamination levels at point of collection and point of use, showing contamination at source and after water is stored or handled in households in 30 countries. The difference between these two stages, highlights how contamination can change between collection and use.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"Ecoli_PoC_PoU_Scatter (High+Very High).csv\",\n        \"data\": \"1gbR8q_t54y-HLl8OHW0pqmbbKHrQlWvm0u6V9j6_zS8\",\n        \"keyFact\": \"In 26\",\n        \"keyFactLabel\": \"countries more than half of the population is exposed to drinking water contaminated with high or very high levels of E. coli.\",\n        \"pointOfCollectionLabel\": \"Point of collection\",\n        \"pointOfUseLabel\": \"Point of use\",\n        \"xAxisTitle\": \"Share of population at risk of contamination (%)\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1\",\n            \"text\": \"Let’s look at the shares of people who use water with high and very high \u003Ci>E. coli \u003C/i> risk levels at[emphasis:  ][emphasis: \u003Cspan style=\\\"background-color: rgb(236,182,59);\\\">point of collection\u003C/span>]. In 15 countries, at least half the population collects drinking water that already has high or very high levels of \u003Ci>E. coli\u003C/i> contamination.  \",\n            \"translationPrefix\": \"goal_06.content.#35.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2\",\n            \"text\": \"Contamination rates are even higher when measured at [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(141,65,23);\\\">point of use\u003C/span>]. In 26 countries, more than half the population drinks water with high or very high risk of \u003Ci>E.coli\u003C/i> contamination, as shown by household-level tests.  \",\n            \"translationPrefix\": \"goal_06.content.#35.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene3\",\n            \"text\": \"In 28 countries, contamination levels [emphasis: at ][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(141,65,23);\\\">point of use\u003C/span>] were higher than at [emphasis: \u003Cspan style=\\\"background-color: rgb(236,182,59);\\\">point of collection\u003C/span>]. For example, in [emphasis: Malawi], 36 percent of the population are exposed to high or very high levels of contamination at point of collection, rising to 81 percent at point of use.  \",\n            \"translationPrefix\": \"goal_06.content.#35.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#35\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"e_coli_urban_rural\",\n        \"title\": \"Exposure to \u003Ci>E. coli\u003C/i> contamination is higher among rural than urban residents\",\n        \"subtitle\": \"The 10 countries with the largest urban–rural gap in exposure to high or very high contamination risk at point of collection (% of population)\",\n        \"source\": \"Multiple Indicator Cluster Survey (MICS) program. \u003Ca href=\\\"https://mics.unicef.org/surveys\\\" target=\\\"_blank\\\">MICS Surveys.\u003C/a> UNICEF; \u003Ca href=\\\"https://washdata.org/reports/drinking-water-quality-ethiopia-ess-2016\\\" target=\\\"_blank\\\">Drinking Water Quality in Ethiopia Results from the 2016 Ethiopia Socioeconomic Survey\u003C/a>, Central Statistical Agency of Ethiopia; 2017.\",\n        \"note\": \"The data are compiled from country-level survey reports, including MICS and the Ethiopian Socioeconomic Survey.\",\n        \"visdescription\": \"Bar chart showing selected countries with the largest shares of population exposed to high or very high E. coli contamination risk in drinking water. The chart allows comparison of contamination risk between rural (top bar) and urban (bottom bar) populations.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"E-coli urban rural.csv\",\n        \"data\": \"1tX2nJM2-L9VPg9-Pjt-10GwVI_VX0DhvmsK4TjgG9HQ\",\n        \"legendUrban\": \"Urban\",\n        \"legendRural\": \"Rural\",\n        \"gapLabel\": \"gap\",\n        \"translationPrefix\": \"goal_06.content.#42\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"bangladesh_arsenic_grouped\",\n        \"title\": \"In Bangladesh, rural dwellers and poorer people are more exposed to arsenic-contaminated water\",\n        \"subtitle\": \"Arsenic contamination levels, by residence and selected wealth quintiles (% of population) \",\n        \"source\": \"Bangladesh Bureau of Statistics, UNICEF Bangladesh. Bangladesh MICS 2019 Water Quality Thematic Report. Dhaka, Bangladesh: 2021.\",\n        \"visdescription\": \"Three bar charts showing the share of Bangladesh’s population exposed to arsenic contamination in drinking water, grouped by concentration levels of 10–50 ppb and above 50 ppb. The left column shows rural populations; the middle column, urban populations; and the right column, the total population. In the next scene, the same data are presented by wealth quintiles, with the poorest on the left, the middle in the center, and the richest on the right.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"Bangladesh_arsenic_by_group.csv\",\n        \"data\": \"1xkV7EjXu81i_l6ng7tjSdVHXpkRBet5uTGlemMqtG6E\",\n        \"legendUrban\": \"Urban\",\n        \"legendRural\": \"Rural\",\n        \"legendTotal\": \"Total\",\n        \"legendPoorest\": \"Poorest\",\n        \"legendMiddle\": \"Middle\",\n        \"legendRichest\": \"Richest\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1\",\n            \"text\": \"Rural dwellers in Bangladesh are more exposed to arsenic-contaminated water than their urban counterparts. While 12 percent of the people in rural areas are exposed to arsenic levels exceeding 50 ppb, less than5 percent of the urban population face the same challenge.\",\n            \"translationPrefix\": \"goal_06.content.#48.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2\",\n            \"text\": \"Looking at arsenic contamination by wealth quintiles, people in the poorer and middle wealth quintiles face greater exposure than those in the wealthiest. \",\n            \"translationPrefix\": \"goal_06.content.#48.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#48\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"arsenic_by_source\",\n        \"title\": \"Arsenic contamination levels are highest in wells—including tubewells—in Bangladesh\",\n        \"subtitle\": \"Exposure to arsenic contamination, by water source (% of population) \",\n        \"source\": \"Bangladesh Bureau of Statistics, UNICEF Bangladesh. Bangladesh MICS 2019 Water Quality Thematic Report. Dhaka, Bangladesh: 2021.\",\n        \"note\": \"Tubewells are narrow, drilled groundwater wells fitted with a pump to draw water from underground aquifers. All other sources include protected and unprotected springs, rainwater, surface water, bottled water, carts with small tanks, and water kiosks.\",\n        \"visdescription\": \"Three charts presenting the proportion of people exposed to arsenic-contaminated drinking water by source: water wells at the top, piped water in the middle, and other sources at the bottom. Each chart represents the population using icons (one person = 1 percent), shaded according to their exposure level, with dark green indicating exposure above 10 ppb, and light green, above 50 ppb.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"ArsenicBySource.csv\",\n        \"data\": \"12pkK1snw_3BeO_THJvZnJq50WYdKN2Xth4puWrHWuPw\",\n        \"pipedWater\": \"Piped water\",\n        \"waterWells\": \"Water wells\",\n        \"allOtherSources\": \"All other sources\",\n        \"exposedTo\": \"exposed to\",\n        \"translationPrefix\": \"goal_06.content.#51\"\n      }\n    ]\n  },\n  \"05\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"global_labor_force_participation\",\n        \"title\": \"How has female labor force participation changed globally since 1990?\",\n        \"subtitle\": \"The global percentage of men participating in the labor force has declined slightly since the 1990s. What’s the story for women?\",\n        \"source\": \"\u003Ca href=\\\"https://ilostat.ilo.org/methods/concepts-and-definitions/ilo-modelled-estimates/\\\" target=\\\"_blank\\\">https://ilostat.ilo.org/data/?cat_mode=subject\u003C/a> (ILOEST), Retrieved from World Development Indicators (\u003Ca href=\\\"https://www.google.com/url?q=https://data.worldbank.org/indicator/SL.TLF.ACTI.FE.ZS&sa=D&source=docs&ust=1775492614925921&usg=AOvVaw26-l0FDqp5MePKAqnbcuk3\\\" target=\\\"_blank\\\">SL.TLF.ACTI.FE.ZS,\u003C/a> \u003Ca href=\\\"https://www.google.com/url?q=https://data.worldbank.org/indicator/SL.TLF.ACTI.MA.ZS&sa=D&source=docs&ust=1775492614925995&usg=AOvVaw26as1WGBtY4rKOIE7LIr-D\\\" target=\\\"_blank\\\">SL.TLF.ACTI.MA.ZS\u003C/a>). \",\n        \"instructions\": \"[emphasis: Click] or [emphasis: drag to draw a line] with your best guess, starting from the female labor force participation rate in 1990 on the left\",\n        \"male_rate\": \"Male labor force participation rate\",\n        \"female_rate\": \"Female labor force participation rate\",\n        \"visSize\": \"fullScreen\",\n        \"theme\": \"light (alternatively: dark)\",\n        \"data_download\": \"05.data.lfp_gender.csv\",\n        \"data\": \"1H7qxEAaJxGNl2cskA0YJ9pinGLRTmmMGJQseBtLzI14\",\n        \"encouragement\": \"Keep going! Draw your guess all the way to 2025 on the right\",\n        \"done\": \"Click the button to see your result. You can still adjust your guess\",\n        \"good_result\": \"Nice work! \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan data-color-id=\\\"female\\\" class=\\\"female\\\">female labor force participation rate\u003C/span>, which is around 55% today\",\n        \"ok_result\": \"Not bad! \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan data-color-id=\\\"female\\\" class=\\\"female\\\">female labor force participation rate\u003C/span>, which is around 55% today\",\n        \"hm_result\": \"Hmm, that could've been better. \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan data-color-id=\\\"female\\\" class=\\\"female\\\">female labor force participation rate\u003C/span> , which is around 55% today\",\n        \"poor_result\": \"That was poor. \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan data-color-id=\\\"female\\\" class=\\\"female\\\">female labor force participation rate\u003C/span>, which is around 55% today\",\n        \"show_data_button\": \"Just show the data\",\n        \"done_button\": \"Done, show my result\",\n        \"reset\": \"Reset\",\n        \"y_axis_title\": \"Labor force participation (% of population ages 15-64) by gender\",\n        \"y_axis_title_mobile\": \"Labor force participation (%)\",\n        \"y_axis_units\": \"\",\n        \"translationPrefix\": \"goal_05.content.#3\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg5_350_years\",\n        \"title\": \"Women’s labor force participation is over 350 years away from equality\",\n        \"subtitle\": \"\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">\u003C/span>\",\n        \"source\": \"World Bank staff calculations, based on XXXX 2026 (to be added when working paper available)\",\n        \"visdescription\": \"This is a line chart with the number of years before reaching equality on the x-axis and the rate of female labor force participation on the y-axis. The line shows the typical path and how much progress has been made by individual countries from 2015.\",\n        \"x_axis_title\": \"Number of years to equality\",\n        \"y_axis_title\": \"Female labor force participation (% of female population ages 15-64)\",\n        \"y_axis_title_mobile\": \"Female labor force participation (%)\",\n        \"male_rate\": \"Global male labor force participation\",\n        \"years\": \"years\",\n        \"years_to_equality\": \"years to equality\",\n        \"in_2015\": \"in 2015\",\n        \"slower_progress\": \"Slower than typical progress\",\n        \"faster_progress\": \"Faster than typical progress\",\n        \"pp\": \"pp\",\n        \"visSize\": \"default\",\n        \"publish_progress\": \"true\",\n        \"data_download\": \"05.data.typical_path_speeds.zip\",\n        \"data\": \"1o5yF32I0XmxlazXO2NtB3QEvmoQH1RnobwgZLAnAXUg\",\n        \"keyFact\": \"Over 350 years\",\n        \"keyFactLabel\": \"away from equality in labor force participation between women and men\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"intro_drawTypical\",\n            \"text\": \"Imagine a country with nearly no women in the labor force.\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"example850\",\n            \"text\": \"If this country took the typical path of progress, it would take 825 years for women’s labor force participation to reach 80 percent, which is today’s global average for men.\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"example850_draw2024\",\n            \"text\": \"With the global average at 55 percent in 2024, this means women are still over 350 years away from reaching parity with men. So, are there any countries where  women’s participation in the labor force is increasing at a faster rate?\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"exampleTurkiye_1\",\n            \"text\": \"Türkiye is one example. In 2015, women’s labor force participation stood at 34 percent.\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"exampleTurkiye_2\",\n            \"text\": \"By 2024, it had risen to nearly 42 percent—an increase of 7.8 percentage points.\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"exampleTurkiye_3\",\n            \"text\": \"But for a typical country or economy, this increase would take 36 years.\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"exampleTurkiye_4\",\n            \"text\": \"Türkiye has made notable gains in women’s participation, progressing four times faster than a typical country or economy.\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#6\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"explore\",\n            \"text\": \"Use the drop-down menu to explore where different countries and economies  stand today, how fast they have progressed since 2015, and how far they are from parity. Positive values indicate increase and negative values indicate a decrease in female labor force participation.\",\n            \"translationPrefix\": \"goal_05.content.#8.scenes.#7\"\n          }\n        ],\n        \"translationPrefix\": \"goal_05.content.#8\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"sdg5_turkiye_lfp_drivers\",\n        \"title\": \"Türkiye’s shift from agriculture to services reshaped women’s work\",\n        \"subtitle\": \"Women’s and men’s share of workforce by economic sector (% of population in the workforce, by gender)\",\n        \"textParagraph\": \"Between 1990 and 2020, women in Türkiye increasingly moved out of \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">agriculture\u003C/span> as the growing \u003Cspan data-color-id=\\\"WLD\\\" class=\\\"WLD\\\">industry\u003C/span> and \u003Cspan data-color-id=\\\"NAC\\\" class=\\\"NAC\\\">service\u003C/span> sectors opened up new work opportunities.\",\n        \"agriculture\": \"Agriculture\",\n        \"service\": \"Services\",\n        \"industry\": \"Industry\",\n        \"source\": \"\u003Ca href=\\\"https://ilostat.ilo.org/methods/concepts-and-definitions/ilo-modelled-estimates/\\\" target=\\\"_blank\\\">ILO Modelled Estimates database\u003C/a> (ILOEST), International Labour Organization (ILO). Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/SL.AGR.EMPL.FE.ZS\\\" target=\\\"_blank\\\">SL.AGR.EMPL.FE.ZS\u003C/a>; \u003Ca href=\\\"https://data.worldbank.org/indicator/SL.AGR.EMPL.MA.ZS\\\" target=\\\"_blank\\\">SL.AGR.EMPL.MA.ZS\u003C/a>; \u003Ca href=\\\"https://data.worldbank.org/indicator/SL.IND.EMPL.FE.ZS\\\" target=\\\"_blank\\\">SL.IND.EMPL.FE.ZS\u003C/a>; \u003Ca href=\\\"https://data.worldbank.org/indicator/SL.IND.EMPL.MA.ZS\\\" target=\\\"_blank\\\">SL.AGR.EMPL.MA.ZS\u003C/a>; \u003Ca href=\\\"https://data.worldbank.org/indicator/SL.SRV.EMPL.FE.ZS\\\" target=\\\"_blank\\\">SL.SRV.EMPL.FE.ZS\u003C/a>; \u003Ca href=\\\"https://data.worldbank.org/indicator/SL.SRV.EMPL.MA.ZS\\\" target=\\\"_blank\\\">SL.SRV.EMPL.MA.ZS\u003C/a>)\",\n        \"visdescription\": \"This chart has two stacked area charts - one for women and one for men. They range from 1991 to 2023 on the x-axis and from 0 to 100 percent on the y-axis. They show the distribution of workforce by economic sector. In the case of both women and men, the agricultural sector shrunk, but for women this decline was steeper. In turn there was a significant increase in the share of service sector jobs for women.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"05.data.flfp_drivers_sectors.csv\",\n        \"data\": \"1vPvS5ZuzaDZvBjnk9mMs_CnB2auLQsE_Ey39rvZ6LYI\",\n        \"translationPrefix\": \"goal_05.content.#16\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"sdg5_turkiye_fertility\",\n        \"title\": \"Türkiye’s fertility rate fell faster than the global average\",\n        \"subtitle\": \"Fertility rate (births per woman)\",\n        \"textParagraph\": \"In 1960, \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">Türkiye’s fertility\u003C/span> rate was above the \u003Cspan data-color-id=\\\"cat6\\\" class=\\\"cat6\\\">global average\u003C/span>. This has since steadily declined, reaching the global average in the 1990s and dropping below it by 2000.\",\n        \"source\": \"\u003Ca href=\\\"https://population.un.org/wpp/\\\" target=\\\"_blank\\\">World Population Prospects\u003C/a>, UN Population Division; Statistical databases and publications from national statistical offices, National statistical offices; Demographic Statistics, Eurostat (ESTAT). Retrieved from World Development Indicators (\u003Ca href=\\\"https://www.google.com/url?q=https://data.worldbank.org/indicator/SP.DYN.TFRT.IN&sa=D&source=docs&ust=1775014570014952&usg=AOvVaw0zqleaamDFNRKEVv488l_i\\\" target=\\\"_blank\\\">SP.DYN.TFRT.IN\u003C/a>) \",\n        \"visdescription\": \"This is a line chart with x-axis ranging from 1960 to 2023 and y-axis showing fertility rate, births per woman ranging from 0 to 7. There are two lines - one is the global average and the other is for Türkiye.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"05.data.flfp_drivers_fertility.csv\",\n        \"data\": \"1irC1kkR0IeMj7kI_rXiCOk3G7Qa3txP6YSeUjlf7JeI\",\n        \"translationPrefix\": \"goal_05.content.#19\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"sdg5_turkiye_education\",\n        \"title\": \"The gender gap in Türkiye’s labor force participation is narrowest in the highest level of education\",\n        \"subtitle\": \"Labor force participation, by gender and level of education (% of population ages 15-64), 2024\",\n        \"textParagraph\": \"At all levels of education in Türkiye, \u003Cspan data-color-id=\\\"female\\\" class=\\\"female\\\">women\u003C/span> are less likely than \u003Cspan data-color-id=\\\"male\\\" class=\\\"male\\\">men\u003C/span> to work. But the gap is narrowest among those who have completed tertiary education.\",\n        \"male\": \"Male\",\n        \"female\": \"Female\",\n        \"pp\": \"pp\",\n        \"source\": \"International Labour Organization (ILO), \u003Ca href=\\\"https://ilostat.ilo.org/data/bulk/\\\" target=\\\"_blank\\\">Education and Mismatch Indicators database (EMI)\u003C/a> \",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"default\",\n        \"data_download\": \"05.data.flfp_drivers_education.csv\",\n        \"data\": \"1wv1ALjkR9I4wBHn7AiIimyJ7fbxLsM0LFKs1YGCxY2M\",\n        \"labels__Advanced\": \"Completed tertiary education\",\n        \"labels__Intermediate\": \"Completed secondary education\",\n        \"labels__Basic\": \"Completed primary education\",\n        \"labels__LessThanBasic\": \"Did not complete primary education\",\n        \"labels__Total\": \"Total\",\n        \"translationPrefix\": \"goal_05.content.#22\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg5_better_jobs_for_women\",\n        \"title\": \"A tale of two countries: similar labor force participation, different types of employment\",\n        \"subtitle\": \"People in the labor force by gender and employment status, 2024\",\n        \"source\": \"ILO Modelled Estimates database (ILOEST), International Labour Organization (ILO). Retrieved from Gender Data Portal (\u003Ca href=\\\"https://genderdata.worldbank.org/en/indicator/sl-emp-vuln-zs\\\" target=\\\"_blank\\\">SL.EMP.VULN.FE.ZS; SL.EMP.VULN.MA.ZS\u003C/a>; \u003Ca href=\\\"https://genderdata.worldbank.org/en/indicator/sl-emp-work-zs\\\" target=\\\"_blank\\\">SL.EMP.WORK.FE.ZS; SL.EMP.WORK.MA.ZS\u003C/a>; \u003Ca href=\\\"https://genderdata.worldbank.org/en/indicator/sl-uem-zs\\\" target=\\\"_blank\\\">SL.UEM.TOTL.FE.ZS; SL.UEM.TOTL.MA.ZS\u003C/a>)\",\n        \"visdescription\": \"This is a stacked bar chart. There are four bars: one for women in Tanzania, one for men in Tanzania, one for women in Switzerland and one for men in Switzerland. The stacks show the distribution of employment status.\",\n        \"unemployed\": \"Unemployed\",\n        \"vulnerable\": \"Vulnerable\",\n        \"wage\": \"Waged\",\n        \"employer\": \"Employer\",\n        \"male\": \"Men\",\n        \"female\": \"Women\",\n        \"x_axis_title\": \"Employment status (% of population in the labor force)\",\n        \"x_axis_title_mobile\": \"% of population\",\n        \"x_axis_units\": \"\",\n        \"visSize\": \"default\",\n        \"data_download\": \"05.data.types_employment_gender.csv\",\n        \"data\": \"18cDq2Bwm7zmviWFr4YgTuYFIejiRycLv8F65l7M_ez4\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"tza_che\",\n            \"text\": \"Among the employed, some are wage and salaried workers, while others are in more precarious forms of work, categorized as vulnerable employment.\",\n            \"translationPrefix\": \"goal_05.content.#31.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"che\",\n            \"text\": \"In Switzerland, over 80 percent of men and women are \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">waged or salaried\u003C/span>—over 8 in 10 men and women and only 1 in 10 employees fall into the \u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">vulnerable employment\u003C/span> category.\",\n            \"translationPrefix\": \"goal_05.content.#31.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"tza__vulnerable\",\n            \"text\": \"In Tanzania, the pattern is entirely flipped: the labor market is dominated by workers in \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">vulnerable employment\u003C/span>, with about 9 in 10 women and 8 in 10 men working in such conditions.\",\n            \"translationPrefix\": \"goal_05.content.#31.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"tza__wage\",\n            \"text\": \"This means that only 1 in 10 women hold \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">waged or salaried\u003C/span> jobs, that is half the rate for men, 2 in 10 of whom are in waged and salaried work. \",\n            \"translationPrefix\": \"goal_05.content.#31.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_05.content.#31\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"gender_gap_informal_gdp\",\n        \"title\": \"Vulnerable employment is higher among women than men in lower-income countries and economies \",\n        \"subtitle\": \"\",\n        \"textParagraph\": \"Vulnerable employment is common in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(59,77,166);\\\">low-income\u003C/span> countries and economies. Among the poorest countries, vulnerable employment rates are as high as 90 percent, and with \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">women\u003C/span> more affected than \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">men\u003C/span>. In \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(1,107,108);\\\">higher-income\u003C/span> countries, vulnerable employment is less common, and the share of \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">men\u003C/span> in vulnerable employment tends to be higher than among \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">women\u003C/span>. \",\n        \"y_axis_title\": \"Vulnerable employment (% of labor force) by gender\",\n        \"y_axis_title_mobile\": \"Vulnerable employment (%)\",\n        \"y_axis_units\": \"\",\n        \"male_rate\": \"Male vulnerable employment rate\",\n        \"female_rate\": \"Female vulnerable employment rate\",\n        \"source\": \"ILO Modelled Estimates database (ILOEST), International Labour Organization (ILO). Retrieved from Gender Data Portal (\u003Ca href=\\\"https://genderdata.worldbank.org/en/indicator/sl-emp-vuln-zs\\\" target=\\\"_blank\\\">SL.EMP.VULN.FE.ZS; SL.EMP.VULN.MA.ZS\u003C/a>)\",\n        \"visdescription\": \"This is a range chart with two dots for men and women for every country. The x-axis shows the country’s income and is classified by its income group and the y-axis shows the rate of vulnerable employment for women and men.\",\n        \"visSize\": \"fullScreen\",\n        \"theme\": \"light (alternatively: dark)\",\n        \"data_download\": \"05.data.vulnerable_employment.csv\",\n        \"data\": \"1UGJFyH-_LgLeqOe2XSaZWHwmj2AaVzOKodi0r0fIHWE\",\n        \"keyFact\": \"In 3 of 4\",\n        \"keyFactLabel\": \"Low and middle-income countries, vulnerable employment was higher among women than men\",\n        \"translationPrefix\": \"goal_05.content.#34\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"sdg5_wage_gap_beeswarm\",\n        \"title\": \"In most countries, men’s wages are higher, on average, than women’s\",\n        \"subtitle\": \"A wage ratio higher than one signals higher wages for women and lower than one signals lower wages for women\",\n        \"source\": \"ILO. ILOSTAT, \u003Ca href=\\\"https://ilostat.ilo.org/topics/wages/#data-catalogue\\\" target=\\\"_blank\\\">Wages and Working Time Statistics (COND)\u003C/a>\u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">.\u003C/span>\u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">\u003C/span>\",\n        \"women_lower\": \"Lower wages for women\",\n        \"women_higher\": \"Higher wages for women\",\n        \"wage_ratio\": \"Hourly wage ratio (Ratio of women’s to men’s hourly wages), most recent value (2015-2024)\",\n        \"wage_ratio_month\": \"Monthly wage ratio (Ratio of women’s to men’s monthly wages), most recent value (2015-2024)\",\n        \"wage_ratio_mobile\": \"Hourly wage ratio\",\n        \"wage_ratio_month_mobile\": \"Monthly wage ratio\",\n        \"visdescription\": \"This is a beeswarm where the x-axis shows World Bank regions and each dot represents the ratio of women’s average wages to men’s average wages in a country. The y-axis shows this ratio. \",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"wage_month.csv\",\n        \"data\": \"11xTcc7eM3HUKOmEgw6-iIRzmMO8OPWGjes9_0tEJd6M\",\n        \"keyFact\": \"82 cents\",\n        \"keyFactLabel\": \"earned by women for every $1 earned by men in a month\",\n        \"labels__per_month\": \"more per month\",\n        \"labels__per_hour\": \"more per hour\",\n        \"labels__men\": \"Men earn\",\n        \"labels__women\": \"Women earn\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"wage_ratio\",\n            \"text\": \"These dynamics are reflected in women’s earnings: in the average country or economy and looking at hourly pay, they earn 91 cents for every $1 earned by men. \",\n            \"translationPrefix\": \"goal_05.content.#43.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"wage_ratio\",\n            \"text\": \"Of the 131 countries or economies with data, men are paid a higher hourly wage, on average, than women in \u003Cspan data-color-id=\\\"MEA\\\" class=\\\"MEA\\\">93 countries\u003C/span>.\",\n            \"translationPrefix\": \"goal_05.content.#43.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"wage_ratio_month\",\n            \"text\": \"When measured in monthly earnings, the gap widens. As care and household responsibilities fall disproportionately on women, they are more likely to require flexible arrangements, working part-time or taking on fewer hours. So, in the average country or economy,[footnote: Using the median country as the average country] women earn just 82 cents for every dollar earned by men per month.\",\n            \"translationPrefix\": \"goal_05.content.#43.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_05.content.#43\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"unpaid_time_animation\",\n        \"title\": \"Women spend more time in unpaid work and men spend more time in paid work\",\n        \"subtitle\": \"Hours spent in a day in paid and unpaid work, by gender\",\n        \"time_worked\": \"Time worked:\",\n        \"hours\": \"hours\",\n        \"minutes\": \"minutes\",\n        \"paid_work\": \"Paid work\",\n        \"unpaid_work\": \"Unpaid work\",\n        \"men\": \"Men\",\n        \"women\": \"Women\",\n        \"y_axis_title\": \"Labor force participation (% of population, ages 15-64) by gender\",\n        \"y_axis_title_mobile\": \"Labor force participation (%) \",\n        \"y_axis_units\": \"\",\n        \"x_axis_title\": \"Time spent working in a day\",\n        \"x_axis_units\": \"hours\",\n        \"high_lfp\": \"High labor force participation\",\n        \"source\": \"UN Statistics Division. \u003Ca href=\\\"https://unstats.un.org/UNSDWebsite/demographic-social/time-use/data-and-metadata \\\" target=\\\"_blank\\\">Minimum Set of Gender Indicators\u003C/a>.\",\n        \"visdescription\": \"This chart first shows the distribution of the average number of hours spent by men and women in unpaid work and in paid work. There are four dots for each country. In the last scene we see the correlation between unpaid care work for men and women with their labor force participation rates.\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"unpaid-work.zip\",\n        \"data\": \"1FEkl6WKMlGhZNhWAXT705dWVr_Sdg4bdWmYOtht53h8\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"beeswarm__unpaid\",\n            \"text\": \"Across all countries and economies, \u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">women\u003C/span> do the majority of unpaid work…\",\n            \"translationPrefix\": \"goal_05.content.#49.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"beeswarm__paid_unpaid\",\n            \"text\": \"…While \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">men\u003C/span> spend more time in paid work.\",\n            \"translationPrefix\": \"goal_05.content.#49.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scatter_f\",\n            \"text\": \"The burden of unpaid work has implications for women’s ability to take up paid work opportunities. Female labor force participation is especially low in countries where women spend many hours on unpaid work.[emphasis:  ]Worldwide, more than 708 million women are outside of the labor force due to care responsibilities.[reference: care-tradeoff]\",\n            \"translationPrefix\": \"goal_05.content.#49.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scatter_mf\",\n            \"text\": \"Even when women have a paid job, they continue performing most of their household’s unpaid work. In countries with high levels of female labor force participation, women face a “second [unpaid] shift” when they finish their paid shift.[reference: second-shift]\",\n            \"translationPrefix\": \"goal_05.content.#49.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_05.content.#49\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"sdg5_ai_occupational_exposure_by_gender\",\n        \"title\": \"Occupational exposure to AI is highest among women in high- and upper-middle-income countries\",\n        \"subtitle\": \"Occupational exposure to Artificial Intelligence, by gender and income group, 2025\",\n        \"gradient1\": \"Low exposure, high task variability\",\n        \"gradient2\": \"Moderate exposure, high task variability\",\n        \"gradient3\": \"Significant exposure, high task variability\",\n        \"gradient4\": \"Highest exposure, low task variability\",\n        \"y_axis_title\": \"Share of total employment\",\n        \"y_axis_units\": \"%\",\n        \"male\": \"Men\",\n        \"female\": \"Women\",\n        \"source\": \"Gmyrek et al. (2025). \u003Ca href=\\\"https://doi.org/10.54394/HETP0387\\\" target=\\\"_blank\\\">Generative AI and jobs: A refined global index of occupational exposure\u003C/a>. International Labour Organization. \",\n        \"visdescription\": \"This is a stacked bar chart for the world and for the World Bank income groups by women and men showing the rate of exposure to AI by the level of risk.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"ilo_ai_exposure_summary.csv\",\n        \"data\": \"1M43AbaYyQL6_Bdkemsog4a7gdHZqw9faSEUdKb6qag0\",\n        \"translationPrefix\": \"goal_05.content.#56\"\n      }\n    ]\n  },\n  \"04\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"schooling_regions\",\n        \"title\": \"Schooling is rising in most regions\",\n        \"subtitle\": \"Expected years of schooling by region\",\n        \"source\": \"World Bank. 2026. Human Capital Index Plus. \u003Ca href=\\\"https://humancapital.worldbank.org/hciplus/\\\" target=\\\"_blank\\\">https://humancapital.worldbank.org/hciplus/\u003C/a>. \u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/HD_HCIP_EYRS\\\" target=\\\"_blank\\\">https://data360.worldbank.org/en/int/indicator/HD_HCIP_EYRS\u003C/a>\",\n        \"y_axis_title\": \"Expected years of school\",\n        \"y_axis_units\": \"Years\",\n        \"visdescription\": \"Line chart showing the rise in expected years of schooling between 2001 and 2025.\",\n        \"textParagraph\": \"Since 2001, global access to education has expanded significantly, particularly in low- and middle-income economies. [emphasis: \u003Cspan style=\\\"color: rgb(32,131,131);\\\">South Asia\u003C/span>] has recorded the largest gain, with expected years of schooling  increasing from eight to eleven years. There has also been significant growth in [emphasis: \u003Cspan style=\\\"color: rgb(182,95,12);\\\">Sub-Saharan Africa\u003C/span>], where expected years of schooling rose from seven to almost nine years. The [emphasis: \u003Cspan style=\\\"color: rgb(102,74,182);\\\">Middle East, North Africa, Afghanistan & Pakistan\u003C/span>], [emphasis: \u003Cspan style=\\\"color: rgb(187,59,100);\\\">East Asia & Pacific\u003C/span>], and [emphasis: \u003Cspan style=\\\"color: rgb(12,124,104);\\\">Latin America & the Caribbean\u003C/span>] all saw an increase of roughly one year over the period. In higher-income regions, like Europe & Central Asia and North America, where these systems reached close to universal completion in primary and secondary education, figures have remained relatively stable.\",\n        \"theme\": \"light (alternatively: dark)\",\n        \"data_download\": \"04.data.schooling_regions.csv\",\n        \"data\": \"1gF2DQBShE1IBI2nNgAKTlmc1hv3OfMnOY-gMQhYaU8U\",\n        \"keyFact\": \"1 year\",\n        \"keyFactLabel\": \"more expected years of schooling in 2024 than in 2001 globally. \",\n        \"translationPrefix\": \"goal_04.content.#6\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"schooling_scroller\",\n        \"title\": \"Years of schooling have improved significantly over time\",\n        \"subtitle\": \"\",\n        \"source\": \"\u003Cspan style=\\\"color: rgb(68,68,68);\\\">Barro-Lee Dataset. Barro, Robert and Jong-Wha Lee, 2013, \u003C/span>\u003Ca href=\\\"http://www.sciencedirect.com/science/article/pii/S0304387812000855\\\" target=\\\"_blank\\\">“A New Data Set of Educational Attainment in the World, 1950-2010.”\u003C/a>\u003Cspan style=\\\"color: rgb(68,68,68);\\\"> \u003C/span>\u003Cspan style=\\\"color: rgb(68,68,68);\\\">Journal of Development Economics\u003C/span>\u003Cspan style=\\\"color: rgb(68,68,68);\\\">, vol 104, pp.184-198.\u003C/span>\",\n        \"visdescription\": \"The average number of years of schooling has expanded dramatically. The data is presented as a line chart showing increases in the number of years of schooling.\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">\u003C/span>\",\n        \"data_download\": \"04.data.trends_schooling.csv\",\n        \"data\": \"1nd7cgUAXC4mlmOTZ99bFhTYz7JEr7h4KEsQPidAxmCI\",\n        \"y_title\": \"Average years of schooling (ages 25–64)\",\n        \"y_unit\": \"Number of years\",\n        \"avg_title\": \"Global average\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"In 1920, the average adult had only 1.6 years of education—ranging from nearly zero years in \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Mali\u003C/span> to seven in the \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">United States\u003C/span>.\",\n            \"translationPrefix\": \"goal_04.content.#9.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"By 1960, the \u003Cspan data-color-id=\\\"WLD\\\" class=\\\"WLD\\\">global average\u003C/span> had doubled to 3.5 years, but the pace of progress was slow. On average, the world population gained half a year of school per decade. In low-income countries like \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Mali\u003C/span>\u003Cspan style=\\\"color: rgb(4,1,16);\\\">,\u003C/span> there was almost no improvement . \",\n            \"translationPrefix\": \"goal_04.content.#9.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"3\",\n            \"text\": \"…but trends changed dramatically after 1960. Many countries will make rapid progress in improving years of schooling, while some are left with persistently low levels of education.\",\n            \"translationPrefix\": \"goal_04.content.#9.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"4\",\n            \"text\": \"Between 1960 and 2025, the average in the \u003Cspan data-color-id=\\\"EAS\\\" class=\\\"EAS\\\">Republic of Korea\u003C/span> it jumped from around 3.5 to more than 14 years. \u003Cspan data-color-id=\\\"MEA\\\" class=\\\"MEA\\\">Egypt\u003C/span> improved from less than one year to more than eight years of schooling. In \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">India\u003C/span>, it went from around one to nearly eight years, and in \u003Cspan data-color-id=\\\"LCN\\\" class=\\\"LCN\\\">Mexico\u003C/span> from 2.3 to more than 10 years over the same period. \",\n            \"translationPrefix\": \"goal_04.content.#9.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"5\",\n            \"text\": \"By 2025, the global \u003Cspan data-color-id=\\\"WLD\\\" class=\\\"WLD\\\">average\u003C/span> for 25–64-year-olds was more than nine years, equivalent to a lower secondary education. But the gaps between countries are large: the average in \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Mali\u003C/span> is around 3 years, compared to 14 years in \u003Cspan data-color-id=\\\"EAS\\\" class=\\\"EAS\\\">Korea\u003C/span> and \u003Cspan data-color-id=\\\"ECS\\\" class=\\\"ECS\\\">Ireland\u003C/span>.\",\n            \"translationPrefix\": \"goal_04.content.#9.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_04.content.#9\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"education_quality_details\",\n        \"title\": \"Learning-adjusted years of schooling are only two-thirds as high has unadjusted years of schooling on average\",\n        \"subtitle\": \"\",\n        \"years_title\": \"Years of schooling\",\n        \"years_label\": \"years\",\n        \"lays_title\": \"Learning-adjusted years of schooling\",\n        \"textParagraph\": \"In [emphasis: Mali], for example, the number of years of schooling a child born today can expect to achieve is low, at around 4.7 years. But these 4.7 years of schooling are equivalent to the learning that takes place in just 2.4 years in the highest-performing countries. In the [emphasis: Philippines] a child born today can expect to achieve around 11 years of schooling, but this amounts to only in 6.4 learning-adjusted years. In [emphasis: Brazil], children’s expected years of schooling stand at  12.7 years, but this is only 8.3 in learning-adjusted years. In [emphasis: Korea], the gap between actual years and learning-adjusted years of schooling is relatively small, indicating relatively high learning at school.\",\n        \"source\": \"World Bank. 2026. Human Capital Index Plus. \u003Ca href=\\\"https://humancapital.worldbank.org/hciplus/\\\" target=\\\"_blank\\\">https://humancapital.worldbank.org/hciplus/\u003C/a>. \u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/HD_HCIP_LAYS\\\" target=\\\"_blank\\\">https://data360.worldbank.org/en/int/indicator/HD_HCIP_LAYS\u003C/a> \",\n        \"visdescription\": \"Bar graph showing expected years of schooling and  Learning-adjusted years of schooling for selected countries.\",\n        \"data_download\": \"04.data.education_quality_details.csv\",\n        \"data\": \"1K4YTrY9-VyFnwz9ArraOKtCM8jmYiTczREV4Lcu7dCc\",\n        \"translationPrefix\": \"goal_04.content.#14\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"lays_change\",\n        \"title\": \"Learning-adjusted years of schooling have decreased in around 1/3rd of low or lower-middle income countries\",\n        \"subtitle\": \"[emphasis: ]\",\n        \"visSize\": \"small\",\n        \"x_title\": \"Learning-adjusted years of schooling in 2010\",\n        \"x_units\": \"\",\n        \"y_title\": \"Learning-adjusted years of schooling in 2025\",\n        \"y_units\": \"\",\n        \"decreasing\": \"Decreasing\",\n        \"increasing\": \"Increasing\",\n        \"source\": \"World Bank. 2026. Human Capital Index Plus. \u003Ca href=\\\"https://humancapital.worldbank.org/hciplus/\\\" target=\\\"_blank\\\">https://humancapital.worldbank.org/hciplus/\u003C/a>. \u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/HD_HCIP_LAYS\\\" target=\\\"_blank\\\">https://data360.worldbank.org/en/int/indicator/HD_HCIP_LAYS\u003C/a> \",\n        \"visdescription\": \"The graphic shows a scatterplot of Learning-adjusted years of schooling in 2010 versus 2025\",\n        \"data_download\": \"04.data.lays.scatter.csv\",\n        \"data\": \"1esEqT9Zx2CTlF788bpNp6lyMYEuRoSP4lELpb9LJyGU\",\n        \"keyFact\": \"In 1 in 3\",\n        \"keyFactLabel\": \"low and lower-middle income countries, learning-adjusted years of schooling fell between 2010 and 2025.\",\n        \"translationPrefix\": \"goal_04.content.#19\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"wages\",\n        \"title\": \"More schooling leads to higher earnings in the labor market\",\n        \"subtitle\": \"Typical wage premiums by education level \",\n        \"x_title\": \"Earnings Relative to Non-Completers\",\n        \"x_unit\": \"%\",\n        \"pri_title\": \"Completed primary education\",\n        \"sec_title\": \"Completed secondary education\",\n        \"ter_title\": \"Completed tertiary education\",\n        \"source\": \"Wages expressed in PPP adjusted US dollars. World Bank staff calculations, based on data of GLD (Global Labor Database Repository), https://worldbank.github.io/gld/README.html; I2D2 (International Income Distribution Database) (internal database), World Bank\",\n        \"visdescription\": \"Bar graph showing increase in earnings of workers with different education levels compared to those with less than primary schooling.\",\n        \"data_download\": \"04.data.wages.csv\",\n        \"data\": \"1Qqe_u2Np3tXVcoXSyyD7RVRXk4BQMQyEydtTZWIRiOk\",\n        \"translationPrefix\": \"goal_04.content.#26\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"mincer_coefficients\",\n        \"title\": \"On average, each year of schooling raises earnings by 10%\",\n        \"subtitle\": \"\",\n        \"x_title\": \"GDP per capita\",\n        \"x_units\": \"$\",\n        \"y_title\": \"Returns to each additional year of schooling\",\n        \"y_units\": \"%\",\n        \"population\": \"Population (million)\",\n        \"visSize\": \"fullScreen\",\n        \"source\": \"Patrinos, H. 2024. Estimating the return to schooling using the Mincer equation. IZA World of Labor 2024: 278 doi: 10.15185/izawol.278.v2. The graphic shows estimates of the returns to education.\",\n        \"visdescription\": \"The graphic shows a scatterplot of estimates of the returns to education on log GDP per capita.\",\n        \"data_download\": \"04.data.mincer_coefficients.csv\",\n        \"data\": \"14O2xDakRI4TsbijqiCwaDAQuW0cFTOhRVCJ5KvIriCA\",\n        \"keyFact\": \"10%\",\n        \"keyFactLabel\": \"Increase in earnings for each additional year of schooling globally.\",\n        \"translationPrefix\": \"goal_04.content.#31\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"wage_scroller\",\n        \"title\": \"Earnings for those with tertiary are higher and grow faster\",\n        \"subtitle\": \"Wage profiles by worker experience\",\n        \"source\": \"World Bank staff calculations, based on data of GLD (Global Labor Database Repository), \u003Ca href=\\\"https://worldbank.github.io/gld/README.html\\\" target=\\\"_blank\\\">https://worldbank.github.io/gld/README.html\u003C/a>, World Bank. Wages in PPP adjusted US dollars.\",\n        \"visdescription\": \"Line charts showing wage profiles for workers with differing levels of education for India and Brazil.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"04.data.wage_scroller.csv\",\n        \"data\": \"1hCHnJalQJWn65UYrfzVWKaADB_CIebDUxqfbzarSS_s\",\n        \"publish_progress\": \"true\",\n        \"x_title\": \"Years of potential experience\",\n        \"x_unit\": \"\",\n        \"y_title\": \"Wage earnings\",\n        \"y_units\": \"$/hour\",\n        \"bsc_title\": \"Did not complete primary education\",\n        \"adv_title\": \"Tertiary degree\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"india_1\",\n            \"text\": \"To see how learning (as measured through on-the-job productivity) evolves over a career, let us take a look at workers in [emphasis: India]. For workers at the beginning of their career, those who \u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">did not complete primary education\u003C/span> earned around $1.70 per hour in 2019. These wages are higher for those with more experience, roughly doubling to $3.27 per hour by the end of the career.\",\n            \"translationPrefix\": \"goal_04.content.#39.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"india_2\",\n            \"text\": \"In comparison, workers at the start of their careers with a \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">tertiary degree\u003C/span> are already earning around 75% more than their counterparts who \u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">did not complete primary education\u003C/span>. \",\n            \"translationPrefix\": \"goal_04.content.#39.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"india_3\",\n            \"text\": \"Over time, this wage gap continues to grow. By the end of their careers, workers with a \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">tertiary degree\u003C/span> have more than triple the wages as workers at the beginning, and earn roughly three times more than those who \u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">did not complete primary education\u003C/span>.\",\n            \"translationPrefix\": \"goal_04.content.#39.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"brazil\",\n            \"text\": \"[emphasis: Brazil ]shows a similar, but even more pronounced, divergence. Entry hourly wages for those who \u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">did not complete \u003C/span>\u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">primary education\u003C/span>\u003Cspan style=\\\"color: rgb(255,255,255);\\\"> \u003C/span>are $2.43, while those with a \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">tertiary degree\u003C/span> start at $6.03. After a 35-year career, tertiary graduate workers earn about $24.32 per hour, which is around six times  the $4 earned by those who did not complete primary education.\",\n            \"translationPrefix\": \"goal_04.content.#39.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_04.content.#39\"\n      }\n    ]\n  },\n  \"03\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"uhc_chart\",\n        \"title\": \"UCH Service Coverage Index by regions, 2000-2023\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.uhc_chart.csv\",\n        \"data\": \"1TF7nwhhbF5Bo3Yk6WmZYav611Gv-Bmjq7lAuF25zSy4\",\n        \"x_title\": \"\",\n        \"x_unit\": \"\",\n        \"y_title\": \"Index score\",\n        \"y_unit\": \"\",\n        \"translationPrefix\": \"goal_03.content.#7\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"uhc_small_multiple\",\n        \"title\": \"UCH Service Coverage Index by sub-components, 2000-2023\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.uhc_small_multiple.csv\",\n        \"data\": \"1t5DmOFCUgveLaSk4ustdj-HDhyjb_EfiNaCl0jj9Fuk\",\n        \"x_title\": \"\",\n        \"x_unit\": \"\",\n        \"y_title\": \"Index score\",\n        \"y_unit\": \"\",\n        \"label_UHC_SCI_RMNCH\": \"RMNCH\",\n        \"label_UHC_SCI_NCD\": \"Noncommunicable disease\",\n        \"label_UHC_SCI_CAPACITY\": \"Service capacity and access\",\n        \"label_UHC_SCI_INFECT\": \"Infectious disease\",\n        \"label_UHC_INDEX_REPORTED\": \"UHC SCI\",\n        \"translationPrefix\": \"goal_03.content.#9\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"uhc_index_scroller\",\n        \"title\": \"Global UHC Service Coverage Index, 2023\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.uhc_countries.csv\",\n        \"data\": \"1-a89ebZR0jYf5UHSdJ5_ycZwrpN8ksNBWjo5v7RMxl4\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"Beneath the global averages also lie [emphasis: wide disparities] in service coverage, with SCI in 2023 ranging from 26 in Chad to 92 in Canada. Much of \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span> and parts of \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">South Asia\u003C/span> continue to record lower coverage, while most countries in Europe, North America, and East Asia have achieved high levels of access. \",\n            \"translationPrefix\": \"goal_03.content.#10.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"These patterns are closely mirrored by income level. Most high-income countries score above 75–80 on the UHC Service Coverage Index, while many \u003Cspan data-color-id=\\\"LIC\\\" class=\\\"LIC\\\">low- \u003C/span>and \u003Cspan data-color-id=\\\"LMC\\\" class=\\\"LMC\\\">lower-middle-income\u003C/span> countries remain in the 50–65 range. Several \u003Cspan data-color-id=\\\"LIC\\\" class=\\\"LIC\\\">low-income \u003C/span>countries score below 50, highlighting persistent gaps in access to essential health services.\",\n            \"translationPrefix\": \"goal_03.content.#10.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_03.content.#10\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"mortality_plot\",\n        \"title\": \"Maternal Mortality vs Neonatal Mortality (2023)\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"x_title\": \"Neonatal Mortality Rate (per 1,000 live births)\",\n        \"x_unit\": \"\",\n        \"y_title\": \"Maternal Mortality Ratio (per 100,000 live births)\",\n        \"y_unit\": \"\",\n        \"data_download\": \"03.data.mortality_plot.csv\",\n        \"data\": \"1-TZbOllJkAX7Z_iNvx9IJVJfvuEbDv-LVUDZp4aPnfY\",\n        \"translationPrefix\": \"goal_03.content.#16\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"mortality_region_scroller\",\n        \"title\": \"Levels and trends in maternal and child mortality\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.mortality_region_scroller.zip\",\n        \"data\": \"1p7e61R9f_HoAQN8G4jC8vPgjyRQ62dgWZXzIhmO6Rjw\",\n        \"x_title\": \"\",\n        \"x_unit\": \"\",\n        \"y_title_mmr\": \"Maternal deaths per 100,000 live births\",\n        \"y_title_mr\": \"Death per 1,000 live births\",\n        \"y_unit\": \"\",\n        \"title_scene_1\": \"Maternal Mortality​ Ratio\",\n        \"title_scene_2\": \"Under-5 Mortality Rate\",\n        \"title_scene_3\": \"Neonatal Mortality Rate \",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"Global [emphasis: maternal mortality] has declined steadily since 2000, but the pace of [emphasis: improvement has stagnated]. In 2023, the global maternal mortality ratio (MMR, number of maternal deaths per 100 000 live births) stood at [emphasis: 197]. While this is a substantial improvement compared to the early 2000s, progress slowed after 2015, with a temporary uptick during the COVID-19 pandemic before returning to pre-pandemic trends.[emphasis: ]\",\n            \"translationPrefix\": \"goal_03.content.#19.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"Globally, the [emphasis: under-five mortality rate] fell by half, from[emphasis:  77] deaths per 1,000 live births in [emphasis: 2000 ]to [emphasis: 37 ]in [emphasis: 2023], reflecting millions of lives saved. Yet disparities remain stark: in \u003Cspan data-color-id=\\\"HIC\\\" class=\\\"HIC\\\">high-income countries\u003C/span>, just [emphasis: 5] children per 1,000 die before age five, compared to [emphasis: 68] in \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span>.[emphasis: ]\",\n            \"translationPrefix\": \"goal_03.content.#19.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"3\",\n            \"text\": \"[emphasis: Neonatal mortalit]y has also declined substantially, from [emphasis: 37] deaths per 1,000 live births in [emphasis: 1990 ]to [emphasis: 17 ]in [emphasis: 2023]. Rates remain highest in \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">South Asia\u003C/span> and \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span>, which together account for more than [emphasis: 80%] of global newborn deaths. Although both regions have recorded steady improvements, progress has been uneven and levels remain substantially higher than elsewhere.\",\n            \"translationPrefix\": \"goal_03.content.#19.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_03.content.#19\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"uhc_speed_scores_scroller\",\n        \"title\": \"Speed of Progress in RMNCH Mortality (2015–2030)\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.speed_scores_scroller.zip\",\n        \"data\": \"1jNNLrejvMRWJooxlTh-GB6qQ8AiI8GnJDXfoGRyWVCw\",\n        \"speed_score_label\": \"Speed score\",\n        \"title_scene_1\": \"Maternal Mortality​ \",\n        \"title_scene_2\": \"Under-5 Mortality\",\n        \"title_scene_3\": \"Neonatal Mortality​ \",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"In reducing [emphasis: maternal mortality], several countries in \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span> recorded rapid gains, while many countries in \u003Cspan data-color-id=\\\"LCN\\\" class=\\\"LCN\\\">Latin America and the Caribbean\u003C/span> experienced stagnation or reversal. \",\n            \"translationPrefix\": \"goal_03.content.#22.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"Similar contrasts emerge for [emphasis: under-five mortality]. South Sudan recorded one of the fastest declines, reducing under-five mortality from 237 deaths per 1,000 live births in 2015 to 99 in 2023. At the same time, nearly 70 percent of countries in \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa \u003C/span>progressed more slowly than the typical pace or experienced reversals.\",\n            \"translationPrefix\": \"goal_03.content.#22.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"3\",\n            \"text\": \"Progress in reducing [emphasis: neonatal mortality] has also been uneven. Several countries in \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">South Asia\u003C/span>, including India, Bangladesh, and Nepal, achieved rapid improvements, bringing them closer to the global target of 12 neonatal deaths per 1,000 live births by 2030.\",\n            \"translationPrefix\": \"goal_03.content.#22.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_03.content.#22\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"uhc_outcomes_scroller\",\n        \"title\": \"UHC Service Coverage and RMNCH Mortality Outcomes\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.uhc_outcomes_scroller.zip\",\n        \"data\": \"1YwwHj2p4H3XtiZSI5K0v56DOfuEvD8pWQLLdbKQojvk\",\n        \"x_title\": \"Universal Health Coverage Index (0-100)\",\n        \"x_unit\": \"\",\n        \"y_title_1\": \"Maternal Mortality Ratio (per 100,000 live births)\",\n        \"y_title_2\": \"Under-5 Mortality Rate (per 1,000 live births)\",\n        \"y_title_3\": \"Neonatal Mortality Rate (per 1,000 live births)\",\n        \"y_unit\": \"\",\n        \"title_scene_1\": \"Maternal Mortality​ Rate vs UHC Index\",\n        \"title_scene_2\": \"Under-5 Mortality Rate vs UHC Index\",\n        \"title_scene_3\": \"Neonatal Mortality Rate vs UHC Index\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"[emphasis: Sierra Leone] and [emphasis: Ethiopia ]achieved rapid declines in [emphasis: maternal mortality] alongside steady improvements in [emphasis: service coverage], highlighting the role of expanded maternal care — including increased use of antenatal and delivery services with skilled health personnel and strengthened primary health care outreach through community health workers.\",\n            \"translationPrefix\": \"goal_03.content.#26.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"[emphasis: Rwanda ]and [emphasis: Malawi ]combined strong investments in primary health care and child health programs with [emphasis: rising UHC] scores, contributing to sharp reductions in [emphasis: under-five mortality].\",\n            \"translationPrefix\": \"goal_03.content.#26.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"3\",\n            \"text\": \"[emphasis: Cambodia], [emphasis: India], and [emphasis: China ]strengthened maternal and newborn services while expanding coverage, supporting sustained improvements in [emphasis: neonatal survival].\",\n            \"translationPrefix\": \"goal_03.content.#26.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_03.content.#26\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"rmnch_progress_scroller\",\n        \"title\": \"RMNCH Service Coverage Change in High-Improvement Countries \",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.rmnch_progress_scroller.zip\",\n        \"data\": \"1Z48ap9utYIR6P45cgxV0l1bhyF25vZboMptPSBz8uYg\",\n        \"title_scene_1\": \"Countries with the Largest Declines in Maternal Mortality (RMNCH Service Index, 2000 and 2023)\",\n        \"title_scene_2\": \"Countries with the Largest Declines in Under-Five Mortality (RMNCH Service Index, 2000 and 2023)\",\n        \"title_scene_3\": \"Countries with the Largest Declines in Neonatal Mortality (RMNCH Service Index, 2000 and 2023)\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"1\",\n            \"text\": \"Countries such as Bangladesh, Sierra Leone, and Timor-Leste combined rapid declines in [emphasis: maternal mortality] with steady increases in [emphasis: RMNCH service coverage], supported by expanded skilled birth attendance —delivery assisted by trained midwives, nurses, or doctors— and improved maternal care, including more regular antenatal visits, basic health checks such as blood pressure monitoring, and timely referral for complications.\",\n            \"translationPrefix\": \"goal_03.content.#29.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2\",\n            \"text\": \"Rwanda, Malawi, and Cambodia achieved some of the fastest reductions in [emphasis: under-five mortality] alongside substantial improvements in [emphasis: RMNCH service delivery]. This progress reflects strong investments in primary care and community-level services delivered by trained health workers who provide basic care, health education, and referral support close to where families live.\",\n            \"translationPrefix\": \"goal_03.content.#29.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"3\",\n            \"text\": \"China, India, Cambodia, and Mongolia recorded rapid declines in[emphasis:  neonatal mortality] while expanding coverage of essential maternal and newborn interventions, including facility-based delivery and postnatal care.\",\n            \"translationPrefix\": \"goal_03.content.#29.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_03.content.#29\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"financial_hardship_chart\",\n        \"title\": \"Proportion of population facing financial hardship due to out-of-pocket health expenditure (%), by income, 2022\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"data_download\": \"03.data.financial_hardship_chart.csv\",\n        \"data\": \"1daP_FhCix0RmD8GFxsnOD1nEZVD3pHCHhT92gbHkKtQ\",\n        \"translationPrefix\": \"goal_03.content.#35\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"medical_cost_chart\",\n        \"title\": \"Exposure to Health-Related Financial Risk, by income, 2024\",\n        \"subtitle\": \"\",\n        \"source\": \"\",\n        \"visdescription\": \"\",\n        \"fin22d_title\": \"Most worrying financial issue: paying for medical costs in case of a serious illness or accident (% age 15+), by income, 2024\",\n        \"fin45c_title\": \"Borrowed for health or medical purposes (% age 15+), by income, 2024\",\n        \"data_download\": \"03.data.medical_cost_chart.csv\",\n        \"data\": \"1XSEldfi-NKJjAE4nXpr_BlSNsCZ3Bo_GJY4qSS0H4AA\",\n        \"translationPrefix\": \"goal_03.content.#37\"\n      }\n    ]\n  },\n  \"dashboard\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"indicators_progress\",\n        \"title\": \"The global speed of progress is falling in many domains\",\n        \"subtitle\": \"Global average speed of progress, 1950–2024\",\n        \"source\": \"\u003Ca href=\\\"https://hdl.handle.net/10986/44655\\\" target=\\\"_blank\\\">Mahler et al. 2026\u003C/a>\",\n        \"lifeexpectancy\": \"life expectancy\",\n        \"education\": \"years of schooling\",\n        \"gender\": \"women political empowerment index\",\n        \"ghggdp\": \"tons CO2 equivalent/$ GDP\",\n        \"electricity\": \"electricity supply (mWh/capita)\",\n        \"poverty300\": \"extreme poverty rate\",\n        \"typical_progress\": \"Typical progress\",\n        \"fast_progress\": \"Fast progress\",\n        \"standstill\": \"Standstill\",\n        \"regression\": \"Reversal\",\n        \"slow_progress\": \"Slow progress\",\n        \"progress_in\": \"Progress in\",\n        \"average\": \"Average\",\n        \"average_progress_speed\": \"Average progress speed\",\n        \"six_indicators\": \"six indicators\",\n        \"visdescription\": \"Line charts showing  the speed of progress across six development indicators from 1950 to 2025 . The y-axes reflect the speed of development and are annotated with values to make the values more comprehensible.\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"dashboard.data.progress_speeds.zip\",\n        \"data\": \"1V4JWANmBNf9VWrsXeahBdfuR1z1wbhnYJhXgFDAVm2s\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"values\",\n            \"text\": \"Looking at  extreme poverty rates, where a year’s speed of progress refers to changes over the previous five years, progress in reducing poverty was at its slowest in the 1980s and early 1990s, with countries seeing, on average, an increase in poverty. This was followed by a golden area of poverty reduction in the later 1990s and early 2000s. That has since stalled, and today poverty reduction is at its lowest speed in more than three decades. \",\n            \"translationPrefix\": \"goal_dashboard.content.#5.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"smooth\",\n            \"text\": \"Looking at other indicators, we can see that the pace of progress changes annually and smoothing the data helps distinguish patterns from noise.\",\n            \"translationPrefix\": \"goal_dashboard.content.#5.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"2010\",\n            \"text\": \"For life expectancy and electricity supply, the pace of progress today is the slowest it has been in 75 years. For schooling, it is the slowest since the 1960s, while in women’s political empowerment, progress is reversing for the first time since the 1950s. The only indicator where  progress is faster today than in past decades is carbon dioxide CO2 emissions per gross domestic product (GDP). \",\n            \"translationPrefix\": \"goal_dashboard.content.#5.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"overlay\",\n            \"text\": \"Overlaying the six indicators, allows us to compare them against each other, confirming that only CO2 emissions per GDP has a higher-than-typical speed today.\",\n            \"translationPrefix\": \"goal_dashboard.content.#5.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"average_of_averages\",\n            \"text\": \"Calculating the average speed across indicators provides a picture of how the pace of global development has changed over the last 75 years. After peaking just before 2010, the global speed of progress has declined steadily. It is now at its lowest point since 1950. \",\n            \"translationPrefix\": \"goal_dashboard.content.#5.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"region_progress\",\n            \"text\": \"This slowdown is widespread across regions, with the pace of progress across all regions except South Asia now at its slowest since 1950.\",\n            \"translationPrefix\": \"goal_dashboard.content.#5.scenes.#5\"\n          }\n        ],\n        \"translationPrefix\": \"goal_dashboard.content.#5\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"dashboard_scroller\",\n        \"title\": \"\",\n        \"subtitle\": \"\",\n        \"disableFooter\": \"true\",\n        \"source\": \"Source of the data\",\n        \"visSize\": \"fullScreen\",\n        \"visdescription\": \"Interactive dashboard showing how much progress countries have made on development indicators over the last 10 years. It allows users to explore different options to compare progress. \",\n        \"readstoryon\": \"Read Story on\",\n        \"readmore\": \"Read more on measuring progress\",\n        \"indicator\": \"indicator\",\n        \"include_countries\": \"Countries without speed\",\n        \"include_typical\": \"Typical progress\",\n        \"show\": \"Show\",\n        \"hide\": \"hide\",\n        \"speed\": \"Speed of progress\",\n        \"change\": \"Absolute change\",\n        \"regression\": \"reversal\",\n        \"standstill\": \"standstill\",\n        \"slow\": \"slow\",\n        \"typical\": \"typical\",\n        \"fast\": \"fast\",\n        \"veryfast\": \"very fast\",\n        \"view\": \"View\",\n        \"map\": \"Map\",\n        \"diff\": \"Difference Grid\",\n        \"ranking\": \"Ranking\",\n        \"rank\": \"Rank by\",\n        \"latest\": \"Latest value\",\n        \"start\": \"Start value\",\n        \"value\": \"value\",\n        \"progress\": \"progress\",\n        \"highlight\": \"Highlight\",\n        \"country\": \"country\",\n        \"choose\": \"Choose\",\n        \"each\": \"each \",\n        \"explanation1\": \"= one data point\",\n        \"explanation2\": \"in one count
