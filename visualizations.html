org/10.1080/1755876X.2018.1489208\\\" target=\\\"_blank\\\">https://\u003C/a>\u003Ca href=\\\"https://marine.copernicus.eu/access-data/ocean-monitoring-indicators/global-ocean-chlorophyll-trend-map-observations\\\" target=\\\"_blank\\\">marine.copernicus.eu/access-data/ocean-monitoring-indicators/global-ocean-chlorophyll-trend-map-observations\u003C/a>\u003Cspan style=\\\"color: rgb(37,37,37);\\\">\u003C/span>\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"texture\": \"sdg14/textures/chlorophyll-a-trend.jpeg\",\n        \"translationPrefix\": \"goal_14.content.#41\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"chlorophyll_deviation\",\n        \"title\": \"Chlorophyll-a deviation from the global average\",\n        \"subtitle\": \"The share of satellite imagery pixels measuring chlorophyll-a within a country's Exclusive Economic Zone that are above the 90th percentile of the global baseline (2000-2004). The value given is an annual average of monthly deviations.\",\n        \"source\": \"United Nations, Department of Economic and Social AffairsStatistics Division, SDG Indicator Database. \u003Ca href=\\\"https://unstats.un.org/sdgs/dataportal/SDMXMetadataPage?14.1.1-EN_MAR_CHLDEV\\\" target=\\\"_blank\\\">https://unstats.un.org/sdgs/dataportal/SDMXMetadataPage?14.1.1-EN_MAR_CHLDEV\u003C/a>\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"14.data.chlorophyll_deviation.csv\",\n        \"data\": \"1tq254ChAaAyXlbv6mbP_vAcfVOHH78AvACeVWZA-EIM\",\n        \"translationPrefix\": \"goal_14.content.#42\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"phytoplankton_blooms\",\n        \"title\": \"Average yearly phytoplankton bloom count, 2002-2023\",\n        \"subtitle\": \"Global distribution of average annual phytoplankton bloom occurrences, 2002–2023\",\n        \"legend_title\": \"Phytoplankton blooms count\",\n        \"legend_unit_label\": \"number/year\",\n        \"legend_units\": \"\",\n        \"source\": \"Dai, Y., Yang, S., Zhao, D., Hu, C., Xu, W., Anderson, D. M., ... & Feng, L. (2023). Coastal phytoplankton blooms expand and intensify in the 21st century. Nature, 615(7951), 280-284. \u003Ca href=\\\"https://doi.org/10.1038/s41586-023-05760-y\\\" target=\\\"_blank\\\">https://doi.org/10.1038/s41586-023-05760-y\u003C/a> \",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"texture\": \"sdg14/textures/bloom_count.jpg\",\n        \"translationPrefix\": \"goal_14.content.#45\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"algal_blooms\",\n        \"title\": \"Algal blooms\",\n        \"subtitle\": \"Algal blooms with humans affected, 2016-2025\",\n        \"source\": \"IOC-UNESCO Harmful Algae Information System. Harmful algae information system, accessible via \u003Ca href=\\\"https://data.hais.ioc-unesco.org/\\\" target=\\\"_blank\\\">data.hais.ioc-unesco.org\u003C/a>\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"14.data.algal_blooms.csv\",\n        \"data\": \"1L5LJ1GUFWspxmZ-5g5gGToeGJsTvqMUUKxwmW_1VIOM\",\n        \"texture\": \"sdg14/textures/ocean_floor_rivers.jpg\",\n        \"translationPrefix\": \"goal_14.content.#49\"\n      }\n    ]\n  },\n  \"15\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"land_use\",\n        \"title\": \"Arable lands occupy 14 million square kilometers\",\n        \"subtitle\": \"Equal to 9.4 percent of the global land surface\",\n        \"source\": \"FAO\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"default\",\n        \"data_download\": \"15.data.agricultural_land.zip\",\n        \"data\": \"19TTxJqAAVwijPowj3tDNksOwqItdZ43dsz08ZEZsTaQ\",\n        \"agriculture\": \"Agriculture\",\n        \"glaciers\": \"Glaciers\",\n        \"barren\": \"Deserts, salt flats, beaches, dunes\",\n        \"forest\": \"Forests\",\n        \"shrub\": \"Shrubland\",\n        \"urban\": \"Urban and built-up land\",\n        \"water\": \"Lakes and rivers\",\n        \"pasture\": \"Pastures and grazing land\",\n        \"annual\": \"Annual crops\",\n        \"permanent\": \"Permanent crops\",\n        \"for_animals\": \"for animals\",\n        \"for_humans\": \"for humans\",\n        \"arable\": \"Arable land\",\n        \"translationPrefix\": \"goal_15.content.#9\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"arable_land_degradation\",\n        \"title\": \"Four processes degrading arable land\",\n        \"subtitle\": \"\",\n        \"source\": \"[reference: pravalie2021]\",\n        \"salinization\": \"Share of arable land affected by salinization\",\n        \"carbon_decline\": \"Share of arable land affected by carbon decline\",\n        \"erosion\": \"Share of arable land affected by erosion\",\n        \"aridity\": \"Share of arable land affected by aridity\",\n        \"visdescription\": \"World map showing the distribution of arable lands, and of the salinization, loss of organic carbon, erosion and aridity degradation processes.\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"15.data.arable_land_degradation.csv\",\n        \"data\": \"1cMRTFjgImsFIZi6Uv1MzuxK2pSHo1x4Ru3lkmctejLM\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"arable_land\",\n            \"text\": \"Global \u003Cspan style=\\\"background-color: rgb(191,194,10);\\\">arable lands\u003C/span> cover 14.2 million square kilometers, 1.5 times the land area of the United States or China. This land is used for the production of food for human consumption, of animal feed and of non-food crops like biofuels.\",\n            \"translationPrefix\": \"goal_15.content.#11.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"salinization\",\n            \"text\": \"[emphasis: Salinization] is the process of accumulation of salts in the soil. It reduces plant growth, and can even make land unsuitable for agriculture. It is mostly caused by irrigation practices with insufficient drainage. Salinization affects almost 2 percent of arable lands, mostly in drier and coastal areas.\",\n            \"translationPrefix\": \"goal_15.content.#11.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"carbon_decline\",\n            \"text\": \"Organic carbon in the soil makes it fertile: it retains nutrients and water for plants, and makes it structurally stable. Agricultural practices like heavy tilling and the removal or burning of crop residues leads to a [emphasis: decline in soil organic carbon]. This is affecting 3.3 percent of arable land.\",\n            \"translationPrefix\": \"goal_15.content.#11.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"erosion\",\n            \"text\": \"A more important factor in the degradation of arable land is [emphasis: soil erosion]. Soil erosion happens when rainfall or water runoff detaches and carries the top soil. Natural factors determining the risk of soil erosion are the amount and intensity of rainfall, topography and soil characteristics. Human factors are excessive or poorly timed tillage, monocropping and providing inadequate cover crops. Soil erosion affects 30 percent of all arable land.\",\n            \"translationPrefix\": \"goal_15.content.#11.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"aridity\",\n            \"text\": \"But by far the largest pressure for these agricultural systems is\u003Cspan style=\\\"color: rgb(255,255,255);\\\"> \u003C/span>[emphasis: aridity]. Water resources are a subsystem of land, and under arid conditions they put constraints on soils and vegetation, the two other components of land. This causes land degradation, defined as a reduction in the agro-ecological productivity of land. 55% of arable land is situated in drylands, which have expanded and become more arid over the last decades.\",\n            \"translationPrefix\": \"goal_15.content.#11.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_15.content.#11\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"aridity_classes\",\n        \"title\": \"Global distribution of aridity classes\",\n        \"subtitle\": \"\",\n        \"source\": \"[reference: aridityreport]\",\n        \"visdescription\": \"World map showing the distribution of humid, dry subhumid, semi-arid, arid and hyperarid regions around the world.\",\n        \"visSize\": \"fullScreen\",\n        \"translationPrefix\": \"goal_15.content.#18\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"aridity_difference\",\n        \"title\": \"Most regions are getting more arid\",\n        \"subtitle\": \"Change in aridity between 1960-1990 and 1990-2020\",\n        \"source\": \"[reference: aridityreport]\",\n        \"visdescription\": \"World map showing where aridity increased in brown and where aridity decreased in green. Brown is dominating the map.\",\n        \"visSize\": \"fullScreen\",\n        \"keyFact\": \"77%\",\n        \"keyFactLabel\": \"of all land experienced a more arid climate than 30 years ago.\",\n        \"translationPrefix\": \"goal_15.content.#20\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"new_drylands\",\n        \"title\": \"4.3 million km2 humid areas turned to drylands since 30 years ago\",\n        \"subtitle\": \"Areas that were humid during the 1960-1990 period that are now classified as drylands.\",\n        \"source\": \"[reference: aridityreport]\",\n        \"visdescription\": \"A world map showing the areas that converted to drylands in the 1990 - 2020 period compared to the 1960-1990 period\",\n        \"visSize\": \"fullScreen\",\n        \"keyFact\": \"4.3 million\",\n        \"keyFactLabel\": \"km2 of humid areas turned to drylands since 30 years ago.\",\n        \"translationPrefix\": \"goal_15.content.#23\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Consequences of increased aridity on ecosystems and land degradation\",\n        \"subtitle\": \"\",\n        \"source\": \"[reference: berdugo]\",\n        \"visdescription\": \"An illustration showing the sequence of the vegetation decline phase, the soil disruption phase and the systemic breakdown at certain aridity thresholds.\",\n        \"filename\": \"sdg15/aridification-ecosystems.png\",\n        \"translationPrefix\": \"goal_15.content.#38\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"aridity_biodiversity_map\",\n        \"title\": \"Where species are projected to lose their local habitat due to rising aridity\",\n        \"subtitle\": \"Hotspots with the highest shares of terrestrial animals losing local habitats include the west coast of Africa, west Australia and the Iberian Peninsula, but also humid regions such as southern Mexico and the northern Amazon rainforest\",\n        \"scenarios\": \"Greenhouse gas emissions scenario\",\n        \"ssp126\": \"Low\",\n        \"ssp245\": \"Intermediate\",\n        \"ssp585\": \"Very high\",\n        \"share_species\": \"Share of vertebrate species losing local habitat\",\n        \"source\": \"[reference: liu]\",\n        \"visdescription\": \"A world map showing where vertebrate species can lose their local habitat due to rising aridity under 3 greenhouse gas emission scenarios.\",\n        \"visSize\": \"fullScreen\",\n        \"filename\": \"sdg15/aridity-biodiversity.png\",\n        \"keyFact\": \"25%\",\n        \"keyFactLabel\": \"of vertebrate species could lose local habitats because of rising aridity by 2100.\",\n        \"translationPrefix\": \"goal_15.content.#41\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"protected_areas\",\n        \"title\": \"The share of global protected lands needs to double to reach the 30% goal\",\n        \"subtitle\": \"\",\n        \"y_axis_title\": \"Share of land that is protected\",\n        \"source\": \"Retrieved from World Development Indicators (\u003Ca href=\\\"http://ER.LND.PTLD.ZS\\\" target=\\\"_blank\\\">ER.LND.PTLD.ZS\u003C/a>)\",\n        \"visdescription\": \"A line chart showing the global terrestrial protected areas as share of the total land area. Compared the the 30% target, the line is mostly flat.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"15.data.protected_areas.csv\",\n        \"data\": \"1pMY2CRzmKnK3OoRr_QcRUBc0wBX86Bha47iP0LFN_M0\",\n        \"translationPrefix\": \"goal_15.content.#46\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"image\",\n        \"title\": \"Protected areas remain productive under increasingly dry conditions\",\n        \"subtitle\": \"\",\n        \"source\": \"[reference: wang]\",\n        \"visdescription\": \"A schematic line chart, with increasing aridity on the x axis and ecosystem productivity on the y axis. One line represents unprotected areas and one line represents areas under high protection. With increasing aridity, the line for highly protected areas remains well above the ecosystem productivity of the unprotected areas.\",\n        \"visSize\": \"default\",\n        \"filename\": \"sdg15/protected_areas_aridity.png\",\n        \"translationPrefix\": \"goal_15.content.#48\"\n      }\n    ]\n  },\n  \"16\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"ai_adoption\",\n        \"title\": \"Use of ChatGPT is 50 times higher in rich countries than in poorer countries\",\n        \"subtitle\": \"Visits to ChatGPT per internet user, May 2025\",\n        \"source\": \"\u003Ca href=\\\"https://hdl.handle.net/10986/43859\\\" target=\\\"_blank\\\">Liu, Huang, and Wang (2025)\u003C/a>, sourced from \u003Ca href=\\\"https://www.semrush.com/\\\" target=\\\"_blank\\\">Semrush. \u003C/a>\",\n        \"visdescription\": \"A global map of traffic to ChatGPT per internet user and a scatter plot showing a positive correlation between GDP per capita and chatGPT usage \",\n        \"visSize\": \"default\",\n        \"data_download\": \"chatgpt.csv\",\n        \"data\": \"1_KJJCNEzSgK0Jn_trZgpvE_0wePSwvI-8G34Jcc-XyA\",\n        \"prompt_text\": \"Where in the world are people using AI?\",\n        \"keyFact\": \"50 times\",\n        \"keyFactLabel\": \"more ChatGPT usage occurs per internet user in high-income countries than in low-income countries.\",\n        \"yAxisLabel\": \"Visits per internet user\",\n        \"xAxisLabel\": \"GDP per capita ($)\",\n        \"legendLabel\": \"Visits to chatGPT per 100 internet users\",\n        \"disableDataDownload\": \"true\",\n        \"translationPrefix\": \"goal_16.content.#5\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"affordability_barrier\",\n        \"title\": \"Mobile data is prohibitively expensive in low-income countries\",\n        \"subtitle\": \"Cost of data-only 5GB mobile package as a share of non-food household budget\",\n        \"source\": \"\u003Ca href=\\\"https://www.itu.int/en/Pages/default.aspx\\\" target=\\\"_blank\\\">International Telecommunication Union (ITU\u003C/a>), \u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank’s Poverty and Inequality Platform (PIP)\u003C/a>, \u003Ca href=\\\"https://blogs.worldbank.org/en/opendata/pandemic-prices-and-poverty\\\" target=\\\"_blank\\\">Mahler et al. (2022)\u003C/a>, and \u003Ca href=\\\"https://www.ers.usda.gov/\\\" target=\\\"_blank\\\">U.S. Department of Agriculture Economic Research Service\u003C/a>.\",\n        \"visdescription\": \"Chart showing the cost of a data package relative to a household’s budget, by income group, and relative to food expenditure.\",\n        \"visSize\": \"small\",\n        \"data_download\": \"affordability_incgroup.csv\",\n        \"data\": \"1MepA2Dpz0HUoZRmMMlr-5a7s5jPJcbH-aIvXL3Gbiu4\",\n        \"prompt_text\": \"Can everyone afford to use AI?\",\n        \"foodLabelShort\": \"food\",\n        \"foodLabelLong\": \"average expenditure on food\",\n        \"keyFact\": \"Nearly 50%\",\n        \"keyFactLabel\": \"of households' budget remaining after food consumption in low-income countries would be taken up by a data-only 5GB mobile package.\",\n        \"legendLabelCostOfData\": \"Cost of data-only 5G mobile package\",\n        \"legendLabelRemainingBudget\": \"Remaining household budget,  after food consumption\",\n        \"translationPrefix\": \"goal_16.content.#14\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"digital_language_divide\",\n        \"title\": \"Languages spoken in poorer countries are underrepresented in AI training data\",\n        \"subtitle\": \"Global URLs and global population, by language\",\n        \"source\": \"\u003Ca href=\\\"https://commoncrawl.github.io/cc-crawl-statistics/plots/languages.html\\\" target=\\\"_blank\\\">Common Crawl\u003C/a>, \u003Ca href=\\\"https://github.com/google-research/url-nlp/tree/main/linguameta\\\" target=\\\"_blank\\\">LinguaMeta\u003C/a>, and \u003Ca href=\\\"https://arxiv.org/abs/2410.10665\\\" target=\\\"_blank\\\">Solatorio et al. (2024)\u003C/a> (based on data from \u003Ca href=\\\"https://www.ethnologue.com/\\\" target=\\\"_blank\\\">Etnologue\u003C/a>). \",\n        \"visdescription\": \"Comparison of the use of languages online versus the real world, showing that languages spoken in poorer countries tend to be underrepresented online.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"language.csv\",\n        \"data\": \"1unI4siH8ylMOBxBhid5uvMTTOOzzMy9LYwTaw1SWd8c\",\n        \"prompt_text\": \"Are AI tools equally useful and accurate in all languages?\",\n        \"yAxisLabel\": \"URLs per 10,000 URLs (log scale)\",\n        \"xAxisLabel\": \"Speakers per 10,000 people (log)\",\n        \"circleLegendLabel\": \"Number of speakers\",\n        \"legendMultiple\": \"Multiple\",\n        \"popoverLine1\": \"URLs ber 10,000 URLs\",\n        \"popoverLine2\": \"Speakers per 10,000 people\",\n        \"popoverLine3\": \"Speakers\",\n        \"searchPlaceholder\": \"Search for a language\",\n        \"languageHighlightEnglish\": \"English\",\n        \"languageHighlightChinese\": \"Chinese\",\n        \"translationPrefix\": \"goal_16.content.#20\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"digital_skills\",\n        \"title\": \"Less than 5% of the population of low-income countries have the digital skills to use AI\",\n        \"subtitle\": \"Population with digital skills, 2023\",\n        \"source\": \"\u003Ca href=\\\"https://doi.org/10.1596/978-1-4648-2264-3\\\" target=\\\"_blank\\\">World Bank (2025)\u003C/a>, based on data from the  \u003Ca href=\\\"https://www.itu.int/en/Pages/default.aspx\\\" target=\\\"_blank\\\">International Telecommunication Union (ITU\u003C/a>). Note: Basic digital skills refer to the basic use of digital devices, email communication, web search, and online transactions. Intermediate skills refer to the use of software and data management. Advanced skills refer to data analysis, software development, and high-level computing competences. \",\n        \"visdescription\": \"Chart showing the share of population with basic, intermediate, and advanced digital skills, by income group.\",\n        \"visSize\": \"small\",\n        \"data_download\": \"digitalskills.csv\",\n        \"data\": \"16G0AKko7ZiyeaGZMz69lybOG_SMC-e2-gbLZSdLUWeA\",\n        \"prompt_text\": \"Does everyone have the skills to use AI?\",\n        \"legendLessThanBasic\": \"Less than basic digital skills\",\n        \"legendBasic\": \"Basic digital skills\",\n        \"legendIntermediate\": \"Intermediate digital skills\",\n        \"legendAdvanced\": \"Advanced digital skills\",\n        \"lessThanBasicSkillsTooltipText\": \"[emphasis: Basic digital skills] refers to the basic use of digital devices, email communication, web search, and online transactions.\",\n        \"basicSkillsTooltipText\": \"[emphasis: Basic digital skills] refers to the basic use aof digital devices, email communication, web search, and online transactions.\",\n        \"intermediateSkillsTooltipText\": \"[emphasis: Intermediate skills] refers to use of software and data management.\",\n        \"advancedSkillsTooltipText\": \"[emphasis: Advanced skills] refers to data analysis, software development and high-level computing competences.\",\n        \"translationPrefix\": \"goal_16.content.#28\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"exposure\",\n        \"title\": \"Workers in low-income countries are less exposed to AI\",\n        \"subtitle\": \"Index of occupational exposure to AI from 0 (no exposure) to 100 (full exposure)\",\n        \"source\": \"Author's calculations based on \u003Ca href=\\\"https://openknowledge.worldbank.org/handle/10986/42765\\\" target=\\\"_blank\\\">Demombynes, \u003C/a>\u003Ca href=\\\"https://openknowledge.worldbank.org/handle/10986/42765\\\" target=\\\"_blank\\\">Langbein, and Weber (2025)\u003C/a>\u003Cspan style=\\\"color: rgb(33,37,41);\\\">. Note: The occupational icons are AI generated.\u003C/span>\",\n        \"visdescription\": \"Chart showing the occupational exposure to AI, by occupation type and income group\",\n        \"visSize\": \"default\",\n        \"disableScreenshot\": \"true\",\n        \"data_download\": \"beeswarm_updated.csv\",\n        \"data\": \"1dq70G2RjgkId9PDqQY2bO1DKUdy-8bjAgBnn0bAnmQ4\",\n        \"keyFact\": \"Less than 1 in 5\",\n        \"keyFactLabel\": \"workers in low-income countries are highly exposed to AI.\",\n        \"xAxisLabel\": \"Artificial Intelligence Occupational Exposure\",\n        \"exposureLabel\": \"Exposure\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1_id\",\n            \"text\": \"Some occupations, such as \u003Cspan data-color-id=\\\"LCN\\\" class=\\\"LCN\\\">information and communications technology (ICT) professionals\u003C/span>, are exposed to AI in most facets of their work, with an exposure score of 93.\",\n            \"translationPrefix\": \"goal_16.content.#39.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2_id\",\n            \"text\": \"Others, such as \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">subsistence farmers, fishers, hunters and gatherers\u003C/span>, are largely not exposed by AI in their work, with an exposure score of 20.[footnote: The tasks associated with an occupation differ in rich and poor countries. The \u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">AIOE Index is based on the tasks associated with occupations in the United States. In poorer countries, similar occupations are likely to have tasks that are less exposed by AI.\u003C/span>]\",\n            \"translationPrefix\": \"goal_16.content.#39.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene3_id\",\n            \"text\": \"Most occupations fall somewhere in between.\",\n            \"translationPrefix\": \"goal_16.content.#39.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene4_id\",\n            \"text\": \"Countries are exposed differently to AI because occupation types differ by country. We can see this by scaling the occupations according to their prominence. Here, this is done for the United States. Defining high exposure as greater than 50, about half of all US workers are highly exposed, because occupations such as \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">business and administration associate professionals\u003C/span> and \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">teaching professionals\u003C/span>\u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\"> \u003C/span>are common.\",\n            \"translationPrefix\": \"goal_16.content.#39.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene5_id\",\n            \"text\": \"In middle-income countries, occupations such as \u003Cspan style=\\\"background-color: rgb(150,168,172);\\\">market-oriented skilled agricultural workers\u003C/span> and \u003Cspan style=\\\"background-color: rgb(131,167,205);\\\">sales workers\u003C/span> are common. These occupations are notably less exposed to AI than many of the occupations common in the US.  \",\n            \"translationPrefix\": \"goal_16.content.#39.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene6_id\",\n            \"text\": \"In low-income countries, large populations of workers are engaged in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(160,168,156);\\\">subsistence farming\u003C/span>, and less than 20 percent of workers are highly exposed to AI.[footnote: These statistics depend on where the threshold for high exposure is set. Regardless of how it is defined, workers in low-income countries are notably less exposed to AI than their high-income country counterparts.]\",\n            \"translationPrefix\": \"goal_16.content.#39.scenes.#5\"\n          }\n        ],\n        \"translationPrefix\": \"goal_16.content.#39\"\n      }\n    ]\n  },\n  \"17\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"survey_age\",\n        \"title\": \"Many countries rely on survey data that are more than five years old\",\n        \"subtitle\": \"Average age of latest surveys in low-and middle-income countries\",\n        \"health\": \"Health survey\",\n        \"poverty\": \"Poverty survey\",\n        \"labor_force\": \"Labor force survey\",\n        \"agriculture\": \"Agriculture survey\",\n        \"business\": \"Business survey\",\n        \"x_axis_title\": \"← Age of most recent survey (years) →\",\n        \"years\": \"years\",\n        \"x_axis_title_bottom\": \"Year of most recent survey\",\n        \"medianLabel\": \"Median:\",\n        \"source\": \"World Bank Statistical Performance Indicators (SPI), [202511]\",\n        \"visdescription\": \"\",\n        \"visSize\": \"default\",\n        \"data_download\": \"17.data.survey_age.csv\",\n        \"data\": \"1Z-ibGTAUXjF_occNjtbhaVR9Hizsp_bYx6H2DQzzAdE\",\n        \"keyFact\": \"In 60 percent\",\n        \"keyFactLabel\": \"of low- and middle-income countries, the most recent poverty survey that is more than five years old.\",\n        \"translationPrefix\": \"goal_17.content.#8\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"nigeria_poverty_extrapolation\",\n        \"title\": \"Nigeria’s rate of extreme poverty\",\n        \"subtitle\": \"Survey vs extrapolation estimates\",\n        \"survey_2018\": \"2018 survey\",\n        \"survey_2022\": \"Actual 2022 survey\",\n        \"extrapolated_2022\": \"Extrapolated\",\n        \"difference\": \"7 percentage point difference \",\n        \"difference_pop\": \"17 million people\",\n        \"y_axis_title\": \"Extreme poverty rate\",\n        \"y_axis_units\": \"%\",\n        \"source\": \"Poverty & Inequality Platform, World Bank\",\n        \"visdescription\": \"Comparison of extrapolated versus actual survey-based poverty estimates for Nigeria (2018–22), showing how national accounts-based projections underestimated the true poverty rate revealed by the 2022 household survey.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"17.data.nigeria_poverty.csv\",\n        \"data\": \"1SP4MvouZobM8FY_9SVL-_n96P-X_7DiMZ4AwDi9mag0\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"initial_survey\",\n            \"text\": \"In 2018, survey estimates revealed that around 34 percent of Nigerians (71 million people) were living in extreme poverty.\",\n            \"translationPrefix\": \"goal_17.content.#10.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"extapolation\",\n            \"text\": \"Without updated survey data, poverty monitoring between 2018 and 2022 relied on \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">model-based projections\u003C/span>, which estimated that the poverty rate had remained broadly stable, at 34.8 percent.\",\n            \"translationPrefix\": \"goal_17.content.#10.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"new_survey\",\n            \"text\": \"The 2022 survey data revealed that the poverty rate was actually 41.8 percent, substantially higher than the projected 34.8 percent.\",\n            \"translationPrefix\": \"goal_17.content.#10.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"difference\",\n            \"text\": \"The seven percentage point discrepancy corresponds roughly to [emphasis: an additional 17 million additional Nigerians living in extreme poverty], underscoring the limitations of modeling as a substitute for timely household survey data.\",\n            \"translationPrefix\": \"goal_17.content.#10.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_17.content.#10\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"missing_children_data_waffles\",\n        \"title\": \"Key data are missing for millions of children \",\n        \"subtitle\": \"\",\n        \"source\": \"World Bank’s Learning Poverty and Country Learning Outcomes database (learning assessment); UNICEF/WHO/The World Bank: Joint child malnutrition estimates (JME) database (stunting); UNSD Population and Vital Statistics Report (birth registration)\",\n        \"square_represents\": \"1 million children\",\n        \"birth_reg\": \"Birth registration, children under five\",\n        \"stunting\": \"Stunting, children under five\",\n        \"learn_assess\": \"Learning assessment, children age 5–14\",\n        \"without_data\": \"Without data\",\n        \"with_data\": \"With data\",\n        \"region_legend_title\": \"Children without data living in:\",\n        \"note\": \"Availability of data between 2019 and 2024 for the following indicators: births registered with a civil authority (% of children under five); \",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"17.data.missing_children_data.zip\",\n        \"data\": \"16LO3tJWmK2Uwznl1-PxydYvqen5-rgn6zhUY2cygRfs\",\n        \"keyFact\": \"777 million\",\n        \"keyFactLabel\": \"children live in a country with no recent internationally comparable learning assessment.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"birth_registration\",\n            \"text\": \"Around [emphasis: 162 million children] under five are \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">unaccounted for in birth registries\u003C/span>, making up about 30 percent of all children globally.\",\n            \"translationPrefix\": \"goal_17.content.#17.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"birth_registration_regions\",\n            \"text\": \"These gaps are concentrated in specific regions. In \u003Cspan data-color-id=\\\"cat2\\\" class=\\\"cat2\\\">Sub-Saharan Africa\u003C/span>, around half of all children under five were never registered at birth.\",\n            \"translationPrefix\": \"goal_17.content.#17.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"stunting\",\n            \"text\": \"Around [emphasis: 200 million children] live in countries with no recent data on child growth, which are needed to measure malnutrition. In \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(243,87,142);\\\">East Asia & Pacific\u003C/span> and \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span>, stunting data—the primary measure of whether young children are adequately nourished—are missing for more than half of all children under five.\",\n            \"translationPrefix\": \"goal_17.content.#17.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"learn_assess\",\n            \"text\": \"Around [emphasis: 777 million children] aged 7 and 14—roughly half of all children that age—live in countries with no comparable learning assessment in the past five years. In \u003Cspan data-color-id=\\\"EAS\\\" class=\\\"EAS\\\">East Asia & Pacific\u003C/span>, \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">South Asia\u003C/span>, and \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span>, there are no comparable data on whether more than half of these children can read or understand basic math at age-appropriate levels.\",\n            \"translationPrefix\": \"goal_17.content.#17.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_17.content.#17\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"spi_scroller\",\n        \"title\": \"Statistical performance varies widely across economies\",\n        \"subtitle\": \"The SPI measures the strength of statistical systems\",\n        \"fcv_countries\": \"Fragile and conflict-affected countries\",\n        \"fcv_median\": \"Median FCV countries\",\n        \"non_fcv_median\": \"Median non-FCV countries\",\n        \"spi\": \"SPI\",\n        \"pillar1\": \"Data use\",\n        \"pillar2\": \"Data services\",\n        \"pillar3\": \"Data products\",\n        \"pillar4\": \"Data sources\",\n        \"pillar5\": \"Data infrastructure\",\n        \"source\": \"\u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">Source of the data\u003C/span>\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"17.data.spi_pillar_scores.csv\",\n        \"data\": \"1dRBFfgIFVEa4mn6SaaYW_4wxgFKFRYky9hCgppeo_8g\",\n        \"keyFact\": \"34 points\",\n        \"keyFactLabel\": \"High-income countries score 34 points higher than low-income countries on the World Bank’s Statistical Performance Indicators index.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"spi\",\n            \"text\": \"Statistical performance varies widely across economies. \u003Cspan data-color-id=\\\"HIC\\\" class=\\\"HIC\\\">Norway\u003C/span> has an SPI score of around 94 points, close to the maximum of 100, while \u003Cspan data-color-id=\\\"LIC\\\" class=\\\"LIC\\\">South Sudan\u003C/span> scores just 27 points. \",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"five_pillars\",\n            \"text\": \"The SPI allows you to examine the performance along five key dimensions: data use, data services, data products, data sources, and data infrastructure.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"fifth_quintile \",\n            \"text\": \"\u003Cspan data-color-id=\\\"HIC\\\" class=\\\"HIC\\\">High-income, OECD economies\u003C/span> dominate the top tier of statistical systems, accounting for more than 90 percent of countries in the top quintile. The top performers include Scandinavian countries such as \u003Cspan data-color-id=\\\"ECS\\\" class=\\\"ECS\\\">Norway (94.1)\u003C/span> and Sweden (92.7). Performance at this level is strong and relatively even across all five pillars.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"fourth_quintile\",\n            \"text\": \"In the next quintile (60th–80th percentile), the composition shifts: \u003Cspan data-color-id=\\\"UMC\\\" class=\\\"UMC\\\">upper-middle-income economies\u003C/span> make up over half, and \u003Cspan data-color-id=\\\"LMC\\\" class=\\\"LMC\\\">lower-middle-income economies\u003C/span> account for about 16 percent. This shows that strong statistical performance extends well beyond high-income economies.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"third_quintile\",\n            \"text\": \"The middle quintile shows more unevenness across the five pillars; it is where the highest-performing low-income countries begin to appear. \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">Burkina Faso\u003C/span>, for example, stands out as a low-income country performing at levels comparable to many middle-income peers.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"second_quintile\",\n            \"text\": \"In the third and fourth quintiles, weaknesses in data sources begin to emerge, with performance on Pillar 4 starting to lag noticeably behind the other pillars. This signals gaps in the foundational surveys, censuses, and administrative systems needed to produce reliable statistics.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"first_quintile\",\n            \"text\": \"In the 5th quintile—the bottom 20 percent of economies—a striking pattern is the presence of many Small Island Developing States. These economies can face persistent capacity constraints, even at higher income levels. Examples include \u003Cspan data-color-id=\\\"cat8\\\" class=\\\"cat8\\\">St. Kitts and Nevis\u003C/span> (42.7), Nauru (47.9), The Bahamas (51.3), and Guyana (54.1). In the bottom quintile overall, Small Island Developing States and fragile and conflict-affected (FCV) countries together account for the vast majority of cases, underscoring that vulnerability and scale can be as important as income.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#6\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"fcv_pillars\",\n            \"text\": \"About 60.5 percent of \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(6,41,88);\\\">FCV countries\u003C/span> fall in the lowest SPI quintile. Yet these are precisely the settings where timely, credible statistics are most essential for crisis response and effective policy design, making investment in statistical systems especially urgent.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#7\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"fcv_data_sources\",\n            \"text\": \"The gap is starkest for Pillar 4 (data sources). FCV countries tend to score extremely low on the ability to produce the building blocks of statistics—surveys, censuses, administrative data, geospatial data, and so on—even relative to other countries in the bottom quintile. Without these foundations, both measurement and policy targeting become much less reliable.\",\n            \"translationPrefix\": \"goal_17.content.#21.scenes.#8\"\n          }\n        ],\n        \"translationPrefix\": \"goal_17.content.#21\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"spi_gdp_scatter\",\n        \"title\": \"Income matters, but it is not destiny\",\n        \"subtitle\": \"\",\n        \"source\": \"Source of the data\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"x_axis_title\": \"GDP per capita\",\n        \"x_axis_units\": \"$, log\",\n        \"y_axis_title\": \"SPI index\",\n        \"overperformers\": \"Overperformers\",\n        \"underperformers\": \"Underperformers\",\n        \"visSize\": \"default\",\n        \"data_download\": \"17.data.spi_vs_gdp.csv\",\n        \"data\": \"1OyQNKd9JXj6TCQnS3qOGfpGrN0jcugXE-NTLzrqeTss\",\n        \"textParagraph\": \"Countries such as Mexico, Burkina Faso, Senegal, Uzbekistan, and the Philippines substantially overperform relative to what would be predicted from their GDP per capita, showing that institutions and sustained investments can build high-performing statistical systems at modest income levels. By contrast, Libya, Equatorial Guinea, Turkmenistan, St. Kitts and Nevis, and Andorra are notable underperformers, with SPI outcomes well below what their income levels would suggest, highlighting that resources alone do not guarantee statistical capacity.\",\n        \"translationPrefix\": \"goal_17.content.#23\"\n      }\n    ]\n  },\n  \"09\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"internet_access_scroller\",\n        \"title\": \"Global Internet access: trends and divides\",\n        \"subtitle\": \"\",\n        \"visdescription\": \"A scroller with three scenes, each  a line chart, showing the rise in Internet access between 2005 and 2025 for the world, regional groupings, and income groups\",\n        \"y_axis_title\": \"Individuals using the Internet\",\n        \"y_axis_units\": \"% of population\",\n        \"data_download\": \"09.data.internet_access.csv\",\n        \"data\": \"1EhTY4fTDlnuVTNwNWXAGQlrE-4AWURvtUDYEWySz8QU\",\n        \"source\": \"\u003Ca href=\\\"https://www.itu.int/en/ITU-D/Statistics/pages/stat/default.aspx\\\" target=\\\"_blank\\\">International Telecommunications Union\u003C/a> (ITU). Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/IT.NET.USER.ZS\\\" target=\\\"_blank\\\">IT.NET.USER.ZS\u003C/a>) \",\n        \"note\": \"\",\n        \"keyFact\": \"2.2 billion\",\n        \"keyFactLabel\": \"people worldwide do not use the Internet\",\n        \"indicator_360\": \"WB_WDI_IT_NET_USER_ZS\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"world\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(8,16,121);\\\">Worldwide\u003C/span>], the share of people who access the Internet has increased from 16 percent only two decades ago to over 70 percent today. Still, over a quarter of the global population (2.2 billion) remains offline.\",\n            \"translationPrefix\": \"goal_09.content.#6.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"income_groups\",\n            \"text\": \"Internet adoption mirrors an economy’s level of development: it is nearly universal  (94 percent) in [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(1,107,108);\\\">high-income countries\u003C/span>] but less than a quarter (23 percent) in [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(59,77,166);\\\">low-income countries\u003C/span>]. \",\n            \"translationPrefix\": \"goal_09.content.#6.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"regions_groups\",\n            \"text\": \"Basic Internet access is lowest in [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span>], where only around  one-third  of the population (36 percent) is online.\",\n            \"translationPrefix\": \"goal_09.content.#6.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_09.content.#6\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"internet_access_urban_rural\",\n        \"title\": \"The urban-rural digital divide\",\n        \"subtitle\": \"Individuals using the Internet (2025)\",\n        \"source\": \"International Telecommunications Union (ITU). \u003Ca href=\\\"https://www.itu.int/en/ITU-D/Statistics/pages/stat/default.aspx\\\" target=\\\"_blank\\\">Statistics\u003C/a>. \",\n        \"visdescription\": \"A panel of four line charts, each showing the level of Internet access for urban and rural areas between 2022 and 2025, for each income region. The gap is represented by a shaded area between each pair of lines. \",\n        \"urban\": \"Urban\",\n        \"rural\": \"Rural\",\n        \"visSize\": \"default\",\n        \"data_download\": \"09.data.internet_access_urban_rural.csv\",\n        \"data\": \"1Ms21MBusSuxea8fb176o-5rfzLt_CodNi8K48I7U0kU\",\n        \"translationPrefix\": \"goal_09.content.#9\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"income_gender_gap\",\n        \"title\": \"Gender gaps in Internet access are wide in low- and lower-middle income economies\",\n        \"subtitle\": \"Individuals using the Internet (% of population), by gender and income level, 2025\",\n        \"visSize\": \"small\",\n        \"source\": \"International Telecommunication Union, \u003Ca href=\\\"https://datahub.itu.int/\\\" target=\\\"_blank\\\">ITU DataHub\u003C/a>. Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/IT.NET.USER.MA.ZS\\\" target=\\\"_blank\\\">IT.NET.USER.MA.ZS\u003C/a>, \u003Ca href=\\\"https://data.worldbank.org/indicator/IT.NET.USER.FE.ZS\\\" target=\\\"_blank\\\">IT.NET.USER.FE.ZS\u003C/a>)\",\n        \"visdescription\": \"Column chart showing Internet access levels for men and women, by income group\",\n        \"male\": \"Male\",\n        \"female\": \"Female\",\n        \"gap\": \"Gap\",\n        \"no_internet_access\": \"No Internet access\",\n        \"theme\": \"light\",\n        \"data_download\": \"09.data.income_gender_gap.csv\",\n        \"data\": \"1B_ljLFoVYyRYgGgjwESR2tAHUpmxWP-0u6DRAOYBgdI\",\n        \"translationPrefix\": \"goal_09.content.#14\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"internet_progress\",\n        \"title\": \"Almost all countries have increased their Internet access since 2015\",\n        \"subtitle\": \"Individuals using the Internet (% of population)\",\n        \"select_country\": \"Select countries to highlight\",\n        \"typical_progress\": \"Typical progress\",\n        \"source\": \"International Telecommunication Union, \u003Ca href=\\\"https://datahub.itu.int/\\\" target=\\\"_blank\\\">ITU DataHub\u003C/a> and World Bank staff calculations, based on \u003Ca href=\\\"https://openknowledge.worldbank.org/entities/publication/c97258fc-bf8f-4bd7-b56f-347b8349368d\\\" target=\\\"_blank\\\">Mahler et al. 2026\u003C/a>\",\n        \"visdescription\": \"This chart uses arrows to show Internet access levels by country in 2015 and 2024. It also shows where the countries would have been, had they followed the typical pace of progress since 2015.\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"09.data.internet_usage_progress.csv\",\n        \"data\": \"1F96uP1Br1y4yel27IpE-YbumBGnTUkmKy5rXnUs4tL0\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"progress1 \",\n            \"text\": \"By 2024, in 54 countries, more than 90 percent of the population was using the Internet. \",\n            \"translationPrefix\": \"goal_09.content.#19.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"progress2 \",\n            \"text\": \"Countries like [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Cambodia\u003C/span>][emphasis:  ]and the[emphasis:  ][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Kyrgyz Republic\u003C/span>][emphasis:  ]had made much more progress by 2024 than expected based on their access levels in 2015. In [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Cambodia\u003C/span>], Internet access levels rose from less than 7 percent to close to 70 percent of the population. The [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Kyrgyz Republic\u003C/span>][emphasis:  ]also made remarkable progress, from 30 percent of the population in 2015 to over 90 percent by 2024.\",\n            \"translationPrefix\": \"goal_09.content.#19.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_09.content.#19\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"mobile_vs_fixed_broadband\",\n        \"title\": \"Worldwide, mobile broadband far surpasses fixed broadband adoption\",\n        \"subtitle\": \"\",\n        \"x_axis_title\": \"Mobile broadband subscriptions\",\n        \"x_axis_units\": \"per 100 people\",\n        \"y_axis_title\": \"Fixed broadband subscribers\",\n        \"y_axis_units\": \"per 100 people\",\n        \"more_fixed\": \"More fixed broadband\",\n        \"more_mobile\": \"More mobile broadband\",\n        \"fixed_tooltip\": \"Fixed:\",\n        \"mobile_tooltip\": \"Mobile:\",\n        \"source\": \"International Telecommunication Union, ITU DataHub. Retrieved from Data360 (\u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/WB_WDI_IT_NET_BBND_P2\\\" target=\\\"_blank\\\">WB_WDI_IT_NET_BBND_P2\u003C/a>, \u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/ITU_DH_ACT_MOB_PER_100\\\" target=\\\"_blank\\\">ITU_DH_ACT_MOB_PER_100\u003C/a>)\",\n        \"visdescription\": \"Scatterplot showing the number of fixed and mobile broadband subscriptions, per 100 people, by country\",\n        \"visSize\": \"default\",\n        \"data_download\": \"09.data.mobile_fixed_broadband_subscriptions.zip\",\n        \"data\": \"1L-yEyxkQMrc5MA5gSNTjxlmQtHCpgfZtG1cddhgW7DE\",\n        \"indicator_360\": \"ITU_DH_ACT_MOB_PER_100\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"global\",\n            \"text\": \"Between 2015 and 2025, fixed broadband levels doubled, reaching 20 subscriptions per 100 people. Meanwhile, [emphasis: mobile Internet connectivity has surged to 99 active mobile broadband subscriptions per 100 people.] \",\n            \"translationPrefix\": \"goal_09.content.#27.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"hic\",\n            \"text\": \"[emphasis: Fixed broadband] is common in many high-income countries. In [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(1,107,108);\\\">Germany\u003C/span>], for example, there are approximately 46 fixed broadband connections per 100 people. [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(115,175,72);\\\">China\u003C/span>], an upper-middle-income country, is also highly connected, with 47 fixed high-speed Internet subscriptions per 100 people in 2024. \",\n            \"translationPrefix\": \"goal_09.content.#27.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"income_levels\",\n            \"text\": \"But fixed broadband is nearly absent in low and lower middle-income economies. In [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Morocco\u003C/span>][emphasis:  ]and[emphasis:  ][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Eswatini\u003C/span>], for example, penetration is minimal, with 7 and 2.5 fixed broadband subscriptions per 100 people, respectively.\",\n            \"translationPrefix\": \"goal_09.content.#27.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"civ_sen\",\n            \"text\": \"Across much of the world, people connect to the Internet through mobile phones. In [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Morocco\u003C/span>] and in [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">Eswatini\u003C/span>][emphasis: , ]there are 98 and 116 active [emphasis: mobile broadband] subscriptions, respectively, per 100 people. (In many countries, there are more than 100 mobile broadband subscriptions per 100 people due to  multiple connections—for example, through  smartphones, tablets, work devices, or other connected equipment.)[reference: mrbs1]\",\n            \"translationPrefix\": \"goal_09.content.#27.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_09.content.#27\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"coverage_map\",\n        \"title\": \"Most of the world is covered by 3G and 4G networks. Sub-Saharan Africa is the least connected region\",\n        \"subtitle\": \"Percentage of inhabitants within range of at least a 3G, 4G, or 5G mobile-cellular signal, irrespective of whether they are subscribers\",\n        \"g3\": \"3G Network\",\n        \"g4\": \"4G Network\",\n        \"g5\": \"5G Network\",\n        \"legend_title\": \"Share of people covered\",\n        \"no_data\": \"No data\",\n        \"source\": \"International Telecommunication Union, \u003Ca href=\\\"https://datahub.itu.int/\\\" target=\\\"_blank\\\">ITU DataHub\u003C/a>. Retrieved from Data360 (\u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/ITU_DH_POP_COV_3G\\\" target=\\\"_blank\\\">ITU_DH_POP_COV_3G\u003C/a>, \u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/ITU_DH_POP_COV_4G\\\" target=\\\"_blank\\\">ITU_DH_POP_COV_4G,\u003C/a> \u003Ca href=\\\"https://data360.worldbank.org/en/int/indicator/ITU_DH_POP_COV_5G\\\" target=\\\"_blank\\\">ITU_DH_POP_COV_5G\u003C/a>)\",\n        \"visdescription\": \"Three choropleth world maps showing levels of country coverage for at least 3G, 4G, and 5G networks\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"09.data.network_coverages.csv\",\n        \"data\": \"1USKTFa0rwEekfOuqWWCmLTBqRJW3qlcbbfkNJimxD5Q\",\n        \"keyFact\": \"9 in 10\",\n        \"keyFactLabel\": \"people in Sub-Saharan Africa are not covered by a 5G network\",\n        \"indicator_360\": \"ITU_DH_POP_COV_5G\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"coverage_3G\",\n            \"text\": \"96 percent of the global population lives within reach of at least a  3G network.\",\n            \"translationPrefix\": \"goal_09.content.#34.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"coverage_4G\",\n            \"text\": \"Although 4G networks cover over 93 percent of the people in the world, [emphasis: there are large gaps in] [emphasis: low-income countries, mostly in Sub-Saharan Africa, ]particularly in rural areas. \",\n            \"translationPrefix\": \"goal_09.content.#34.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"coverage_5G\",\n            \"text\": \"5G is widely available in many high-income economies. In some upper- and lower-middle-income countries like [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(115,175,72);\\\">China\u003C/span>], [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">India\u003C/span>], and [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(115,175,72);\\\">Thailand\u003C/span>][emphasis: , ]over 80 percent of people are covered by 5G networks.\",\n            \"translationPrefix\": \"goal_09.content.#34.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"coverage_5G\",\n            \"text\": \"In Sub-Saharan Africa, the deployment of 5G remains largely confined to a few high-density urban areas, and only [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(115,175,72);\\\">Mauritius\u003C/span>][emphasis:  ]and [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(115,175,72);\\\">South Africa\u003C/span>][emphasis:  ]have over 50 percent coverage.\",\n            \"translationPrefix\": \"goal_09.content.#34.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_09.content.#34\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"speed_test\",\n        \"title\": \"High-income countries enjoy high-speed Internet\",\n        \"subtitle\": \"Median country download speeds (mbps)\",\n        \"fixed\": \"Fixed broadband\",\n        \"mobile\": \"Mobile broadband\",\n        \"mbps\": \"Megabits per second\",\n        \"restart\": \"Restart\",\n        \"source\": \"\u003Ca href=\\\"https://www.speedtest.net/global-index\\\" target=\\\"_blank\\\">Speedtest Global Index\u003C/a> (February 2026)\",\n        \"visdescription\": \"Dot chart race illustrating the median download speed by country for fixed and mobile broadband\",\n        \"theme\": \"light\",\n        \"data_download\": \"09.data.speedtest.csv\",\n        \"data\": \"1tqQOC36Nwv_wtwvqVYsawZwSiIKz31vZ6SWT9-pne4g\",\n        \"translationPrefix\": \"goal_09.content.#40\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"coverage_access_slopes\",\n        \"title\": \"Mobile networks now reach most of the population, but many people remain offline\",\n        \"subtitle\": \"\",\n        \"coverage_3g\": \"covered by 3G\",\n        \"usage\": \"using the Internet\",\n        \"y_axis_title\": \"Share of people\",\n        \"y_axis_units\": \"%\",\n        \"source\": \"International Telecommunication Union, \u0 oad\": \"09.data.can_send_text_message.csv\",\n        \"data\": \"1-l--CcpPxm-NjaZ3qVBTN8776Nr9uOXvgelAKecclWs\",\n        \"translationPrefix\": \"goal_09.content.#48\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"smartphone_ownership\",\n        \"title\": \"Few people in low-income countries own a smartphone\",\n        \"subtitle\": \"Share of people who report that their main mobile phone is a smartphone\",\n        \"source\": \"\u003Ca href=\\\"https://www.worldbank.org/en/publication/globalfindex\\\" target=\\\"_blank\\\">The Global Findex Database\u003C/a> (2025), indicators: [con9a] “Main mobile phone is a smartphone (%, age 15+)”\",\n        \"visdescription\": \"Vertical dot plot showing the share of people who report that their main mobile phone is a smartphone, by country and income group\",\n        \"mobile_not_main\": \"\u003Cspan style=\\\"background-color: rgb(217,217,217);\\\">Share of people not owning a smartphone \u003C/span>\",\n        \"lack_of_money\": \"\u003Cspan style=\\\"background-color: rgb(217,217,217);\\\">Lack of money as a reason for having no smartphone\u003C/span>\",\n        \"data_download\": \"09.data.lack_of_money.csv\",\n        \"data\": \"1uvmwqlLOt867y1S_0Hr4ZT46wXg0ilxE2OJS5DTj6V4\",\n        \"publish_progress\": \"true\",\n        \"keyFact\": \"22%\",\n        \"keyFactLabel\": \"of people in low-income countries own a smartphone\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"smartphone_regions\",\n            \"text\": \"The share of people who[emphasis:  do not own a smartphone ]is high in poorer countries, reaching nearly[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255);\\\"> \u003C/span>][emphasis: 80 percent] in [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(59,77,166);\\\">low-income economies\u003C/span>] and about[emphasis:  ][emphasis: 50 percent] in[emphasis: \u003Cspan style=\\\"background-color: rgb(219,149,215);\\\"> \u003C/span>][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(219,149,215);\\\">lower-middle-income economies\u003C/span>]\u003Cspan style=\\\"background-color: rgb(219,149,215);\\\">.\u003C/span>\u003Cspan style=\\\"background-color: rgb(219,149,215);\\\">\u003C/span>\",\n            \"translationPrefix\": \"goal_09.content.#51.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"smartphone_countries\",\n            \"text\": \"In several low-income countries—including [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(59,77,166);\\\">Malawi\u003C/span>][emphasis: , ][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(59,77,166);\\\">Madagascar\u003C/span>][emphasis: , and ][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(59,77,166);\\\">Chad\u003C/span>][emphasis: —less than 14 percent of adults own a smartphone]. This highlights the strong association between income levels and smartphone ownership, and points to the persistent barriers faced by the poorest in accessing more advanced mobile technologies. \",\n            \"translationPrefix\": \"goal_09.content.#51.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_09.content.#51\"\n      }\n    ]\n  },\n  \"01\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"draw_your_chart\",\n        \"visSize\": \"fullScreen\",\n        \"title\": \"How has global extreme poverty evolved since 1950?\",\n        \"subtitle\": \"\",\n        \"y_axis_title\": \"Poverty rate\",\n        \"y_axis_units\": \"%\",\n        \"country_rates_annotation\": \"Country poverty rates in 2025\",\n        \"global_poverty_rates\": \"Global poverty rate\",\n        \"instructions\": \"Click and drag to draw a line with your best guess, starting from the \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(177,67,199);\\\">global poverty rate\u003C/span> in 1950 on the left\",\n        \"encouragement\": \"Keep going! Draw your guess all the way to 2025 on the right\",\n        \"done\": \"Click the button to see your result. You can still adjust your guess\",\n        \"good_result\": \"Nice work! \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(190,98,208);\\\">global poverty rate\u003C/span>, which is around 10 percent today\",\n        \"ok_result\": \"Not bad! \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(190,98,208);\\\">global poverty rate\u003C/span>, which is around 10 percent today\",\n        \"hm_result\": \"Hmm, that could've been better. \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(190,98,208);\\\">global poverty rate\u003C/span>, which is around 10 percent today\",\n        \"poor_result\": \"That was poor. \u003Cspan data-color-id=\\\"cat1\\\" class=\\\"cat1\\\">Your guess\u003C/span> was on average {result} percentage points off the actual \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(190,98,208);\\\">global poverty rate\u003C/span>, which is around 10 percent today\",\n        \"show_data_button\": \"Just show the data\",\n        \"done_button\": \"Done, show my result\",\n        \"reset\": \"Reset\",\n        \"alt-text\": \"Global poverty rate time series\",\n        \"data_download\": \"01.data.global_poverty.csv\",\n        \"data\": \"1Wj93Lyhbf1AS0t7A6AlU6WUgItdDEsQA7YlF4VtB3Vg\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank Poverty and Inequality Platform\u003C/a>; \u003Ca href=\\\"https://www.worldbank.org/en/publication/macro-poverty-outlook\\\" target=\\\"_blank\\\">World Bank Macro and Poverty Outlook April 2026\u003C/a>; \u003Ca href=\\\"https://doi.org/10.1596/1813-9450-11350\\\" target=\\\"_blank\\\">Mahler et al. 2026\u003C/a>; \u003Ca href=\\\"https://hdl.handle.net/10986/43363\\\" target=\\\"_blank\\\">Mahler et al. 2025\u003C/a>.\",\n        \"indicator_360\": \"WB_WDI_SI_POV_DDAY\",\n        \"translationPrefix\": \"goal_01.content.#4\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"poverty_regions\",\n        \"title\": \"Extreme poverty has fallen in most regions since 1950\",\n        \"subtitle\": \"Poverty rate by region (%)\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank Poverty and Inequality Platform\u003C/a>, \u003Ca href=\\\"https://doi.org/10.1596/1813-9450-11350\\\" target=\\\"_blank\\\">Mahler et al. 2026\u003C/a>, \u003Ca href=\\\"https://hdl.handle.net/10986/43363\\\" target=\\\"_blank\\\">Mahler et al. 2025\u003C/a>.\",\n        \"y_axis_title\": \"Poverty rate\",\n        \"y_axis_units\": \"%\",\n        \"visdescription\": \"Global extreme poverty has fallen from about 60 percent in 1950 to about 10 percent in 2025\",\n        \"theme\": \"light (alternatively: dark)\",\n        \"data_download\": \"01.data.regional_poverty.csv\",\n        \"data\": \"1S9d3aNKSvPk0XMmqK9-SrWnlVUcmvhfXvVRYeM3LU54\",\n        \"keyFact\": \"10%\",\n        \"keyFactLabel\": \"of people worldwide live in extreme poverty today, compared to 60% in 1950\",\n        \"indicator_360\": \"WB_WDI_SI_POV_DDAY\",\n        \"translationPrefix\": \"goal_01.content.#7\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"poverty_scroller\",\n        \"title\": \"Several countries have eliminated poverty since 1950\",\n        \"subtitle\": \"\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank Poverty and Inequality Platform\u003C/a>, \u003Ca href=\\\"https://www.worldbank.org/en/publication/macro-poverty-outlook\\\" target=\\\"_blank\\\">World Bank Macro and Poverty Outlook April 2026\u003C/a>, \u003Ca href=\\\"https://doi.org/10.1596/1813-9450-11350\\\" target=\\\"_blank\\\">Mahler et al. 2026\u003C/a>, and \u003Ca href=\\\"https://hdl.handle.net/10986/43363\\\" target=\\\"_blank\\\">Mahler et al. 2025\u003C/a>.\",\n        \"visdescription\": \"Poverty trends across selected countries from 1950-2025 as well as projections to 2050 for selected countries that still have high poverty rates. \",\n        \"theme\": \"light (alternatively: dark)\",\n        \"data_download\": \"01.data.country_poverty.zip\",\n        \"data\": \"1W-0JLU1wkyV-G2Z0xmSxJVKLFV1dE1mnfiH1Ns4xQ54\",\n        \"yAxisTitle\": \"Poverty rate\",\n        \"xAxisTitle\": \"Years since reaching 50%\",\n        \"skip typical_path\": \"All these countries moved faster than the typical speed of progress, which was around 70 years to go from 50 percent to 10 percent poverty. \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(243,87,142);\\\">Korea\u003C/span>, which achieved the feat in 11 years,  moved at six times the typical speed.\",\n        \"keyFact\": \"43 countries\",\n        \"keyFactLabel\": \"with high poverty are making little progress or reversing past gains\",\n        \"indicator_360\": \"WB_WDI_SI_POV_DDAY\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"korea\",\n            \"text\": \"Since the aftermath of the Korean War, \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(243,87,142);\\\">Korea\u003C/span> evolved from being heavily burdened by extreme poverty to having virtually eliminated it. In [emphasis: little more than a decade], extreme poverty fell [emphasis: from 50 percent to 10 percent]. \",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"other_reducers\",\n            \"text\": \"\u003Cspan style=\\\"background-color: rgb(248,168,223);\\\">Japan\u003C/span>, \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(187,59,100);\\\">China\u003C/span>, \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(128,30,55);\\\">Thailand\u003C/span>, and \u003Cspan data-color-id=\\\"cat7\\\" class=\\\"cat7\\\">Bangladesh\u003C/span> have embarked on similarly impressive journeys.\",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"highlight_80\",\n            \"text\": \"These countries all had moments—at different points in time— where [emphasis: half the population] was living in extreme poverty…\",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"shifted\",\n            \"text\": \"…and they all managed to reduce the share of people living in extreme poverty to [emphasis: 1 in 10 ]over a span of 10–30 years.\",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"shifted_nonasia\",\n            \"text\": \"\u003Cspan style=\\\"color: rgb(68,71,70);\\\">It is not just countries in Asia that have undergone such declines; others\u003C/span>—including \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(12,124,104);\\\">Brazil\u003C/span>\u003Cspan style=\\\"color: rgb(68,71,70);\\\"> and \u003C/span>\u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(170,0,0);\\\">Türkiye\u003C/span>—\u003Cspan style=\\\"color: rgb(68,71,70);\\\">have experienced similar, albeit slightly less rapid, change.\u003C/span>\",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"on_track\",\n            \"text\": \"Some countries have yet to achieve low poverty rates, but are on a promising path. \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(255,152,0);\\\">Rwanda\u003C/span>, for example, is estimated to have reduced extreme poverty from 90 percent in the aftermath of the civil war in 1994 to less than 40 percent today, though data limitations complicate precise comparisons.[footnote: Poverty rates for Rwanda are not comparable between 2016/17 and 2023/24. The trend noted here bridges this gap using growth from national accounts, but ongoing empirical work may suggest different rates of progress over this period.] \",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"on_track_projections\",\n            \"text\": \"If  it  continues this pace of progress,  \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(255,152,0);\\\">Rwanda\u003C/span> will reduce extreme poverty to less than 10 percent by 2050.\",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#6\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"like_rwanda\",\n            \"text\": \"And Rwanda is not alone. It is one of 10 countries, mostly in \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span>, that are on a pathway to reducing poverty to less than 10 percent by 2050.\",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#7\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"left_behind\",\n            \"text\": \"But another 43 countries are on a less encouraging trend. With their current speed of progress—or lack of it—they will continue to suffer from high levels of poverty in the coming decades.\",\n            \"translationPrefix\": \"goal_01.content.#9.scenes.#8\"\n          }\n        ],\n        \"translationPrefix\": \"goal_01.content.#9\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"poverty_projections\",\n        \"title\": \"Global poverty could increase if current trends continue\",\n        \"subtitle\": \"\",\n        \"skip\": \"If all countries progress at Korea’s pace, global extreme poverty would be reduced to 1 percent by 2050. But copying Korea's trajectory will be difficult. If countries progress at the pace of Brazil or Türkiye, there will be modest declines, and if they progress at the typical speed observed since 1950, global extreme poverty will stand at 8.5 percent poverty by 2050. Unfortunately, the speed of global poverty reduction has slowed down over the past years, and if countries continue on their current paths, global poverty will start to increase.[footnote: See the \u003Ca href=\\\"https://worldbank.github.io/sdgatlas-preview/measuring-progress\\\" target=\\\"_blank\\\">Explainer\u003C/a> for how these projections are constructed]\",\n        \"source\": \"\u003Ca href=\\\"https://pip.worldbank.org/home\\\" target=\\\"_blank\\\">World Bank Poverty and Inequality Platform\u003C/a>, \u003Ca href=\\\"https://www.worldbank.org/en/publication/macro-poverty-outlook\\\" target=\\\"_blank\\\">World Bank Macro and Poverty Outlook April 2026\u003C/a>, \u003Ca href=\\\"https://doi.org/10.1596/1813-9450-11350\\\" target=\\\"_blank\\\">Mahler et al. 2026\u003C/a>, and \u003Ca href=\\\"https://hdl.handle.net/10986/43363\\\" target=\\\"_blank\\\">Mahler et al. 2025\u003C/a>\",\n        \"y_axis_title\": \"Poverty rate\",\n        \"y_axis_units\": \"%\",\n        \"rate4\": \"Korea’s path\",\n        \"rate2\": \"Brazil's path\",\n        \"rate1\": \"Typical path\",\n        \"rateH\": \"Current path\",\n        \"global_poverty_rate\": \"Global poverty rate\",\n        \"visdescription\": \"Global poverty projections to 2050 under various scenarios\",\n        \"theme\": \"light (alternatively: dark)\",\n        \"data_download\": \"01.data.global_projections.zip\",\n        \"data\": \"1bUEYFUXwRG3-UGPMvGajgceJAJ_a6TMP7bkOUQmIROg\",\n        \"keyFact\": \"600 million\",\n        \"keyFactLabel\": \"more people will live in extreme poverty in 2050 if countries’ current trajectories continue\",\n        \"indicator_360\": \"WB_WDI_SI_POV_DDAY\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"rate4\",\n            \"text\": \"If all countries progress at Korea’s pace, global extreme poverty would be reduced to 1.5 percent by 2050.\",\n            \"translationPrefix\": \"goal_01.content.#17.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"rate2\",\n            \"text\": \"But copying Korea's trajectory will be difficult. If countries progress at the pace of Brazil, Tunisia, or Türkiye, there will be modest declines.\",\n            \"translationPrefix\": \"goal_01.content.#17.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"typical\",\n            \"text\": \"If countries manage to progress at the typical speed observed since 1950, global extreme poverty will stand  at around 9 percent poverty by 2050. \",\n            \"translationPrefix\": \"goal_01.content.#17.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"rateH\",\n            \"text\": \"Unfortunately, the speed of global poverty reduction has slowed down over the past years, and if countries continue on their current paths, global poverty will start to increase.[footnote: See the explainer “\u003Ca href=\\\"https://worldbank.github.io/sdgatlas-preview/measuring-progress\\\" target=\\\"_blank\\\">Measuring Progress\u003C/a>” for details on how these paths are constructed. \",\n            \"translationPrefix\": \"goal_01.content.#17.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_01.content.#17\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"venn_diagram\",\n        \"title\": \"Most of the world’s poor live in countries that suffer from conflict, poor economic management, and/or high corruption\",\n        \"subtitle\": \"Countries not on track to reduce poverty to 10 percent by 2050\",\n        \"source\": \"\u003Ca href=\\\"https://www.worldbank.org/en/topic/fragilityconflictviolence/brief/classification-of-fragile-and-conflict-affected-situations\\\" target=\\\"_blank\\\">Classification of fragile and conflict-affected situations\u003C/a>;  and \u003Ca href=\\\"https://databank.worldbank.org/source/country-policy-and-institutional-assessment\\\" target=\\\"_blank\\\">Country Policy and Institutional Assessment\u003C/a>\",\n        \"visdescription\": \"The overlap between acute insecurity, poor economic management, and high corruption and low accountability\",\n        \"theme\": \"light (alternatively: dark)\",\n        \"data_download\": \"01.data.causes.csv\",\n        \"data\": \"1jC5pRzXTmymEYl5aOP3oMwNEy_pBQSE6cW6KvLaGsaU\",\n        \"cpia_econ\": \"Poor economic management\",\n        \"cpia_tran\": \"Corruption and low accountability \",\n        \"conflict\": \"Acute insecurity\",\n        \"not_affected_title\": \"Less affected countries\",\n        \"not_taking_off\": \"Country with little or no progress\",\n        \"number_poor\": \"Number of poor\",\n        \"million\": \"(millions)\",\n        \"translationPrefix\": \"goal_01.content.#30\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"national_poverty_comparison\",\n        \"title\": \"Countries with low extreme poverty rates often suffer from other forms of poverty\",\n        \"subtitle\": \"\",\n        \"source\": \"\u003Ca href=\\\"https://data.worldbank.org/indicator/SI.POV.NAHC\\\" target=\\\"_blank\\\">World Development Indicators\u003C/a>; \u003Ca href=\\\"https://unstats.un.org/sdgs/dataportal\\\" target=\\\"_blank\\\">United Nations SDG Database\u003C/a>.\",\n        \"visdescription\": \"Comparison between multidimensional and monetary poverty rates across selected countries.\",\n        \"international_poverty_rate\": \"International poverty rate\",\n        \"multidimensional\": \"National multidimensional poverty rate\",\n        \"x_axis_title\": \"Poverty rate\",\n        \"x_axis_units\": \"%\",\n        \"gap\": \"Gap\",\n        \"data_download\": \"01.data.national_poverty_comparison.csv\",\n        \"data\": \"1Vwbp7eBIOi_195OteLJ6w5_FTpO2nKAuH4K_MSx37E8\",\n        \"indicator_360\": \"WB_WDI_SI_POV_MPUN\",\n        \"translationPrefix\": \"goal_01.content.#36\"\n      }\n    ]\n  },\n  \"02\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"prevalence_undernourishment_regions\",\n        \"title\": \"Global hunger is on the rise\",\n        \"subtitle\": \"\",\n        \"source\": \"Retrieved from World Development Indicators (\u003Ca href=\\\"http://SN.ITK.DEFC.ZS\\\" target=\\\"_blank\\\">SN.ITK.DEFC.ZS\u003C/a>). Food and Agriculture Organization of the United Nations ( FAO ), uri: \u003Ca href=\\\"http://fao.org/faostat/en/#home\\\" target=\\\"_blank\\\">fao.org/faostat/en/#home\u003C/a> \",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"indicator_360\": \"\u003Cspan style=\\\"background-color: rgb(255,229,153);\\\">WB_WDI_SN_ITK_DEFC_ZS\u003C/span>\",\n        \"y_axis_title\": \"Prevalence of undernourishment\",\n        \"y_axis_units\": \"%\",\n        \"data_download\": \"02.data.prevalence_undernourishment_regions.csv\",\n        \"data\": \"1EJwFXk2VfNuwjtcf_yiUzJDCqWzMQLX34MN3J4b86dE\",\n        \"keyFact\": \"120 million \",\n        \"keyFactLabel\": \"more people faced hunger in 202
