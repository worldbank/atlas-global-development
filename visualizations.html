3, compared to 2015.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"global15\",\n            \"text\": \"Between 2001 and 2015, global hunger fell impressively, nearly halving from 13 percent to 7.5 percent.\",\n            \"translationPrefix\": \"goal_02.content.#7.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"global_full\",\n            \"text\": \"Since then, however, progress has stalled and even reversed. By 2023, nearly one in eleven people faced undernourishment.\",\n            \"translationPrefix\": \"goal_02.content.#7.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"regions15\",\n            \"text\": \"This pattern is true for nearly all regions. \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span>, \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(78,194,192);\\\">South Asia\u003C/span>, \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(243,87,142);\\\">East Asia & Pacific\u003C/span>, and \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(12,124,104);\\\">Latin America & the Caribbean\u003C/span> all saw significant improvements in the first decade since 2000...\",\n            \"translationPrefix\": \"goal_02.content.#7.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"regions_full\",\n            \"text\": \"…only for gains to slow or reverse.\",\n            \"translationPrefix\": \"goal_02.content.#7.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"risen\",\n            \"text\": \"In \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(78,194,192);\\\">South Asia\u003C/span>, and \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(12,124,104);\\\">Latin America & the Caribbean\u003C/span>, hunger rates have risen again…\",\n            \"translationPrefix\": \"goal_02.content.#7.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"stalled\",\n            \"text\": \"…while progress in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(243,87,142);\\\">East Asia & Pacific\u003C/span> has largely stalled.\",\n            \"translationPrefix\": \"goal_02.content.#7.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"mea\",\n            \"text\": \"The most concerning trend is in the \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">Middle East & North Africa, Afghanistan & Pakistan\u003C/span> and \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span> where hunger has been on a continuous rise for more than a decade—from 2012 to 2023. In 2023, over 250 million people faced hunger in Sub-Saharan Africa and another 100 million people in the Middle East, North Africa, Afghanistan and Pakistan region.\",\n            \"translationPrefix\": \"goal_02.content.#7.scenes.#6\"\n          }\n        ],\n        \"translationPrefix\": \"goal_02.content.#7\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"prevalence_undernourishment_gridmap\",\n        \"title\": \"Over 60 countries are moving further away from ending hunger\",\n        \"subtitle\": \"\",\n        \"source\": \"Source of the data. Note: Due to measurement limitations for undernourishment, countries with negligible levels of hunger are assigned a minimum value of 2.5 percent.[reference: wdi-undernourishment] \",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"legend_title\": \"Prevalence of undernourishment, 2022\",\n        \"legend_units\": \"%\",\n        \"no_data\": \"No data available\",\n        \"target_reached\": \"Target met\",\n        \"progress_speed\": \"Speed of progress\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"02.data.prevalence_undernourishment_countries.csv\",\n        \"data\": \"12cUB9RF2QpVRyfvajuGvqDUx_mMsDz0_mu3SHEgRLi8\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"histogram\",\n            \"text\": \"By the SDGs, 60 countries have already met the target—49 of them before the SDGs began in 2015. \",\n            \"translationPrefix\": \"goal_02.content.#12.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"tile_map\",\n            \"text\": \"These success stories are concentrated in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">North America\u003C/span> and \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(170,0,0);\\\">Europe & Central Asia\u003C/span>, where food insecurity is rare.\",\n            \"translationPrefix\": \"goal_02.content.#12.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"tile_map\",\n            \"text\": \"In contrast, the countries facing the steepest challenges in reaching the target are largely in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span>.\",\n            \"translationPrefix\": \"goal_02.content.#12.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"speed_scores\",\n            \"text\": \"Since 2015, prevalence of undernourishment has \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(122,61,150);\\\">worsened\u003C/span> in 61 countries, mostly concentrated in Sub-Saharan Africa and the Caribbean regions. Some unexpected examples include Argentina and Peru where prevalence rates are not very high, but the trend in rising hunger is concerning.\",\n            \"translationPrefix\": \"goal_02.content.#12.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"speed_scores\",\n            \"text\": \"In another 12 countries, progress has been slower than expected such as Rwanda, Jamaica, and Indonesia. Expected progress is considered typical progress by a measure described in this note \u003Cspan style=\\\"background-color: rgb(255,242,204);\\\">(highlight to be added)\u003C/span>.\",\n            \"translationPrefix\": \"goal_02.content.#12.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_02.content.#12\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"food_insecurity_hotspots\",\n        \"title\": \"In the last five years, 26 countries have been food insecurity hotspots mostly concentrated in Sub-Saharan Africa and the Middle East\",\n        \"subtitle\": \"Food insecurity hotspots by level of concern and its drivers\",\n        \"textParagraph\": \"In the most recent report (June to October 2025), 13 countries are identified as hunger hotspots. Over the last five years, a total of 26 countries have been classified as hunger hotspots at various points in time. \",\n        \"source\": \"[reference: hunger-hotspots]\",\n        \"visSize\": \"default\",\n        \"visdescription\": \"In the most recent report (June to October 2025), 13 countries are identified as hunger hotspots. Over the last five years, a total of 26 countries have been classified as hunger hotspots at various points in time. \",\n        \"high_concern\": \"High concern\",\n        \"very_high_concern\": \"Very high concern\",\n        \"highest_concern\": \"Highest concern\",\n        \"previous_concern\": \"Of concern in previous 5 years\",\n        \"legend_title\": \"Food insecurity drivers\",\n        \"no_concern\": \"No concern\",\n        \"conflict\": \"Conflict related\",\n        \"conflict_security\": \"Insecurity\",\n        \"displacement\": \"Displacement\",\n        \"social_instability\": \"Social instability\",\n        \"climate\": \"Climate related\",\n        \"dry_conditions\": \"Dry conditions\",\n        \"flood\": \"Flooding\",\n        \"tropical_cyclone\": \"Tropical cyclone\",\n        \"economic_shock\": \"Economic shock\",\n        \"data_download\": \"02.hunger_hotspots.csv\",\n        \"data\": \"1TBxw1KeuooU3EiPEiB7PAqCTITAV_Obq5CXA8yV6CU0\",\n        \"keyFact\": \"1 in 5\",\n        \"keyFactLabel\": \"persons in fragile and conflict affected economies face hunger\",\n        \"translationPrefix\": \"goal_02.content.#17\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"food_insecurity_matrix\",\n        \"title\": \"Food insecurity hotspots are emerging due to conflict, climate change, and economic shocks\",\n        \"subtitle\": \"Drivers of food insecurity hotspots by country\",\n        \"textParagraph\": \"The primary drivers of food insecurity in these countries are often linked to \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(8,155,212);\\\">conflict\u003C/span>, such as insecurity, displacement, and social instability, as well as \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(229,98,69);\\\">climate change\u003C/span> factors, including droughts, flooding, and tropical cyclones. Additional contributing factors include the \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(163,122,205);\\\">economic impacts\u003C/span> of the COVID-19 pandemic, which has left many countries struggling to recover from significant job losses.[reference: wdr22] Additionally, rising global food prices have hit hardest in areas reliant on imports due to their lack of local food production [reference: unctad-trade].\",\n        \"source\": \"[reference: hunger-hotspots25]\",\n        \"visdescription\": \"The primary drivers of food insecurity in these countries are often linked to \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(8,155,212);\\\">conflict\u003C/span>, such as insecurity, displacement, and social instability, as well as \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(229,98,69);\\\">climate change\u003C/span> factors, including droughts, flooding, and tropical cyclones.\",\n        \"conflict\": \"Conflict related\",\n        \"conflict_security\": \"Insecurity\",\n        \"displacement\": \"Displacement\",\n        \"social_instability\": \"Social instability\",\n        \"climate\": \"Climate related\",\n        \"dry_conditions\": \"Dry conditions\",\n        \"flood\": \"Flooding\",\n        \"tropical_cyclone\": \"Tropical cyclone\",\n        \"economic_shock\": \"Economic shock\",\n        \"data_download\": \"02.hunger_hotspots.csv\",\n        \"data\": \"1TBxw1KeuooU3EiPEiB7PAqCTITAV_Obq5CXA8yV6CU0\",\n        \"translationPrefix\": \"goal_02.content.#18\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"undernourishment_conflict\",\n        \"title\": \"Hunger is rising rapidly in fragile and conflict affected economies\",\n        \"subtitle\": \"\",\n        \"textParagraph\": \"During the first decade of the twenty-first century, undernourishment in these regions fell from 24 percent in 2001 to 16 percent in 2011, mirroring global trends. However, since then, hunger has risen faster in the fragile and conflict affected economies than the global average, and by 2022 around 22 percent of people in these countries faced hunger, a striking 11 percentage points higher than the global rate of 9 percent.[reference: wdi-undernourishment] \",\n        \"y_axis_title\": \"Prevalence of undernourishment\",\n        \"y_axis_units\": \"% of population\",\n        \"fcs\": \"Fragile and conflict affected economies\",\n        \"non_fcs\": \"Other economies\",\n        \"source\": \"[reference: wdi-undernourishment]\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"02.data.undernourishment_conflict.csv\",\n        \"data\": \"1VbUWrxrJxMBUYx3uaxbb93rnCWT486kgh93A9108--k\",\n        \"translationPrefix\": \"goal_02.content.#23\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"myanmar_foodprices_conflict\",\n        \"title\": \"Local violence triggered nationwide food price spikes in Myanmar\",\n        \"subtitle\": \"Circles on the map represent violent events with fatalities. The size of the circle represents the number of fatalities\",\n        \"events_title\": \"Number of monthly violent events with fatalities\",\n        \"price_title\": \"Food price index\",\n        \"source\": \"Source of the data\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"default\",\n        \"publish_progress\": \"true\",\n        \"data_download\": \"02.data.myanmar_markets_conflict.zip\",\n        \"data\": \"11_2hIONYC-s4nRasbR5THTjWmX8tEDGApR2E2QAe4gM\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"intro\",\n            \"text\": \"Following the surge in conflict incidents beginning in February 2021, food prices rose sharply and have remained elevated since. According to the World Food Programme, prices have more than quadrupled since the conflict began, deepening food insecurity for millions.\",\n            \"translationPrefix\": \"goal_02.content.#30.scenes.#0\"\n          }\n        ],\n        \"translationPrefix\": \"goal_02.content.#30\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"ndvi_map_scroller\",\n        \"title\": \"Extreme floods damaged more than half of Sindh’s cropland\",\n        \"subtitle\": \"\",\n        \"no_damage\": \"No damage\",\n        \"moderate_damage\": \"Moderate damage\",\n        \"extreme_damage\": \"Extreme damage\",\n        \"ndvi\": \"NDVI\",\n        \"damage_level\": \"Level of damage\",\n        \"source\": \"Source of the data\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"default\",\n        \"keyFact\": \"57 percent\",\n        \"keyFactLabel\": \"Of cropland in Sindh, Pakistan was damaged due to extreme floods\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"intro\",\n            \"text\": \"This is the Sindh province in southeastern Pakistan.\",\n            \"translationPrefix\": \"goal_02.content.#38.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"cultivated\",\n            \"text\": \"One-third of the province is \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(100,198,134);\\\">agricultural land\u003C/span>, and is central to Pakistan's food supply. The region produces staple cereals such as wheat and rice, industrial crops including cotton and sugarcane, as well as fruit (mango and guava) and horticultural crops (chili, tomato and sunflower).\",\n            \"translationPrefix\": \"goal_02.content.#38.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"ndvi_before\",\n            \"text\": \"In August 2021, much of the Sindh area was green. \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(1,133,113);\\\">Positive values in NDVI\u003C/span> reflect normal vegetation conditions, while \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(166,97,26);\\\">negative values\u003C/span> correspond to flood-induced damage and reduced greenness.\",\n            \"translationPrefix\": \"goal_02.content.#38.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"ndvi_after\",\n            \"text\": \"During the floods in August 2022, an analysis projected severe production losses, including 88 percent (3.1 million bales) of cotton, 80 percent (1.8 million tons) of rice, and 61 percent (10.5 million tons) of sugarcane.[reference: naturesr23]\",\n            \"translationPrefix\": \"goal_02.content.#38.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"ndvi_difference\",\n            \"text\": \"As a result, [emphasis: the floods affected an estimated 33 million people], or roughly 13 percent of Pakistan’s population[reference: naturesr23] and approximately 57 percent of Sindh’s cropland (\u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(234,100,63);\\\">large negative NDVI difference compared to 2021\u003C/span>), that is 2.8 million out of 4.9 million hectares.\",\n            \"translationPrefix\": \"goal_02.content.#38.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_02.content.#38\"\n      }\n    ]\n  },\n  \"08\": {\n    \"en\": [\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"gdp_growth_global_countries\",\n        \"title\": \"The global economy keeps growing despite shocks\",\n        \"subtitle\": \"Global average per capita GDP growth rates, 1960-2027\",\n        \"textParagraph\": \"Over the past 65 years, the global economy has grown at remarkably steady rates, despite sustaining several shocks. On average, the world recovered swiftly after the substantial shock from COVID-19 in 2020. By 2021, average global GDP per capita surpassed that of 2019, and by the end of 2025, global GDP per capita had increased by 10 percent compared to 2019 [reference: WB26]. Looking ahead, solid growth is projected to continue, despite continued uncertainties from e.g. global trade.\",\n        \"y_axis_title\": \"Per capita GDP growth\",\n        \"y_axis_units\": \"annual %\",\n        \"source\": \"WB, World Development Indicators (NY.GDP.PCAP.KD.ZG)\",\n        \"visdescription\": \"\",\n        \"data_download\": \"08.data.gdp_growth.zip\",\n        \"data\": \"1qzVDPMLYFEucHzDtf8h1dTtEb9LKmKeNfRGbkO_irSE\",\n        \"translationPrefix\": \"goal_08.content.#4\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"gdp_growth_income_levels\",\n        \"title\": \"Economic growth by income group\",\n        \"subtitle\": \"Average growth in GDP per capita by income classification\",\n        \"textParagraph\": \"On average, poorer countries have experienced higher GDP per capita growth rates compared to countries in richer income classification groups.\",\n        \"mode\": \"income_levels\",\n        \"source\": \"WB, World Development Indicators (\u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">NY.GDP.PCAP.KD.ZG\u003C/span>)\",\n        \"visdescription\": \"\",\n        \"data_download\": \"08.data.gdp_growth.zip\",\n        \"data\": \"1qzVDPMLYFEucHzDtf8h1dTtEb9LKmKeNfRGbkO_irSE\",\n        \"translationPrefix\": \"goal_08.content.#6\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"growth_since_90\",\n        \"title\": \"Low income countries in 1990 have experienced markedly different growth paths\",\n        \"subtitle\": \"Indexed constant USD (1990=100), grouped by current income classification.\",\n        \"y_axis_title\": \"\",\n        \"y_axis_units\": \"Index (1990=100)\",\n        \"source\": \"WB, World Development Indicators (\u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">NY.GDP.PCAP.KD.ZG\u003C/span>)\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"visSize\": \"default\",\n        \"data_download\": \"08.data.lic_growth_rates.csv\",\n        \"data\": \"1JgVm6y5olvIBowRHLD3yP5kHkgEuQodjDahIsx4yyeY\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"hic\",\n            \"text\": \"Of the countries classified as low income in 1990 one country has managed to move to [emphasis: high income] by 2024. \",\n            \"translationPrefix\": \"goal_08.content.#11.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"umc\",\n            \"text\": \"Four countries have moved to [emphasis: upper middle income].\",\n            \"translationPrefix\": \"goal_08.content.#11.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"lmc\",\n            \"text\": \"A number of countries experienced sufficient growth to be classified as [emphasis: lower-middle income ]by 2024.\",\n            \"translationPrefix\": \"goal_08.content.#11.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"lic\",\n            \"text\": \"And a group of countries have been unable to sustain growth sufficient to escape the [emphasis: low income ]classification after 25 years.\",\n            \"translationPrefix\": \"goal_08.content.#11.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_08.content.#11\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"gdp_progress_scroller\",\n        \"title\": \"Comparing economic growth across countries\",\n        \"subtitle\": \"Development in per capita GDP from 2015 to 2024\",\n        \"source\": \"WB, World Development Indicators (\u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">NY.GDP.PCAP.KD.ZG\u003C/span>)\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"x_axis_title\": \"GDP/capita\",\n        \"x_axis_units\": \"$/day (constant 2015 US$)\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"08.data.gdp_progress.csv\",\n        \"data\": \"1dCzWKF01HIAd4bONuo0u_UOz9LEVM_1ag7ISStWIoLk\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"zoom_in\",\n            \"text\": \"Each dot here shows one of the countries classified as having low income in 1990 showing their level of income in 2015. By then, Guyana had just transitioned into an upper-middle income country. Vietnam and Nigeria had made it to lower-middle income, while Ethiopia was still a low-income country.\",\n            \"translationPrefix\": \"goal_08.content.#13.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"trends\",\n            \"text\": \"In the decade that followed, most countries experienced economic growth. But some had experienced a decline in GDP per capita, having a lower GDP per capita in 2024 compared to 2015.\",\n            \"translationPrefix\": \"goal_08.content.#13.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"zoom_out\",\n            \"text\": \"And when we zoom out to compare with the rest of the world, it becomes very clear that there is still substantial catching up to be done.\",\n            \"translationPrefix\": \"goal_08.content.#13.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"progress\",\n            \"text\": \"It is therefore also relevant to look at how countries have performed relative to similar countries. The progress measure does exactly that, seeing whether the countries have performed better or worse than their peers.\",\n            \"translationPrefix\": \"goal_08.content.#13.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"regions\",\n            \"text\": \"We can also look at how the economies have grown across regions.\",\n            \"translationPrefix\": \"goal_08.content.#13.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_08.content.#13\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"income_world_map\",\n        \"title\": \"Countries by income group\",\n        \"subtitle\": \"Income classification in 1990\",\n        \"source\": \"WB Country and Lending Groups\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"08.data.income_levels.csv\",\n        \"data\": \"1ud7kIIHA8R-QIU0WCPHDXT0izj4yor0dYi7D2ZXR0Oc\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"normal_map\",\n            \"text\": \"This map shows how countries were classified according to their income level in 1990. \",\n            \"translationPrefix\": \"goal_08.content.#15.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"shifted_countries\",\n            \"text\": \"Let us transition into a map, where all countries are equally visible.\",\n            \"translationPrefix\": \"goal_08.content.#15.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"tiles\",\n            \"text\": \"Now, each tile represents a country with the color showing their income group as of 1990. \",\n            \"translationPrefix\": \"goal_08.content.#15.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_08.content.#15\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"income_classification_scroller\",\n        \"title\": \"Income group classification\",\n        \"subtitle\": \"Developments since 1990\",\n        \"source\": \"WB Country and Lending Groups\",\n        \"no_income_classification\": \"No income classification\",\n        \"income_classification\": \"Income classification\",\n        \"in_1990\": \"In 1990\",\n        \"in_2024\": \"In 2024\",\n        \"legend_title\": \"Average GDP/capita growth, 2015-2024\",\n        \"inx_90\": \"No classification in 1990\",\n        \"hic_24\": \"High income in 2024\",\n        \"lmc_90\": \"Lower middle income in 1990\",\n        \"umc_24\": \"Upper middle income 2024\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"08.data.income_levels.csv\",\n        \"data\": \"1ud7kIIHA8R-QIU0WCPHDXT0izj4yor0dYi7D2ZXR0Oc\",\n        \"skip ssf\": \".\",\n        \"skip income_left_behind\": \".\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"income_1990\",\n            \"text\": \"The threshold for being a low income country was 610 USD in 1990. Countries with GDP per capita below this level were classified as low income. 49 countries belonged to the group of \u003Cspan data-color-id=\\\"LIC\\\" class=\\\"LIC\\\">low-income countries\u003C/span>. That corresponded to 3 out of every 10 countries.\",\n            \"translationPrefix\": \"goal_08.content.#16.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"income_2024\",\n            \"text\": \"The threshold for being a low income country is updated annually for inflation. By 2024 the threshold stood at 1,135 USD.\",\n            \"translationPrefix\": \"goal_08.content.#16.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"income_change\",\n            \"text\": \"Compared to 1990, many countries managed to move to a higher income class by 2024.\",\n            \"translationPrefix\": \"goal_08.content.#16.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"escapees\",\n            \"text\": \"28 countries managed to escape \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(59,77,166);\\\">low income\u003C/span> - Guyana even making it to \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(1,107,108);\\\">high income\u003C/span>.\",\n            \"translationPrefix\": \"goal_08.content.#16.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"fallen\",\n            \"text\": \"However, five additional countries have since been classified as low income.\",\n            \"translationPrefix\": \"goal_08.content.#16.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"gdp_growth\",\n            \"text\": \"The countries currently classified as low income have had average GDP per capita growth rates of 0.47 percent per year since 1981. A recent Global Economic Prospects report by the World Bank (January 2025) finds that their outlook is bleak. Based on 2010-2019 growth rates only six of the current 25 LICs are on a path of becoming middle-income even by 2050.\",\n            \"translationPrefix\": \"goal_08.content.#16.scenes.#5\"\n          }\n        ],\n        \"translationPrefix\": \"goal_08.content.#16\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"unemployment_global\",\n        \"title\": \"Unemployment levels are at the lowest since global measurement started\",\n        \"subtitle\": \"Percentage of adult population unemployed\",\n        \"source\": \"WB, World Development Indicators (SL.UEM.TOTL.ZS)\",\n        \"youth\": \"Age 15 - 24\",\n        \"adult\": \"Age 25+\",\n        \"unemployment_rate\": \"Unemployment rate\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"theme\": \"dark\",\n        \"data_download\": \"08.data.unemployment_global.csv\",\n        \"data\": \"1WS_25sPCM1tDWgSATVDeprv-_CAWpVF6Nu1Py1MA-8Q\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"unemployment_global\",\n            \"text\": \"When looking at unemployment at a global scale, things are looking positive. Following a short spike in unemployment in the COVID-years, unemployment is at a stable and very low level. In fact, global unemployment is at the lowest level since the ILO started modelling it in 1991.\",\n            \"translationPrefix\": \"goal_08.content.#21.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"unemployment_age\",\n            \"text\": \"But these low global average unemployment levels mask great diversity - across countries, across genders, and across age groups. Young people (age 15-24) have consistently experienced unemployment three times the level of those aged 25+ throughout the past three decades. Focusing on youth is particularly pertinent as 1.2 billion young people will reach working age in developing countries over the next decade. Based on current trajectories the World Bank estimates nearly 300 million of these could end up without employment.\",\n            \"translationPrefix\": \"goal_08.content.#21.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_08.content.#21\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"neet_gdp\",\n        \"title\": \"The wealthier the country, the lower the NEET\",\n        \"subtitle\": \"Comparing NEET rates with GDP per capita\",\n        \"source\": \"WB, World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/SL.UEM.NEET.ZS\\\" target=\\\"_blank\\\">SL.UEM.NEET.ZS\u003C/a>)\",\n        \"x_title\": \"GDP/capita\",\n        \"x_units\": \"$/year\",\n        \"y_title\": \"Share of youth not in education, employment or training\",\n        \"y_units\": \"%\",\n        \"female_neet_rate\": \"Female NEET rate\",\n        \"male_neet_rate\": \"Male NEET rate\",\n        \"total_neet_rate\": \"Total NEET rate\",\n        \"visdescription\": \"Describe what the visualization shows\",\n        \"data_download\": \"08.data.neet_gdp.csv\",\n        \"data\": \"1Ae7caE6nwzn2poda6CbglNTv1fp53N6x-80_SxWGoeM\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"countries\",\n            \"text\": \"The share of youth (15-24 years of age) not currently in employment, education or training (NEET) is correlated with the income level of the country in which they live. NEET differs greatly across regions with the highest rates observed in \u003Cspan data-color-id=\\\"MEA\\\" class=\\\"MEA\\\">Middle East & North Africa\u003C/span>, \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span> and \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">South Asia\u003C/span>. [This regional pattern mimics that of labor force participation.]\",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"SAS\",\n            \"text\": \"In \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(78,194,192);\\\">South Asia\u003C/span> levels are on average quite high.\",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"MEA\",\n            \"text\": \"In the \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">Middle East & North Africa\u003C/span> levels are on average quite high, but there is a strong negative correlation between NEET and GDP even within the region. \",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"SSF\",\n            \"text\": \"\u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span> has the highest levels of NEET on average of any region, without any clear relationship with a country’s income level.\",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"all_countries\",\n            \"text\": \"\u003Cspan style=\\\"color: rgb(4,1,16);\\\">Similar to the trends observed regarding labor force participation in \u003C/span>[goal: 5]\u003Cspan style=\\\"color: rgb(4,1,16);\\\"> these regional differences tell a striking story related to gender differences.\u003C/span>\",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"gender\",\n            \"text\": \"Generally, women are more likely to be outside employment, education or training. And in some regions, these differences across genders are substantial. Here, each orange line connecting an orange and purple dot shows the NEET for an individual country. The longer the line, the greater the difference between NEET rates across gender. Generally, countries with a lower income level tend to have a greater divergence in NEET rates across gender, although regional differences are substantial.\",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"gender_SAS\",\n            \"text\": \"In \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">South Asia\u003C/span>, for instance, India stands out by having NEET rates for women almost 4 times the NEET rate for men. \",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#6\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"gender_MEA\",\n            \"text\": \"In the \u003Cspan data-color-id=\\\"MEA\\\" class=\\\"MEA\\\">Middle East, North Africa, Afghanistan and Pakistan region\u003C/span>, approximately 1 in 3 youth are not in employment, education or training and the share of females in NEET is almost twice that of men. These significant differences in NEET rates across gender persist across different income levels. \",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#7\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"gender_SSF\",\n            \"text\": \"While \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa \u003C/span>has the highest level of NEET across regions, gender differences are less profound although a few countries exhibit significant differences in NEET across men and women.\",\n            \"translationPrefix\": \"goal_08.content.#24.scenes.#8\"\n          }\n        ],\n        \"translationPrefix\": \"goal_08.content.#24\"\n      }\n    ]\n  },\n  \"07\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"access_electricity_regions\",\n        \"title\": \"Electricity access is advancing globally and across all regions\",\n        \"subtitle\": \"People with access to electricity, by region (% of population)\",\n        \"y_axis_title\": \"Share of people with access to electricity\",\n        \"y_axis_units\": \"%\",\n        \"source\": \"World Bank Group. “\u003Ca href=\\\"https://data.worldbank.org/indicator/EG.ELC.ACCS.ZS\\\" target=\\\"_blank\\\">Access to electricity (% of population\u003C/a>.” SDG 7.1.1 Electrification Dataset.\",\n        \"visdescription\": \"Line charts describing time series trendlines of electricity access by region and the world.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"07.data.access_electricity.csv\",\n        \"data\": \"1bIe4dXEwjeZmnmzX5xP_s2qfg_4WLuU9Ac489xKmYGg\",\n        \"keyFact\": \"92%\",\n        \"keyFactLabel\": \"of the world’s population had access to electricity in 2023.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"global\",\n            \"text\": \"\u003Cspan data-color-id=\\\"WLD\\\" class=\\\"WLD\\\">Global access\u003C/span> to electricity has expanded steadily over the past two decades. By 2023, more than 90 percent of the world’s population had access to electricity—up from 78 percent in 2000. \",\n            \"translationPrefix\": \"goal_07.content.#6.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"all\",\n            \"text\": \"Most regions already had very high levels of access in 2000, and had achieved near-universal access to electricity by 2023.\",\n            \"translationPrefix\": \"goal_07.content.#6.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"sas_ssf\",\n            \"text\": \"Two regions, \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">South Asia\u003C/span> and \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan\u003C/span>\u003Cspan style=\\\"color: rgb(4,1,16);\\\"> Africa\u003C/span> lagged noticeably behind in 2000.\",\n            \"translationPrefix\": \"goal_07.content.#6.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"sas\",\n            \"text\": \"\u003Cspan style=\\\"color: rgb(4,1,16);\\\">But \u003C/span>\u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(78,194,192);\\\">South Asia\u003C/span>\u003Cspan style=\\\"color: rgb(4,1,16);\\\"> has since made dramatic progress, from\u003C/span> less than 60 percent of the population in 2000 to  near universal access by 2021.\",\n            \"translationPrefix\": \"goal_07.content.#6.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"ssf\",\n            \"text\": \"\u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span>\u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\"> \u003C/span>started from an even lower base (around 26 percent in 2000). Although access doubled over the next two decades, only half of the region’s population had electricity by 2023. \",\n            \"translationPrefix\": \"goal_07.content.#6.scenes.#4\"\n          }\n        ],\n        \"translationPrefix\": \"goal_07.content.#6\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"access_electricity_population\",\n        \"title\": \"There are fewer people without electricity, even as the global population grows\",\n        \"population_without_access\": \"Population without access to electricity\",\n        \"population_without_access_short\": \"Without access\",\n        \"population\": \"Population\",\n        \"y_axis_units\": \"millions of people\",\n        \"y_axis_units_short\": \"million people\",\n        \"y_axis_title_right\": \"Global share in 2023\",\n        \"without_access\": \"Population without electricity\",\n        \"with_access\": \"Population with electricity\",\n        \"source\": \"Energy Sector Management Assistance Program (ESMAP). \u003Ca href=\\\"https://trackingsdg7.esmap.org/downloads\\\" target=\\\"_blank\\\">SDG 7.1.1 Electrification Dataset\u003C/a>.\",\n        \"note\": \"Regional estimates of population without access to electricity are calculated by World Bank staff. \",\n        \"million\": \"million\",\n        \"visdescription\": \"Chart decomposing global access to electricity by regions, then zooming in on Sub-Saharan Africa, which it decomposes by country.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"07.data.access_electricity_population.zip\",\n        \"data\": \"1bJryfa5e-tYKOv0f8EBGl4MMBjX-A8prQ_4GxmFb434\",\n        \"keyFact\": \"581 million\",\n        \"keyFactLabel\": \"of the 666 million people without access to electricity live in Sub-Saharan Africa.\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"global_population\",\n            \"text\": \"While the global population has increased by almost 2 billion people since 2000…\",\n            \"translationPrefix\": \"goal_07.content.#9.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"global\",\n            \"text\": \"… the number of people without electricity halved, falling from 1.3 billion in 2000 to 666 million in 2023.\",\n            \"translationPrefix\": \"goal_07.content.#9.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"regions\",\n            \"text\": \"All regions except \u003Cspan style=\\\"color: rgb(4,1,16); background-color: rgb(255,152,0);\\\">Sub-Saharan Africa\u003C/span> contributed to this rapid decline, particularly \u003Cspan data-color-id=\\\"SAS\\\" class=\\\"SAS\\\">South Asia\u003C/span>. In 2000, both South Asia and Sub-Saharan Africa accounted for roughly the same share of people without electricity. But by 2023, South Asia achieved near-universal access, while the number of people without electricity in Sub-Saharan Africa increased. Despite significant progress in access in the region, it was not enough to keep up with population growth.\",\n            \"translationPrefix\": \"goal_07.content.#9.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"saf\",\n            \"text\": \"In 2023, \u003Cspan data-color-id=\\\"SSF\\\" class=\\\"SSF\\\">Sub-Saharan Africa\u003C/span> was home to 581 million people without electricity. This translates to nearly 9 in 10 of the world’s people living without electricity.\",\n            \"translationPrefix\": \"goal_07.content.#9.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"ssf_countries\",\n            \"text\": \"And just eight countries account for half the world’s  people who still lack access to electricity.\",\n            \"translationPrefix\": \"goal_07.content.#9.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"countries_highlight\",\n            \"text\": \"Over one-third of the global population without electricity live in \u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">the region’s most populous nations: \u003C/span>[emphasis: Nigeria], the [emphasis: Democratic Republic of Congo], and [emphasis: Ethiopia] \u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">.\u003C/span>\",\n            \"translationPrefix\": \"goal_07.content.#9.scenes.#5\"\n          }\n        ],\n        \"translationPrefix\": \"goal_07.content.#9\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"access_electricity_urban_rural\",\n        \"title\": \"Access to electricity is lower in rural areas \",\n        \"subtitle\": \"People with access to electricity (% of population)\",\n        \"source\": \"World Bank Group. “\u003Ca href=\\\"https://data.worldbank.org/indicator/EG.ELC.ACCS.ZS\\\" target=\\\"_blank\\\">Access to electricity (% of population\u003C/a>\u003Ca href=\\\"https://data.worldbank.org/indicator/EG.ELC.ACCS.ZS\\\" target=\\\"_blank\\\">,\u003C/a>” “\u003Ca href=\\\"https://data.worldbank.org/indicator/EG.ELC.ACCS.RU.ZS\\\" target=\\\"_blank\\\">Access to electricity, rural (% of rural population\u003C/a>,” “\u003Ca href=\\\"https://data.worldbank.org/indicator/EG.ELC.ACCS.UR.ZS\\\" target=\\\"_blank\\\">Access to electricity, urban (% of urban population\u003C/a>.” SDG 7.1.1 Electrification Dataset.\",\n        \"urban\": \"Urban areas\",\n        \"rural\": \"Rural areas\",\n        \"visdescription\": \"Line charts showing the difference in access to electricity between urban and rural areas in different regions and the world.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"07.data.access_electricity_urban_rural.csv\",\n        \"data\": \"1kx_csJJz33c7bUInxIYVersbmyL68MqVj-KkYKbwqxY\",\n        \"translationPrefix\": \"goal_07.content.#13\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"access_electricity_progress\",\n        \"title\": \"Ethiopia progress towards universal electrification outpaced Nigeria and the Democratic Republic of Congo \",\n        \"subtitle\": \"People with access to electricity (% of population)\",\n        \"select_country\": \"Select countries to highlight\",\n        \"regression\": \"regression\",\n        \"standstill\": \"standstill\",\n        \"slow\": \"slow\",\n        \"typical\": \"typical\",\n        \"fast\": \"fast\",\n        \"very_fast\": \"very fast\",\n        \"progress_speed\": \"Speed of progress\",\n        \"source\": \"World Bank staff calculations, based on XXXX 2026 (To be added when working paper available)\",\n        \"visdescription\": \"Chart showing how the speed of progress in achieving electricity access varies between countries. It focuses on Ethiopia, the Democratic Republic of Congo, and Nigeria.\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"07.data.access_electricity_countries.csv\",\n        \"data\": \"1KfsfMwHprikcb5BU31bNgMErEGV3wj9SbvwRE0Da0Ko\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"access_15\",\n            \"text\": \"In 2015, both Ethiopia and the Democratic Republic of Congo lagged Nigeria in electricity access.\",\n            \"translationPrefix\": \"goal_07.content.#19.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"access_23\",\n            \"text\": \"By2023, the share of Democratic Republic of Congo’s population with access to electricity had increased only slightly, while Ethiopia had almost caught up with Nigeria.\",\n            \"translationPrefix\": \"goal_07.content.#19.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"progress\",\n            \"text\": \"Ethiopia is one of the countries that \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,161,196);\\\">progressed the fastest\u003C/span> over the 2015–2023 period. Nigeria and the Democratic Republic of Congo, on the other hand, \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(197,186,153);\\\">lagged \u003C/span>comparable countries.\",\n            \"translationPrefix\": \"goal_07.content.#19.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"all_countries\",\n            \"text\": \"Now, explore all countries by hovering over the arrow heads or searching for a country in the drop-down menu.\",\n            \"translationPrefix\": \"goal_07.content.#19.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_07.content.#19\"\n      },\n      {\n        \"type\": \"vis\",\n        \"graphic\": \"access_electricity_urban_rural_countries\",\n        \"title\": \"Rapid rural progress in Ethiopia has reduced the urban–rural gap, while the Democratic Republic of Congo– and Nigeria have made limited progress\",\n        \"subtitle\": \"People with access to electricity, by place of residence (% of population)\",\n        \"source\": \"World Bank Group. “\u003Ca href=\\\"https://data.worldbank.org/indicator/EG.ELC.ACCS.RU.ZS\\\" target=\\\"_blank\\\">Access to electricity, rural (% of rural population\u003C/a>,” “\u003Ca href=\\\"https://data.worldbank.org/indicator/EG.ELC.ACCS.UR.ZS\\\" target=\\\"_blank\\\">Access to electricity, urban (% of urban population\u003C/a>.” SDG 7.1.1 Electrification Dataset. \",\n        \"urban\": \"Urban areas\",\n        \"rural\": \"Rural areas\",\n        \"y_axis_units\": \"%\",\n        \"visdescription\": \"Three line charts showing electricity access between urban and rural areas in Ethiopia, Nigeria, and the Democratic Republic of Congo.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"07.data.access_electricity_rural_urban_countries.csv\",\n        \"data\": \"1FCHgcDNE4aKOtQFAiwgcPd9PD7BNbUXyx7CDFvfS4_g\",\n        \"keyFact\": \"44%\",\n        \"keyFactLabel\": \"of rural dwellers in Ethiopia had access to electricity in 2023, up from just 2 percent in 2000.\",\n        \"translationPrefix\": \"goal_07.content.#21\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"hexmap_nigeria\",\n        \"title\": \"Nigeria: uneven and unreliable access \",\n        \"subtitle\": \"\",\n        \"source\": \"World Bank, Development Data Group . \u003Ca href=\\\"https://worldbank.github.io/DECAT_Space2Stats/readme.html\\\" target=\\\"_blank\\\">Space2Stats\u003C/a>(accessed: February 20, 2026). \",\n        \"visdescription\": \"Map of nightlights in Nigeria as a proxy for electricity access. \",\n        \"population\": \"Population\",\n        \"access_electricity\": \"Access to electricity\",\n        \"bright\": \"Bright\",\n        \"weak\": \"Weak\",\n        \"dark\": \"Dark\",\n        \"nightlights_24\": \"Night lights 2024\",\n        \"data_download\": \"07.data.access_electricity_nigeria_zones.csv\",\n        \"data\": \"1TdQXOlfhM3ZlndUnqXBYZByP5aIG8oBDze1t0OKclkY\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"zones\",\n            \"text\": \"[emphasis: Electricity access in Nigeria is highly uneven]. Southern zones enjoy relatively \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(3,63,118);\\\">high coverage\u003C/span>, while the north \u003Cspan style=\\\"background-color: rgb(212,234,224);\\\">lags far behind\u003C/span>. These disparities reflect the concentration of grid infrastructure and population in the south, along with differences in investment, urbanization, and political stability, \u003Cspan style=\\\"background-color: rgb(255,255,255);\\\">as conflict has disrupted large parts of the north in recent years\u003C/span>.\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"nightlights\",\n            \"text\": \"[emphasis: Nighttime lights provide a more granular view of electricity access]. They are a proxy for electricity access and usage. When overlaid on the map, they show where power is being consumed.[footnote: Nighttime lights only capture solar electricity use when backed up by batteries, as the panels do not produce electricity at night. They are therefore a closer proxy of grid connection and use.]\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"nightlights_cities\",\n            \"text\": \"The[emphasis:  ]\u003Cspan style=\\\"background-color: rgb(255,248,74);\\\">brightest clusters\u003C/span> correspond to major cities, such as Lagos, Abuja, and Port Harcourt, where grid access is widespread and power consumption relatively high.Vast rural and peri-urban areas show as \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(147,131,90);\\\">weak\u003C/span> or \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,34,81);\\\">dark\u003C/span>, signaling either a lack of access or unreliable supply.\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"nightlights_urban\",\n            \"text\": \"Let’s focus on Nigeria’s[emphasis:  urban areas]…\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#3\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"zoom_kano\",\n            \"text\": \"… and zoom in onKano. As in most cities, a large majority of households here  are connected to the grid. Where\u003Cspan style=\\\"background-color: rgb(255,248,74);\\\"> bright lights\u003C/span> are detected, neighborhoods are likely well served with access to reliable electricity.\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#4\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"urban_dark\",\n            \"text\": \"Filtering out the brightest data points highlights that, even when connected to the grid, [emphasis: large urban and suburban zones may remain underserved, as nighttime lights appear ][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(147,131,90);\\\">weak\u003C/span>][emphasis:  or ][emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,34,81);\\\">dark\u003C/span>][emphasis: .]\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#5\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"urban_population_dark\",\n            \"text\": \"Although these are \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(144,96,132);\\\">densely populated\u003C/span> suburban settlements, they  still lack highly visible illuminations.\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#6\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"kano_cell_highlight\",\n            \"text\": \"For example, this 36 square kilometer cell is estimated to house more than 100,000 people, but remains largely in the dark. This illustrates that, even though most urban areas are connected to the grid, quality of access is not yet universal and [emphasis: grid reliability is far from consistent].\",\n            \"translationPrefix\": \"goal_07.content.#24.scenes.#7\"\n          }\n        ],\n        \"translationPrefix\": \"goal_07.content.#24\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"hexmap_ethiopia\",\n        \"title\": \"Ethiopia: progress in rural areas\",\n        \"subtitle\": \"Solar electricity is a key factor of progress in rural areas\",\n        \"source\": \"World Bank, Development Data Group . \u003Ca href=\\\"https://worldbank.github.io/DECAT_Space2Stats/readme.html\\\" target=\\\"_blank\\\">Space2Stats\u003C/a>(accessed: February 20, 2026). \u003Cspan style=\\\"background-color: rgb(255,255,0);\\\">\u003C/span>\",\n        \"visdescription\": \"Map of nighttime lights in Ethiopia as a proxy for electricity access. It focused on access progress in rural areas.\",\n        \"population\": \"Population\",\n        \"access_electricity\": \"Access to electricity\",\n        \"some_light\": \"Some level of night lights\",\n        \"dark\": \"Dark\",\n        \"newly_lit_2023\": \"Dark areas in 2012 that had some night lights in 2023\",\n        \"visSize\": \"fullScreen\",\n        \"disableScreenshot\": \"true\",\n        \"nightlights_12\": \"Night lights in 2012\",\n        \"nightlights_23\": \"Night lights in 2023\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"nightlights12\",\n            \"text\": \"Let’s focus on Ethiopia’s [emphasis: rural areas only][footnote: Urban areas are left blank to focus on the nighttime lights view in rural areas.][emphasis:  ]and take a look at the nighttime lights view of 2012. The areas where at least \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(129,176,225);\\\">some light\u003C/span> (weak or strong) was detected are shown in light blue, and areas where no nighttime light was detected, in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,34,81);\\\">dark blue\u003C/span>. While western parts of rural Ethiopia had some nighttime lights coverage in 2012, eastern and southern rural Ethiopia remained largely in the dark.\",\n            \"translationPrefix\": \"goal_07.content.#27.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"nightlights12_powerlines\",\n            \"text\": \"The \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(235,87,87);\\\">power grid lines\u003C/span> reached only a few rural areas in 2012. So how did the illuminated rural areas have access to electricity? About 75 percent of the [emphasis: rural population] in Ethiopia with access consumed electricity through[emphasis:  solar power.][reference: ethiopia_survey]\",\n            \"translationPrefix\": \"goal_07.content.#27.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"nightlights12_se\",\n            \"text\": \"Let’s focus on the [emphasis: south-east,] which is more sparsely populated and remained mostly in \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,34,81);\\\">the dark in 2012\u003C/span>[emphasis: .]\",\n            \"translationPrefix\": \"goal_07.content.#27.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"nightlights23\",\n            \"text\": \"By 2023, a lot more nighttime lights could be detected in the southeast. Much of this is due to the [emphasis: rapid uptake of solar electricity][reference: ethiopia_survey], which helped reduce the persistent gap in access to electricity in rural areas.\",\n            \"translationPrefix\": \"goal_07.content.#27.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_07.content.#27\"\n      }\n    ]\n  },\n  \"06\": {\n    \"en\": [\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"safely_managed\",\n        \"title\": \"A quarter of the world’s population lacks access to safe drinking water\",\n        \"subtitle\": \"Five levels of drinking water services (% of population)\",\n        \"source\": \"WHO/UNICEF JMP for Water Supply, Sanitation and Hygiene. Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/SH.H2O.SMDW.ZS\\\" target=\\\"_blank\\\">SH.H2O.SMDW.ZS\u003C/a>\u003Cspan style=\\\"color: rgb(112,111,125);\\\">)\u003C/span>\",\n        \"visdescription\": \"Line chart showing the distribution of the global population across drinking water service levels from 2000 to 2024. Each line represents a service level—safely managed, basic, limited, unimproved, and surface water—and together they sum to 100 percent in each year. The chart illustrates how the composition of service levels has changed over time.\",\n        \"indicator_360\": \"WB_WDI_SH_H2O_SMDW_ZS\",\n        \"visSize\": \"default\",\n        \"data_download\": \"Safely managed.zip\",\n        \"data\": \"1JqbaHQXEjhErDipoCf8b3-YZXKFCfIvrzCfyR69d1gE\",\n        \"keyFact\": \"2.1 billion\",\n        \"keyFactLabel\": \"people lacked access to safely managed drinking water in 2024.\",\n        \"legendSafelyManaged\": \"Safely managed\",\n        \"legendBasic\": \"Basic\",\n        \"legendLimited\": \"Limited\",\n        \"legendUnimproved\": \"Unimproved\",\n        \"legendSurfaceWater\": \"Surface water\",\n        \"yAxisTitle\": \"Access to drinking water, by service level\",\n        \"yAxisUnits\": \"% of global population\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1_Id\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,128,198);\\\">Safely managed\u003C/span>]: The highest service level, this is water from an[emphasis:  improved source] that is [emphasis: available on premises [reference: premises]],[emphasis:  when needed, ]and [emphasis: free from fecal and priority chemical contamination such as arsenic and fluoride]. Global access rose from 61 percent (3.8 billion people) in 2000 to 74 percent (6 billion) in 2024. This means  2.1 billion people still lack access to safe drinking water.\",\n            \"translationPrefix\": \"goal_06.content.#8.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2_Id\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,184,236);\\\">Basic\u003C/span>][emphasis: : From an improved source, often off-premises but within a 30-minute round trip and without guaranteed water quality. ]In 2024, about 18 percent of the world’s population (1.4 billion people) had access to this level of drinking water. \",\n            \"translationPrefix\": \"goal_06.content.#8.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene3_Id\",\n            \"text\": \"In 2024, one-tenth of the global population lacked even basic drinking water: 4 percent had access to an improved source but with a collection time of over 30 minutes ([emphasis: \u003Cspan style=\\\"background-color: rgb(206,212,222);\\\">limited\u003C/span>] services) and another 4 percent relied on [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(227,167,99);\\\">unimproved\u003C/span>][emphasis:  ]sources. The final 1 percent were at high risk of contamination, depending on [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(189,97,38);\\\">surface\u003C/span>] water accessed directly from rivers, dams, and lakes.\",\n            \"translationPrefix\": \"goal_06.content.#8.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#8\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"safely_managed_grouped\",\n        \"title\": \"Access to safely managed drinking water remains much lower in rural areas\",\n        \"subtitle\": \"People using safely managed drinking water services, by residence (% of population)\",\n        \"visdescription\": \"Two line charts showing the distribution of the global population across drinking water service levels from 2000 to 2024, one for urban areas and one for rural areas. In the first scene, each line represents a service level—safely managed, basic, limited, unimproved, and surface water—and together they sum to 100 percent in each year. In the next scene, line charts are shown for eight regions, including the world. For each region, two line charts—urban and rural—show trends in safely managed drinking water access over the same period. In the final scene, South Asia and Sub-Saharan Africa are highlighted.\",\n        \"indicator_360\": \"WB_WDI_SH_H2O_SMDW_RU_ZS\",\n        \"theme\": \"light\",\n        \"data_download\": \"Safely managed.zip\",\n        \"data\": \"1JqbaHQXEjhErDipoCf8b3-YZXKFCfIvrzCfyR69d1gE\",\n        \"source\": \"WHO/UNICEF JMP for Water Supply, Sanitation and Hygiene. Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/SH.H2O.SMDW.RU.ZS\\\" target=\\\"_blank\\\">SH.H2O.SMDW.RU.ZS\u003C/a>\u003Cspan style=\\\"color: rgb(112,111,125); background-color: rgb(255,255,255);\\\">, \u003C/span>\u003Ca href=\\\"https://data.worldbank.org/indicator/SH.H2O.SMDW.UR.ZS\\\" target=\\\"_blank\\\">SH.H2O.SMDW.UR.ZS\u003C/a>\u003Cspan style=\\\"color: rgb(112,111,125); background-color: rgb(255,255,255);\\\">).\u003C/span>\",\n        \"note\": \"Rural population data are unavailable for North America (2000–24) and East Asia & Pacific (2000–14).\",\n        \"legendSafelyManaged\": \"Safely Managed\",\n        \"legendBasic\": \"Basic\",\n        \"legendLimited\": \"Limited\",\n        \"legendUnimproved\": \"Unimproved\",\n        \"legendSurfaceWater\": \"Surface water\",\n        \"legendUrban\": \"Urban\",\n        \"legendRural\": \"Rural\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1\",\n            \"text\": \"While the proportion of urban dwellers with [emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(0,128,198);\\\">safely managed\u003C/span>] drinking water stagnated at just over 80 percent between 2000 and 2024, the share of rural dwellers increased substantially, from about 40 percent to 60 percent over the same period. \",\n            \"translationPrefix\": \"goal_06.content.#10.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2\",\n            \"text\": \"Despite this, across all regions with available data, \u003Cspan data-color-id=\\\"rural\\\" class=\\\"rural\\\">rural\u003C/span> access still lags \u003Cspan data-color-id=\\\"urban\\\" class=\\\"urban\\\">urban \u003C/span>access by about 20 percentage points.\",\n            \"translationPrefix\": \"goal_06.content.#10.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene3\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(4,1,16);\\\">South Asia\u003C/span>]\u003Cspan style=\\\"color: rgb(4,1,16);\\\"> is an \u003C/span>\u003Cspan style=\\\"color: rgb(4,1,16);\\\">exception:\u003C/span> the \u003Cspan data-color-id=\\\"urban\\\" class=\\\"urban\\\">urban\u003C/span>–\u003Cspan data-color-id=\\\"rural\\\" class=\\\"rural\\\">rural \u003C/span>gap narrowed sharply between 2000 and 2024 as access expanded in rural areas. [emphasis: \u003Cspan style=\\\"color: rgb(4,1,16);\\\">Sub-Saharan Africa\u003C/span>] has also seen gains in \u003Cspan data-color-id=\\\"rural\\\" class=\\\"rural\\\">rural\u003C/span> access, but coverage remains extremely low, at 17 percent in 2024. Low access to water services is often concentrated in poorer regions, where limited public resources and the high cost of extending infrastructure to dispersed rural populations constrain progress, leaving these populations particularly vulnerable. [reference: water_poverty]\",\n            \"translationPrefix\": \"goal_06.content.#10.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#10\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"safely_managed_country\",\n        \"title\": \"Access to safely managed drinking water is low in Sub-Saharan Africa and small island economies in the Pacific\",\n        \"subtitle\": \"People using safely managed drinking water services, 2024 (% of population)\",\n        \"source\": \"WHO/UNICEF JMP for Water Supply, Sanitation and Hygiene. Retrieved from World Development Indicators (\u003Ca href=\\\"https://data.worldbank.org/indicator/SH.H2O.SMDW.ZS\\\" target=\\\"_blank\\\">SH.H2O.SMDW.ZS\u003C/a>\u003Cspan style=\\\"color: rgb(112,111,125); background-color: rgb(255,255,255);\\\">).\u003C/span>\",\n        \"note\": \"There are  no available estimates of safely managed drinking water access in 2024 for the 69 countries shaded gray. \",\n        \"visSize\": \"default\",\n        \"visdescription\": \"A grid map displays the share of the population using safely managed drinking water services by country, using equally sized tiles.  Countries are shaded according to their level of access, with darker colors indicating higher coverage and lighter colors, lower coverage. Gray shading indicates missing data or no available estimates.\",\n        \"indicator_360\": \"WB_WDI_SH_H2O_SMDW_ZS\",\n        \"data_download\": \"Country_SafelyManaged_2024.csv\",\n        \"data\": \"1ABOxAmGnoBjgKOe5cnvMCc0xc4K_HWIPPLVvXUwdXsI\",\n        \"legendLabel\": \" Access to safely managed drinking water (% of population)\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1\",\n            \"text\": \"Data on access to safely managed drinking water services are available for 148 countries for 2024. Due to insufficient water monitoring or testing systems, approximately one-third of countries lack water quality data.\",\n            \"translationPrefix\": \"goal_06.content.#12.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2\",\n            \"text\": \"Among the countries with data available, only 29 have achieved universal (99 percent or higher) access to safely managed drinking water.  \",\n            \"translationPrefix\": \"goal_06.content.#12.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene3\",\n            \"text\": \"Low access is concentrated in Sub-Saharan Africa, where less than half of the populations has access to safe drinking water in 23 of the 26 countries with data. At approximately 6 percent, Central African Republic and Chad have the lowest access to safe drinking water.\",\n            \"translationPrefix\": \"goal_06.content.#12.scenes.#2\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#12\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"estimating\",\n        \"title\": \"Safely managed drinking water access is determined by the lowest value of the three component\",\n        \"subtitle\": \"People with access to \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">water free from contamination\u003C/span>, water \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">accessible on premises\u003C/span>, or \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">water available when needed\u003C/span> (% of people using improved water sources)\",\n        \"source\": \"WHO/UNICEF Joint Monitoring Programme (JMP) for Water Supply, Sanitation and Hygiene, \u003Ca href=\\\"https://washdata.org/data/downloads#WLD\\\" target=\\\"_blank\\\">JMP Global Database\u003C/a>. \",\n        \"visdescription\": \"Three-column charts show the components of safely managed drinking water among people using improved water sources. The left column represents water that is free from contamination; the middle column, water that is accessible on premises; and the right column, water that is available when needed. The first scene shows data for Mongolia; the second, for Nepal.\",\n        \"visSize\": \"default\",\n        \"data_download\": \"Indicator.csv\",\n        \"data\": \"1bPrWHiqnAIikyhhHREgwnsEqB9uYTbx0FHw5Xew0sV4\",\n        \"determines\": \"DETERMINES\",\n        \"safelyManagedLabel\": \"SAFELY MANAGED\",\n        \"qualityLabel\": \"Free from contamination\",\n        \"accessibilityLabel\": \"Accessible on premises\",\n        \"availabilityLabel\": \"Available when needed\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1\",\n            \"text\": \"For example, [emphasis: in Mongolia], 84 percent of individuals with improved water sources have \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">water \u003C/span>\u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">available when needed\u003C/span>, and 82 percent have access to \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">uncontaminated water\u003C/span>. But [emphasis: only 43 percent ]have \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">improved water sources at home\u003C/span> , resulting in an estimate of [emphasis: 43 percent][emphasis: \u003Cspan style=\\\"color: rgb(255,0,0);\\\"> \u003C/span>]of people with  safely managed drinking water access. So, for Mongolia,\u003Cspan style=\\\"background-color: rgb(255,255,255);\\\"> \u003C/span>\u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">accessibility\u003C/span> is the limiting factor.\",\n            \"translationPrefix\": \"goal_06.content.#15.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2\",\n            \"text\": \"Conversely, [emphasis: in Nepal], \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">accessibility\u003C/span> and \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">availability\u003C/span>\u003Cspan style=\\\"color: rgb(255,255,255);\\\"> \u003C/span>are relatively high (around 80 percent each), but [emphasis: only 16 percent have access to ][emphasis: \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">uncontaminated water\u003C/span>][emphasis: \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">.\u003C/span>] As a result, only around [emphasis: 1][emphasis: 6 percent] have access to safely managed drinking water. So, in Nepal, \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">free from contamination\u003C/span> is the limiting factor in access to safely managed drinking water.\",\n            \"translationPrefix\": \"goal_06.content.#15.scenes.#1\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#15\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"limiting_factors\",\n        \"title\": \"Countries face different challenges in achieving access to safely managed drinking water \",\n        \"subtitle\": \"People with access to: \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">water free from contamination\u003C/span>, or water \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">accessible on premises\u003C/span>, or \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">water available when needed\u003C/span> (% of people using improved water sources)\",\n        \"source\": \"WHO/UNICEF Joint Monitoring Programme (JMP) for Water Supply, Sanitation and Hygiene, \u003Ca href=\\\"https://washdata.org/data/downloads#WLD\\\" target=\\\"_blank\\\">JMP Global Database\u003C/a>.\",\n        \"visdescription\": \"Three-column charts showing the components of safely managed drinking water among people using improved water sources. The left column represents water that is free from contamination, the middle column, water that is accessible on premises, and the right column, water that is available when needed. The first scene shows charts for six countries where water quality is the limiting factor. The second scene shows charts for five countries where accessibility is the limiting factor. The third scene shows charts for four countries where availability is the limiting factor. In the final scene, a grid map shows countries as equally sized tiles, each displaying a level of access to safely managed drinking water and its three components: accessibility, availability, and water quality. Within each tile, bars represent the level of each component, allowing comparison of limiting factors across countries.\",\n        \"visSize\": \"fullScreen\",\n        \"data_download\": \"Limiting Factors.csv\",\n        \"data\": \"1Nu8h2IW9nBy55RO2s0ld8dL-jyM7FOQLN8NZ1mPDNIk\",\n        \"keyFact\": \"Around 50%\",\n        \"keyFactLabel\": \"of countries with data (48 out of 94) face water quality challenges.\",\n        \"legendLabelQuality\": \"Water quality\",\n        \"legendLabelAccessibility\": \"Accessibility\",\n        \"legendLabelAvailability\": \"Availability\",\n        \"noDataLabel\": \"No data available\",\n        \"isTheLimitingFactorLabel\": \"is the limiting factor\",\n        \"scenes\": [\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene1\",\n            \"text\": \"In several Pacific Island nations, including Tuvalu, Nauru, and Tonga, the share of people with water[emphasis:  ][emphasis: \u003Cspan data-color-id=\\\"cat4\\\" class=\\\"cat4\\\">free from contamination\u003C/span>] is extremely low while the share of people with water \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">readily available\u003C/span> and \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">accessible on premises\u003C/span> is less of a concern. As many small atoll islands have no rivers or large lakes, most of their drinking water comes from rainwater harvesting, and these systems are easily contaminated or diluted by saltwater, while water treatment capacity is limited.[reference: waterq1][reference: waterq2] Some Southeast Asian countries also face significant water quality challenges including Cambodia, Indonesia, and Lao PDR where inadequate wastewater treatment contributes to contamination.[reference: UNEP]\",\n            \"translationPrefix\": \"goal_06.content.#18.scenes.#0\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene2\",\n            \"text\": \"[emphasis: \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(52,167,242);\\\">Accessibility\u003C/span>] is a major challenge in many Sub-Saharan African countries, such as Democratic Republic of the Congo, Malawi, Guinea-Bissau, Lesotho, and São Tomé and Príncipe, where access to water on premises remains limited. These countries often lack adequate infrastructure,[reference: wateracc1] particularly in rural areas, where communities are widely dispersed.[reference: wateracc2] \",\n            \"translationPrefix\": \"goal_06.content.#18.scenes.#1\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene3\",\n            \"text\": \"Water is considered \u003Cspan style=\\\"color: rgb(255,255,255); background-color: rgb(102,74,182);\\\">available when needed\u003C/span> if households report having sufficient water or access to it most of the day.[footnote:  For example, at least 12 hours per day or four days per week, depending on the survey.] In countries such as South Africa and Algeria, chronic water scarcity can disrupt supply systems. But availability depends not only on water scarcity but also on infrastructure and water management. Some water-scarce countries maintain reliable access through desalination or well-managed distribution systems.[reference: ZAF][reference: DZA][reference: CCC]\u003Cspan style=\\\"background-color: rgb(217,217,217);\\\">\u003C/span>\",\n            \"translationPrefix\": \"goal_06.content.#18.scenes.#2\"\n          },\n          {\n            \"type\": \"scene\",\n            \"id\": \"scene4\",\n            \"text\": \"The map presents the limiting factors for safely managed drinking water access in 148 countries. Please note that countries shaded gray have no data for safely managed drinking water. Some countries lack availability data, but safely managed drinking water is still estimated when water quality and accessibility data are available. Countries that have achieved universal access are also included.\",\n            \"translationPrefix\": \"goal_06.content.#18.scenes.#3\"\n          }\n        ],\n        \"translationPrefix\": \"goal_06.content.#18\"\n      },\n      {\n        \"type\": \"scroller\",\n        \"graphic\": \"tanzania_typical_progress\",\n        \"title\": \"In Tanzania, progress in improving water quality lags progress in availability and accessibility\",\n        \"subtitle\": \"People with access to each component: \u003Cspan data-
